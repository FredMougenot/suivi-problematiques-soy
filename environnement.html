<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Environnement — Expédition SOY</title>
<link rel="stylesheet" href="soy-shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.date-nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:18px 28px 0;}
.date-arr{width:34px;height:34px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;}
.date-arr:hover{border-color:var(--copper);color:var(--copper-light);}
.date-lbl{font-size:1rem;font-weight:700;color:var(--text-primary);padding:7px 22px;background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-md);min-width:260px;text-align:center;}
.today-chip{font-size:.65rem;font-weight:700;color:var(--copper-light);background:var(--copper-dim);border:1px solid rgba(200,132,58,.25);padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;}

/* Tableau vérifications */
.env-outer{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);overflow-x:auto;}
.env-tbl{width:100%;border-collapse:collapse;min-width:600px;}
.env-tbl thead tr{background:var(--bg-float);border-bottom:2px solid var(--text-faint);}
.env-tbl thead th{padding:12px 16px;font-size:.6rem;font-weight:800;color:var(--copper);letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;text-align:left;}
.env-tbl thead th.th-c{text-align:center;}
.env-tbl tbody tr{border-bottom:1px solid var(--text-faint);transition:background .1s;}
.env-tbl tbody tr:last-child{border-bottom:none;}
.env-tbl tbody tr:hover td{background:rgba(200,132,58,.022);}
.env-tbl tbody td{padding:11px 16px;font-size:.84rem;color:var(--text-primary);vertical-align:middle;}
.verif-label{font-size:.88rem;font-weight:500;}
.chk-cell{text-align:center;width:100px;}
.conf-chk{width:22px;height:22px;border-radius:5px;cursor:pointer;appearance:none;-webkit-appearance:none;background:var(--bg-float);border:2px solid var(--text-faint);transition:all .15s;position:relative;}
.conf-chk:checked{background:var(--emerald);border-color:var(--emerald);}
.conf-chk:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#0F1118;font-size:.75rem;font-weight:900;}
.chk-nc:checked{background:var(--ruby);border-color:var(--ruby);}
.row-nc{background:rgba(224,85,85,.04);}
.row-nc td{color:var(--ruby);}

/* Bouton sauver */
.btn-sv{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.73rem;font-weight:700;border:none;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn-sv:hover{opacity:.85;}
.btn-sv:disabled{opacity:.35;cursor:default;}
.btn-rm{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--text-faint);color:var(--text-muted);cursor:pointer;font-size:.72rem;margin-left:4px;transition:all .15s;}
.btn-rm:hover{border-color:var(--ruby);color:var(--ruby);background:var(--ruby-bg);}
.badge-extra{display:inline-block;font-size:.6rem;font-weight:700;background:var(--copper-dim);color:var(--copper-light);border:1px solid rgba(200,132,58,.25);padding:1px 7px;border-radius:20px;margin-left:8px;vertical-align:middle;}

/* Btn add */
.btn-add{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.82rem;font-weight:800;border:none;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;}
.btn-add:hover{opacity:.88;transform:translateY(-1px);}

/* Bouton Sauvegarder tout */
.btn-save-all{display:inline-flex;align-items:center;gap:8px;padding:11px 36px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.86rem;font-weight:800;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(184,115,51,.3);transition:opacity .15s,transform .1s;}
.btn-save-all:hover{opacity:.88;}
.btn-save-all:disabled{opacity:.5;cursor:default;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:var(--bg-float);border:1px solid var(--text-faint);border-radius:var(--r-lg);padding:26px;width:420px;max-width:95vw;box-shadow:0 16px 48px rgba(0,0,0,.6);position:relative;}
.modal::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--copper),transparent);border-radius:var(--r-lg) var(--r-lg) 0 0;}
.modal-title{font-size:1.05rem;font-weight:700;color:var(--text-primary);margin-bottom:18px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
.fg input,.fg textarea{width:100%;background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-primary);border-radius:var(--r-md);padding:9px 12px;font-size:.86rem;font-family:"Outfit",sans-serif;outline:none;transition:border-color .15s;box-sizing:border-box;}
.fg input:focus,.fg textarea:focus{border-color:var(--copper);}
.m-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.btn-cx{padding:8px 16px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-secondary);font-size:.84rem;font-weight:600;cursor:pointer;}
.btn-ok{padding:8px 18px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.84rem;font-weight:700;border:none;cursor:pointer;}
.btn-ok:hover{opacity:.88;}
</style>
</head>
<body>
<div class="tool-wrap">
  <div class="tool-topbar">
    <a href="index.html" class="tool-back">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
    <div class="tool-title">🌿 <span id="page-title">Conformité environnement</span></div>
  </div>

  <div class="date-nav">
    <button class="date-arr" onclick="changeDay(-1)">&#8592;</button>
    <div class="date-lbl" id="date-lbl">—</div>
    <button class="date-arr" onclick="changeDay(1)">&#8594;</button>
  </div>

  <div class="tool-main" style="padding-top:16px;">
    <div style="margin-bottom:8px;">
      <button class="btn-add" onclick="openAddVerif()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter une vérification
      </button>
    </div>
    <div id="spinner" class="spinner" style="display:flex"><div class="spin"></div> Chargement…</div>
    <div id="env-wrap" style="display:none">
      <div class="env-outer">
        <table class="env-tbl">
          <thead>
            <tr>
              <th>Vérification</th>
              <th class="th-c">Conforme</th>
              <th class="th-c">Non-conforme</th>
              <th style="width:44px"></th>
            </tr>
          </thead>
          <tbody id="env-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div style="display:flex;justify-content:center;padding:12px 0 4px;">
    <button id="btn-save-all-env" class="btn-save-all" onclick="saveAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Sauvegarder tout
    </button>
  </div>
</div>

<!-- MODAL AJOUT VÉRIFICATION EXTRA -->
<div class="overlay" id="modal-add-verif">
  <div class="modal">
    <div class="modal-title">🌿 Ajouter une vérification</div>
    <div class="fg"><label>Intitulé <span style="color:var(--ruby)">*</span></label>
      <input type="text" id="m-verif-label" placeholder="Ex: Bacs de recyclage couverts…">
    </div>
    <div class="m-acts">
      <button class="btn-cx" onclick="closeAddVerif()">Annuler</button>
      <button class="btn-ok" onclick="confirmAddVerif()">Ajouter</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>


function localToday(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const SB_URL='https://xppzmdmnuztozgukrcta.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';
const sb=supabase.createClient(SB_URL,SB_KEY);

const VERIFS_FIXES = [
  'Portes et accès dégagés',
  'Zones de déchets conformes',
  'Contenants identifiés et fermés',
  'Planchers propres et secs',
  'Éclairage fonctionnel',
  'Extincteurs accessibles',
  'Matières dangereuses sécurisées',
  'Bacs de récupération en ordre',
];

let curDate = localToday();
let rows = {};

function todayStr(){ return localToday(); }
function isToday(){ return curDate === todayStr(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,type='info'){
  const t=document.createElement('div');
  t.className='toast-item toast-'+type;
  t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},4000);
}

function updateDateUI(){
  const d=new Date(curDate+'T00:00:00');
  const lbl=d.toLocaleDateString('fr-CA',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const chip=isToday()?' <span class="today-chip">Aujourd\'hui</span>':'';
  document.getElementById('date-lbl').innerHTML=lbl+chip;
}
function changeDay(delta){
  const dt=new Date(curDate+'T00:00:00');
  dt.setDate(dt.getDate()+delta);
  curDate=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  updateDateUI(); load();
}

// ── RENDER ──────────────────────────────────────────────────
function render(){
  const extras = Object.values(rows)
    .filter(r=>!VERIFS_FIXES.includes(r.verif_key) && r.verif_key.startsWith('extra_'))
    .sort((a,b)=>a.verif_key.localeCompare(b.verif_key));

  const allVerifs = [
    ...VERIFS_FIXES.map(v=>({key:v, label:v, fixed:true})),
    ...extras.map(r=>({key:r.verif_key, label:r.label||r.verif_key, fixed:false}))
  ];

  const svgSave='';

  let html = '';
  allVerifs.forEach(v=>{
    const r = rows[v.key] || {};
    const isNC = !!r.non_conforme;
    const rowCls = isNC ? 'row-nc' : '';
    html += `<tr id="erow-${v.key.replace(/[^a-z0-9]/gi,'_')}" class="${rowCls}">
      <td class="verif-label">${esc(v.label)}${!v.fixed?'<span class="badge-extra">extra</span>':''}</td>
      <td class="chk-cell">
        <input type="checkbox" class="conf-chk chk-ok"
          ${r.conforme?'checked':''}
          onchange="setConf('${v.key}','conforme',this.checked)">
      </td>
      <td class="chk-cell">
        <input type="checkbox" class="conf-chk chk-nc"
          ${r.non_conforme?'checked':''}
          onchange="setConf('${v.key}','non_conforme',this.checked)">
      </td>
      <td style="text-align:center;width:44px">
        <button onclick="delVerif('${v.key}')" style="width:26px;height:26px;border-radius:5px;background:transparent;border:1px solid var(--text-faint);color:var(--text-muted);cursor:pointer;font-size:13px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all .15s" onmouseover="this.style.borderColor='var(--ruby)';this.style.color='var(--ruby)'" onmouseout="this.style.borderColor='var(--text-faint)';this.style.color='var(--text-muted)'">&#x2715;</button>
      </td>
    </tr>`;
  });

  document.getElementById('env-tbody').innerHTML = html;
  updateStats();
}

// ── CASE À COCHER — exclusion mutuelle ──────────────────────
function setConf(key, field, val){
  if(!rows[key]) rows[key]={verif_key:key, date_jour:curDate};
  if(val){
    rows[key]['conforme']     = field==='conforme';
    rows[key]['non_conforme'] = field==='non_conforme';
  } else {
    rows[key][field] = false;
  }
  const rowId = key.replace(/[^a-z0-9]/gi,'_');
  const tr = document.getElementById('erow-'+rowId);
  if(tr){
    const chkOk = tr.querySelector('.chk-ok');
    const chkNc = tr.querySelector('.chk-nc');
    if(chkOk) chkOk.checked = !!rows[key].conforme;
    if(chkNc) chkNc.checked = !!rows[key].non_conforme;
    tr.className = rows[key].non_conforme ? 'row-nc' : '';
  }
  updateStats();
}

// ── STATS ───────────────────────────────────────────────────
function updateStats(){ /* stats supprimées */ }

// ── SAVE INDIVIDUAL ─────────────────────────────────────────
async function saveVerif(key){
  const btnId='bsv-'+key.replace(/[^a-z0-9]/gi,'_');
  const btn=document.getElementById(btnId);
  if(btn){btn.disabled=true;btn.textContent='…';}
  if(!rows[key]) rows[key]={verif_key:key,date_jour:curDate};
  const r=rows[key];
  const payload={
    verif_key:key, date_jour:curDate,
    label: r.label||key,
    conforme:!!r.conforme,
    non_conforme:!!r.non_conforme,
    updated_at:new Date().toISOString(),
  };
  if(r.id){
    const {error}=await sb.from('environnement_verif').update(payload).eq('id',r.id);
    if(error){toast('Erreur: '+error.message,'error');}
    else toast('Sauvegardé ✓','success');
  } else {
    payload.created_at=new Date().toISOString();
    const {data,error}=await sb.from('environnement_verif').insert([payload]).select().single();
    if(error){toast('Erreur: '+error.message,'error');}
    else{ rows[key]=data; toast('Sauvegardé ✓','success'); }
  }
  if(btn){btn.disabled=false;btn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Sauver';}
}

// ── SAVE ALL ────────────────────────────────────────────────
async function saveAll(){
  const btn=document.getElementById('btn-save-all-env');
  if(btn){btn.disabled=true;btn.textContent='Sauvegarde…';}
  const allKeys=[
    ...VERIFS_FIXES,
    ...Object.keys(rows).filter(k=>k.startsWith('extra_'))
  ];
  let errors=0;
  for(const key of allKeys){
    if(!rows[key]) continue;
    const r=rows[key];
    const payload={
      verif_key:key, date_jour:curDate,
      label:r.label||key,
      conforme:!!r.conforme,
      non_conforme:!!r.non_conforme,
      updated_at:new Date().toISOString(),
    };
    if(r.id){
      const {error}=await sb.from('environnement_verif').update(payload).eq('id',r.id);
      if(error) errors++;
    } else if(r.conforme||r.non_conforme){
      payload.created_at=new Date().toISOString();
      const {data,error}=await sb.from('environnement_verif').insert([payload]).select().single();
      if(error) errors++;
      else rows[key]=data;
    }
  }
  if(btn){btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Sauvegarder tout';}
  if(errors) toast(`${errors} erreur(s)`, 'error');
  else toast('Tout sauvegardé ✓','success');
}

// ── DELETE EXTRA ────────────────────────────────────────────
async function delVerif(key){
  if(!confirm('Supprimer cette vérification ?')) return;
  if(rows[key]?.id){
    await sb.from('environnement_verif').delete().eq('id',rows[key].id);
  }
  delete rows[key];
  render();
  toast('Supprimé','success');
}

// ── MODAL ADD VERIF ─────────────────────────────────────────
function openAddVerif(){
  document.getElementById('m-verif-label').value='';
  document.getElementById('modal-add-verif').classList.add('open');
  setTimeout(()=>document.getElementById('m-verif-label').focus(),50);
}
function closeAddVerif(){ document.getElementById('modal-add-verif').classList.remove('open'); }
async function confirmAddVerif(){
  const label=document.getElementById('m-verif-label').value.trim();
  if(!label){toast('Intitulé requis.','error');return;}
  const key='extra_'+Date.now();
  rows[key]={verif_key:key,label,date_jour:curDate,conforme:false,non_conforme:false};
  closeAddVerif();
  render();
  await saveVerif(key);
  toast('Vérification ajoutée ✓','success');
}

// ── LOAD ────────────────────────────────────────────────────
async function load(){
  const spinner=document.getElementById('spinner');
  const wrap=document.getElementById('env-wrap');
  if(spinner) spinner.style.display='flex';
  if(wrap) wrap.style.display='none';
  rows={};
  try{
    const {data,error}=await sb.from('environnement_verif').select('*').eq('date_jour',curDate);
    if(error && error.code!=='PGRST116') throw error;
    (data||[]).forEach(r=>{ rows[r.verif_key]=r; });
  }catch(e){ toast('Erreur: '+e.message,'error'); }
  finally{
    try{render();}catch(re){console.error('render:',re);}
    if(spinner) spinner.style.display='none';
    if(wrap) wrap.style.display='block';
  }
}

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  updateDateUI(); load();
  sb.from('piliers_criteres_lignes').select('intitule').eq('pilier','Environnement').eq('row_index',0).single()
    .then(({data})=>{ if(data&&data.intitule) document.getElementById('page-title').textContent=data.intitule; })
    .catch(()=>{});
});

document.addEventListener('DOMContentLoaded',()=>{
  const mo=document.getElementById('modal-add-verif');
  if(mo) mo.addEventListener('click',e=>{ if(e.target===mo) closeAddVerif(); });
});


</script>
</body>
</html>
