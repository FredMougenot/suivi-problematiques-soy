<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOY · Flux Camions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void:       #0a0a0b;
  --surface:    #111113;
  --raised:     #18181c;
  --border:     #2a2a30;
  --border-hi:  #3d3d48;
  --text:       #e8e6e0;
  --text-2:     #9a9890;
  --text-3:     #5a5856;
  --cold:       #4ab8e8;
  --cold-dim:   #1a3a4a;
  --cold-glow:  rgba(74,184,232,.15);
  --warm:       #e8a84a;
  --warm-dim:   #3a2a10;
  --warm-glow:  rgba(232,168,74,.15);
  --success:    #4ae8a0;
  --danger:     #e84a6a;
  --danger-dim: #3a1020;
  --copper:     #c87941;
  --copper-dim: #2a1a08;
  --t: .2s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--void);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── GRILLE DE FOND ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: .3;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,11,.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.brand-badge {
  width: 32px; height: 32px;
  background: var(--copper);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: .75rem;
  color: #fff;
  letter-spacing: .05em;
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: .95rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text);
}

.header-sep { width: 1px; height: 24px; background: var(--border); }

.date-chip {
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  color: var(--text-2);
  letter-spacing: .05em;
}

.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

.btn-switch {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  border: 1px solid var(--border-hi);
  border-radius: 8px;
  background: var(--raised);
  color: var(--text-2);
  font-family: 'DM Sans', sans-serif;
  font-size: .78rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--t);
  text-decoration: none;
}
.btn-switch:hover { border-color: var(--copper); color: var(--text); }
.btn-switch svg { opacity: .7; }

.btn-today {
  padding: 7px 14px;
  border: 1px solid var(--copper);
  border-radius: 8px;
  background: var(--copper-dim);
  color: var(--copper);
  font-family: 'DM Sans', sans-serif;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--t);
}
.btn-today:hover { background: var(--copper); color: #fff; }

/* ── LAYOUT PRINCIPAL ── */
.main {
  position: relative;
  z-index: 1;
  padding: 28px 32px 60px;
  max-width: 1400px;
  margin: 0 auto;
}

/* ── MÉTRIQUES DU JOUR ── */
.metrics-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}

.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  position: relative;
  overflow: hidden;
  transition: var(--t);
}
.metric:hover { border-color: var(--border-hi); }
.metric::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent, var(--border));
}
.metric.cold { --accent: var(--cold); }
.metric.warm { --accent: var(--warm); }
.metric.success { --accent: var(--success); }
.metric.danger { --accent: var(--danger); }
.metric.copper { --accent: var(--copper); }

.metric-val {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.metric.cold .metric-val { color: var(--cold); }
.metric.warm .metric-val { color: var(--warm); }
.metric.success .metric-val { color: var(--success); }
.metric.danger .metric-val { color: var(--danger); }
.metric.copper .metric-val { color: var(--copper); }

.metric-lbl {
  font-size: .68rem;
  font-weight: 500;
  color: var(--text-3);
  letter-spacing: .12em;
  text-transform: uppercase;
}

/* ── TIMELINE PRINCIPALE ── */
.timeline-wrap {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 0;
  position: relative;
}

/* Axe horaire */
.time-axis {
  display: flex;
  flex-direction: column;
  padding-top: 36px;
}

.time-tick {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  color: var(--text-3);
  letter-spacing: .05em;
  text-align: right;
  padding-right: 16px;
  flex-shrink: 0;
  position: relative;
}
.time-tick::after {
  content: '';
  position: absolute;
  right: 0; top: 50%;
  width: 8px; height: 1px;
  background: var(--border);
}

/* Ligne de temps actuelle */
.now-line {
  position: absolute;
  left: 80px; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--danger), transparent);
  z-index: 10;
  pointer-events: none;
  display: none;
}
.now-line::before {
  content: '';
  position: absolute;
  left: -4px; top: -4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--danger);
  box-shadow: 0 0 12px var(--danger);
}

/* ── VOIES DE CAMIONS ── */
.lanes-container {
  display: flex;
  flex-direction: column;
  gap: 0;
  border-left: 1px solid var(--border);
  position: relative;
}

/* Lignes horizontales heures */
.hour-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: var(--border);
  pointer-events: none;
  z-index: 0;
}

/* En-têtes des deux lignes de production */
.lanes-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  margin-bottom: 2px;
  padding: 0 2px;
}

.lane-title {
  padding: 10px 16px;
  border-radius: 10px 10px 0 0;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Syne', sans-serif;
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.lane-title.cold-lane {
  background: var(--cold-dim);
  border: 1px solid var(--cold);
  border-bottom: none;
  color: var(--cold);
}
.lane-title.warm-lane {
  background: var(--warm-dim);
  border: 1px solid var(--warm);
  border-bottom: none;
  color: var(--warm);
}
.lane-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  animation: pulse 2s infinite;
}
.cold-lane .lane-dot { background: var(--cold); box-shadow: 0 0 8px var(--cold); }
.warm-lane .lane-dot { background: var(--warm); box-shadow: 0 0 8px var(--warm); }

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .5; transform: scale(.7); }
}

/* ── GRILLE DES ÉCHANGES ── */
.exchanges-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  padding: 2px;
}

/* ── CARTE ÉCHANGE ── */
.exchange-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: all var(--t);
  cursor: pointer;
  animation: cardIn .4s ease both;
}
.exchange-card:hover {
  border-color: var(--border-hi);
  transform: translateY(-1px);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.exchange-card.type-cold {
  border-left: 3px solid var(--cold);
  background: linear-gradient(135deg, rgba(74,184,232,.04) 0%, var(--surface) 60%);
}
.exchange-card.type-warm {
  border-left: 3px solid var(--warm);
  background: linear-gradient(135deg, rgba(232,168,74,.04) 0%, var(--surface) 60%);
}
.exchange-card.status-fait {
  border-left-color: var(--success);
}
.exchange-card.status-nl {
  border-left-color: var(--danger);
  background: linear-gradient(135deg, rgba(232,74,106,.04) 0%, var(--surface) 60%);
  opacity: .7;
}
.exchange-card.status-inactif {
  opacity: .35;
  filter: grayscale(.8);
}

/* Heure badge */
.ex-time {
  font-family: 'DM Mono', monospace;
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
  margin-bottom: 12px;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.ex-time-suffix {
  font-size: .7rem;
  color: var(--text-3);
  letter-spacing: .08em;
  text-transform: uppercase;
}

/* Badge type */
.ex-type-badge {
  position: absolute;
  top: 12px; right: 12px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.cold-badge { background: var(--cold-dim); color: var(--cold); border: 1px solid var(--cold); }
.warm-badge { background: var(--warm-dim); color: var(--warm); border: 1px solid var(--warm); }

/* Corps de la carte — deux colonnes ARRIVÉE / DÉPART */
.ex-body {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 8px;
  align-items: start;
}

.ex-col { display: flex; flex-direction: column; gap: 6px; }

.ex-col-title {
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.ex-col.arrival .ex-col-title { color: var(--cold); }
.ex-col.depart  .ex-col-title { color: var(--warm); }

.ex-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 20px;
  color: var(--text-3);
  font-size: 1rem;
}

/* Champs infos */
.ex-field {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.ex-field-lbl {
  font-size: .58rem;
  color: var(--text-3);
  letter-spacing: .1em;
  text-transform: uppercase;
}
.ex-field-val {
  font-family: 'DM Mono', monospace;
  font-size: .78rem;
  color: var(--text);
  font-weight: 400;
}
.ex-field-val.empty { color: var(--text-3); font-style: italic; }

/* Pied de carte */
.ex-footer {
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.ex-desc {
  font-size: .72rem;
  color: var(--text-2);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Statut pill */
.status-pill {
  padding: 2px 10px;
  border-radius: 20px;
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  flex-shrink: 0;
}
.pill-actif    { background: rgba(74,232,160,.1);  color: var(--success); border: 1px solid rgba(74,232,160,.3); }
.pill-attente  { background: rgba(154,152,144,.1); color: var(--text-2);  border: 1px solid var(--border); }
.pill-fait     { background: rgba(74,232,160,.2);  color: var(--success); border: 1px solid var(--success); }
.pill-nl       { background: var(--danger-dim);    color: var(--danger);  border: 1px solid var(--danger); }
.pill-inactif  { background: transparent;          color: var(--text-3);  border: 1px solid var(--border); }

/* Stock indicator */
.stock-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: rgba(200,121,65,.12);
  border: 1px solid rgba(200,121,65,.3);
  border-radius: 4px;
  font-size: .6rem;
  font-weight: 600;
  color: var(--copper);
  letter-spacing: .08em;
  text-transform: uppercase;
}

/* Heure réelle badge */
.real-time {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Mono', monospace;
  font-size: .72rem;
  color: var(--success);
}
.real-time::before {
  content: '✓';
  font-size: .65rem;
}

/* ── VUE FLUX (timeline visuelle) ── */
.view-toggle {
  display: flex;
  gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
}
.view-btn {
  padding: 5px 14px;
  border-radius: 7px;
  font-size: .72rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--t);
  color: var(--text-3);
  border: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; gap: 6px;
}
.view-btn.active {
  background: var(--raised);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}

/* ── VUE FLUX VISUEL ── */
#view-flux { display: none; }

.flux-container {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  padding: 24px;
}

.flux-hours {
  display: flex;
  margin-bottom: 16px;
  padding-left: 120px;
  gap: 0;
}
.flux-hour-mark {
  flex: 1;
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  color: var(--text-3);
  text-align: center;
  position: relative;
}
.flux-hour-mark::before {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  width: 1px; height: 8px;
  background: var(--border);
}

.flux-row {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 8px;
  height: 44px;
}

.flux-row-label {
  width: 120px;
  flex-shrink: 0;
  font-size: .68rem;
  color: var(--text-2);
  padding-right: 16px;
  text-align: right;
  font-family: 'DM Mono', monospace;
}

.flux-track {
  flex: 1;
  height: 100%;
  background: var(--raised);
  border-radius: 6px;
  position: relative;
  overflow: visible;
  border: 1px solid var(--border);
}

.flux-block {
  position: absolute;
  top: 4px; bottom: 4px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: .65rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  cursor: pointer;
  transition: var(--t);
  min-width: 40px;
}
.flux-block:hover { filter: brightness(1.2); transform: scaleY(1.05); }
.flux-block.cold { background: var(--cold-dim); border: 1px solid var(--cold); color: var(--cold); }
.flux-block.warm { background: var(--warm-dim); border: 1px solid var(--warm); color: var(--warm); }
.flux-block.fait { background: rgba(74,232,160,.15); border-color: var(--success); color: var(--success); }
.flux-block.nl   { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); opacity: .7; }

/* ── CONTRAINTE 1h30 ── */
.gap-indicator {
  position: absolute;
  top: -4px;
  height: calc(100% + 8px);
  background: repeating-linear-gradient(
    90deg,
    transparent 0px,
    transparent 4px,
    rgba(255,255,255,.03) 4px,
    rgba(255,255,255,.03) 8px
  );
  border-left: 1px dashed var(--border-hi);
  border-right: 1px dashed var(--border-hi);
  pointer-events: none;
  z-index: 0;
}

/* ── LÉGENDE ── */
.legend {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 20px;
  padding: 14px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: .68rem;
  color: var(--text-2);
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── SECTION TITRE ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::before {
  content: '';
  width: 3px; height: 16px;
  background: var(--copper);
  border-radius: 2px;
}

/* ── TOAST ── */
.toast-zone {
  position: fixed;
  bottom: 24px; right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--raised);
  border: 1px solid var(--border-hi);
  border-radius: 10px;
  padding: 12px 18px;
  font-size: .78rem;
  color: var(--text);
  animation: toastIn .3s ease;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.toast.ok  { border-color: var(--success); }
.toast.err { border-color: var(--danger); }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── EMPTY STATE ── */
.empty-state {
  grid-column: 1 / -1;
  padding: 60px 20px;
  text-align: center;
  color: var(--text-3);
}
.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: .3;
}
.empty-state p {
  font-size: .82rem;
  letter-spacing: .05em;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .metrics-bar { grid-template-columns: repeat(3,1fr); }
  .exchanges-grid { grid-template-columns: 1fr; }
  .lanes-header { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .main { padding: 16px; }
  .header { padding: 0 16px; }
  .metrics-bar { grid-template-columns: repeat(2,1fr); }
}

/* ── DATE NAV ── */
.date-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-btn {
  width: 30px; height: 30px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--t);
  font-size: .9rem;
}
.nav-btn:hover { border-color: var(--copper); color: var(--text); }

input[type=date].date-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  padding: 5px 10px;
  cursor: pointer;
  outline: none;
  transition: var(--t);
}
input[type=date].date-input:focus { border-color: var(--copper); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--void); }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="brand-badge">SOY</div>
    <div class="brand-name">Flux Camions</div>
  </div>
  <div class="header-sep"></div>
  <div class="date-nav">
    <button class="nav-btn" onclick="shiftDay(-1)">‹</button>
    <input type="date" class="date-input" id="date-picker">
    <button class="nav-btn" onclick="shiftDay(1)">›</button>
  </div>
  <div class="date-chip" id="date-label">—</div>
  <div class="header-right">
    <div class="view-toggle">
      <button class="view-btn active" id="vbtn-cards" onclick="setView('cards')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Cartes

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://xppzmdmnuztozgukrcta.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';
const sb = supabase.createClient(SB_URL, SB_KEY);

const SLOTS = [
  {idx:0, h:'06:00', lbl:'06h00 · A', type:'CHAUFFÉE'},
  {idx:1, h:'06:00', lbl:'06h00 · B', type:'REEFER'},
  {idx:2, h:'07:30', lbl:'07h30',     type:'CHAUFFÉE'},
  {idx:3, h:'09:00', lbl:'09h00',     type:'CHAUFFÉE'},
  {idx:4, h:'11:30', lbl:'11h30',     type:'CHAUFFÉE'},
  {idx:5, h:'14:00', lbl:'14h00',     type:'CHAUFFÉE'},
  {idx:6, h:'15:30', lbl:'15h30',     type:'CHAUFFÉE'},
  {idx:7, h:'17:00', lbl:'17h00',     type:'CHAUFFÉE'},
  {idx:8, h:'18:00', lbl:'18h00',     type:'CHAUFFÉE'},
  {idx:9, h:'19:00', lbl:'19h00',     type:'CHAUFFÉE'},
];

const WK_INACTIF = [0,1,7,8,9];
let curDate = todayStr();
let _params = {};
let _rows   = {};
let _currentView = 'cards';

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function toMin(hhmm) {
  if (!hhmm) return 0;
  const [h,m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function isWkEnd() {
  const d = new Date(curDate + 'T12:00:00').getDay();
  return d === 0 || d === 6;
}

function isInactif(slot, row) {
  const sl = (row?.statut_ligne || '').trim();
  const vI = (_params['statut_ligne']||[])[1]?.valeur || 'INACTIF';
  if (sl === vI) return true;
  if (!sl && isWkEnd() && WK_INACTIF.includes(slot.idx)) return true;
  return false;
}

function isNL(row) {
  const vNL = (_params['statut_ligne']||[])[2]?.valeur || 'NON LIVRÉ';
  return (row?.statut_ligne || '').trim() === vNL;
}

function isFait(row) {
  const vF = (_params['statut_arrivee']||[])[0]?.valeur || 'FAIT';
  return (row?.statut_arrivee || '').trim() === vF;
}

function isReefer(slot, row) {
  const tc = (row?.type_camion || '').trim();
  const vR = (_params['type_camion']||[])[0]?.valeur || 'REEFER';
  return tc === vR || slot.type === 'REEFER';
}

function hasStock(row) {
  const d = (row?.description || '').toLowerCase();
  return d.includes('stock') || d.includes('bobtail') === false && d.includes('stock');
}

// ── CHARGEMENT ─────────────────────────────────────────────────
async function load() {
  const grid = document.getElementById('exchanges-grid');
  grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>Chargement…</p></div>';

  // Params
  const { data: pData } = await sb.from('planning_params').select('*');
  _params = {};
  if (pData) {
    pData.forEach(p => {
      if (!_params[p.type]) _params[p.type] = [];
      _params[p.type].push(p);
    });
    Object.values(_params).forEach(arr => arr.sort((a,b) => a.ordre - b.ordre));
  }

  // Rows
  const { data: rData } = await sb.from('planning_camions').select('*').eq('date_jour', curDate);
  _rows = {};
  if (rData) rData.forEach(r => { _rows[r.slot_index] = r; });

  updateMetrics();
  renderCards();
  if (_currentView === 'flux') renderFlux();
}

// ── MÉTRIQUES ──────────────────────────────────────────────────
function updateMetrics() {
  let cold=0, warm=0, livres=0, nl=0, total=0;
  for (const s of SLOTS) {
    const row = _rows[s.idx];
    if (isInactif(s, row)) continue;
    total++;
    if (isReefer(s, row)) cold++; else warm++;
    if (isNL(row)) nl++;
    else if (isFait(row)) livres++;
  }
  document.getElementById('m-cold').textContent   = cold;
  document.getElementById('m-warm').textContent   = warm;
  document.getElementById('m-livres').textContent = livres;
  document.getElementById('m-nl').textContent     = nl;
  const arrived = livres;
  const taux = (total - nl) > 0 ? Math.round(livres / (total - nl) * 100) : null;
  document.getElementById('m-taux').textContent   = taux !== null ? taux + '%' : '—';
}

// ── RENDER CARTES ──────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('exchanges-grid');
  grid.innerHTML = '';

  // On groupe par créneau, côte à côte (cold gauche, warm droite)
  // Collecte tous les slots actifs
  const active = SLOTS.filter(s => !isInactif(s, _rows[s.idx]));

  if (active.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>Aucun échange planifié pour cette journée.</p></div>';
    return;
  }

  // Séparer cold et warm
  const coldSlots = active.filter(s => isReefer(s, _rows[s.idx]));
  const warmSlots = active.filter(s => !isReefer(s, _rows[s.idx]));

  // Construire colonne gauche (cold) et droite (warm) alternées
  const maxLen = Math.max(coldSlots.length, warmSlots.length);
  for (let i = 0; i < maxLen; i++) {
    const cSlot = coldSlots[i];
    const wSlot = warmSlots[i];
    if (cSlot) grid.appendChild(buildCard(cSlot, _rows[cSlot.idx], 'cold'));
    else       grid.appendChild(buildEmptyCell());
    if (wSlot) grid.appendChild(buildCard(wSlot, _rows[wSlot.idx], 'warm'));
    else       grid.appendChild(buildEmptyCell());
  }
}

function buildEmptyCell() {
  const d = document.createElement('div');
  return d;
}

function buildCard(slot, row, lane) {
  const card = document.createElement('div');
  const inactif = isInactif(slot, row);
  const nl      = isNL(row);
  const fait    = isFait(row);

  card.className = `exchange-card type-${lane}${nl ? ' status-nl' : fait ? ' status-fait' : ''}${inactif ? ' status-inactif' : ''}`;
  card.style.animationDelay = (slot.idx * 40) + 'ms';

  const vAttente  = (_params['statut_arrivee']||[])[1]?.valeur || 'ATTENTE';
  const vFait     = (_params['statut_arrivee']||[])[0]?.valeur || 'FAIT';
  const destDep   = row?.destination  || (_params['destination']||[])[0]?.valeur || '—';
  const destArr   = row?.dest_arrivee || (_params['dest_arrivee']||[])[0]?.valeur || '—';
  const numArr    = row?.num_arr   || '';
  const numDep    = row?.num_dep   || '';
  const desc      = row?.description || '';
  const hReelle   = row?.heure_reelle || '';
  const charg     = row?.chargement  || (_params['chargement']||[])[1]?.valeur || '';
  const arrivee   = row?.statut_arrivee || vAttente;
  const stockIn   = desc.toLowerCase().includes('stock') && !desc.toLowerCase().includes('stock 0');

  // Badge type
  const typeLbl = lane === 'cold' ? 'Réfrigéré' : 'Tempéré';
  const badgeCls = lane === 'cold' ? 'cold-badge' : 'warm-badge';

  // Statut pill
  let pillClass = 'pill-attente', pillLbl = 'En attente';
  if (inactif)    { pillClass = 'pill-inactif'; pillLbl = 'Inactif'; }
  else if (nl)    { pillClass = 'pill-nl';      pillLbl = 'Non livré'; }
  else if (fait)  { pillClass = 'pill-fait';    pillLbl = 'Livré'; }

  card.innerHTML = `
    <span class="ex-type-badge ${badgeCls}">${typeLbl}</span>

    <div class="ex-time">
      ${slot.h.replace(':','h')}
      <span class="ex-time-suffix">${slot.lbl.includes('·') ? slot.lbl.split('·')[1].trim() : ''}</span>
    </div>

    <div class="ex-body">
      <div class="ex-col arrival">
        <div class="ex-col-title">↓ Arrivée</div>
        <div class="ex-field">
          <div class="ex-field-lbl">Provenance</div>
          <div class="ex-field-val">${destArr || '<span class="empty">—</span>'}</div>
        </div>
        <div class="ex-field">
          <div class="ex-field-lbl">N° camion entrant</div>
          <div class="ex-field-val ${numArr ? '' : 'empty'}">${numArr || 'Non assigné'}</div>
        </div>
        <div class="ex-field">
          <div class="ex-field-lbl">Statut arrivée</div>
          <div class="ex-field-val">${arrivee}</div>
        </div>
        ${hReelle ? `<div class="real-time">${hReelle}</div>` : ''}
      </div>

      <div class="ex-arrow">⇄</div>

      <div class="ex-col depart">
        <div class="ex-col-title">↑ Départ</div>
        <div class="ex-field">
          <div class="ex-field-lbl">Destination</div>
          <div class="ex-field-val">${destDep || '<span class="empty">—</span>'}</div>
        </div>
        <div class="ex-field">
          <div class="ex-field-lbl">N° camion sortant</div>
          <div class="ex-field-val ${numDep ? '' : 'empty'}">${numDep || 'Non assigné'}</div>
        </div>
        <div class="ex-field">
          <div class="ex-field-lbl">Chargement</div>
          <div class="ex-field-val">${charg || '—'}</div>
        </div>
      </div>
    </div>

    <div class="ex-footer">
      <div class="ex-desc">
        ${stockIn ? `<span class="stock-tag">📦 Stock</span> ` : ''}
        ${desc || '<span style="color:var(--text-3)">Aucune description</span>'}
      </div>
      <span class="status-pill ${pillClass}">${pillLbl}</span>
    </div>
  `;

  return card;
}

// ── RENDER FLUX ────────────────────────────────────────────────
function renderFlux() {
  const container = document.getElementById('flux-container');
  const hoursDiv  = document.getElementById('flux-hours');
  const rowsDiv   = document.getElementById('flux-rows');
  hoursDiv.innerHTML = '';
  rowsDiv.innerHTML  = '';

  const START_MIN = 6 * 60;   // 06:00
  const END_MIN   = 19 * 60 + 30; // 19:30
  const RANGE     = END_MIN - START_MIN;
  const GAP_MIN   = 90; // contrainte 1h30

  // Heures
  for (let h = 6; h <= 19; h++) {
    const mark = document.createElement('div');
    mark.className = 'flux-hour-mark';
    mark.textContent = h + 'h';
    hoursDiv.appendChild(mark);
  }

  // Voies
  const lanes = [
    { label: 'Réfrigéré', slots: SLOTS.filter(s => isReefer(s, _rows[s.idx]) && !isInactif(s, _rows[s.idx])), cls: 'cold' },
    { label: 'Tempéré',   slots: SLOTS.filter(s => !isReefer(s, _rows[s.idx]) && !isInactif(s, _rows[s.idx])), cls: 'warm' },
  ];

  for (const lane of lanes) {
    const row = document.createElement('div');
    row.className = 'flux-row';

    const lbl = document.createElement('div');
    lbl.className = 'flux-row-label';
    lbl.textContent = lane.label;
    row.appendChild(lbl);

    const track = document.createElement('div');
    track.className = 'flux-track';

    // Zones tampons 1h30 entre chaque slot
    for (let i = 0; i < lane.slots.length - 1; i++) {
      const s1 = lane.slots[i];
      const s2 = lane.slots[i+1];
      const gapStart = toMin(s1.h);
      const gapEnd   = gapStart + GAP_MIN;
      const leftPct  = ((gapStart - START_MIN) / RANGE) * 100;
      const widthPct = (GAP_MIN / RANGE) * 100;
      const gap = document.createElement('div');
      gap.className = 'gap-indicator';
      gap.style.left  = leftPct + '%';
      gap.style.width = widthPct + '%';
      gap.title = '1h30 minimum requis';
      track.appendChild(gap);
    }

    // Blocs
    for (const s of lane.slots) {
      const row_data = _rows[s.idx];
      const startMin = toMin(s.h);
      const leftPct  = ((startMin - START_MIN) / RANGE) * 100;
      const widthPct = (60 / RANGE) * 100; // 1h de largeur visuelle

      const block = document.createElement('div');
      const nl   = isNL(row_data);
      const fait = isFait(row_data);
      block.className = `flux-block ${lane.cls}${nl ? ' nl' : fait ? ' fait' : ''}`;
      block.style.left  = leftPct + '%';
      block.style.width = widthPct + '%';

      const dest = row_data?.destination || (_params['destination']||[])[0]?.valeur || '';
      block.textContent = s.h.replace(':','h') + (dest ? ' · ' + dest : '');
      block.title = `${s.lbl} — ${dest || 'Destination inconnue'}`;
      track.appendChild(block);
    }

    row.appendChild(track);
    rowsDiv.appendChild(row);
  }
}

// ── NAVIGATION DATE ────────────────────────────────────────────
function updateDateLabel() {
  const d = new Date(curDate + 'T12:00:00');
  const lbl = d.toLocaleDateString('fr-CA', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
  document.getElementById('date-label').textContent =
    lbl.charAt(0).toUpperCase() + lbl.slice(1);
  document.getElementById('date-picker').value = curDate;
}

function shiftDay(delta) {
  const d = new Date(curDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  curDate = d.toISOString().slice(0,10);
  updateDateLabel();
  load();
}

function goToday() {
  curDate = todayStr();
  updateDateLabel();
  load();
}

document.getElementById('date-picker').addEventListener('change', e => {
  curDate = e.target.value;
  updateDateLabel();
  load();
});

// ── VUE ────────────────────────────────────────────────────────
function setView(v) {
  _currentView = v;
  document.getElementById('view-cards').style.display = v === 'cards' ? '' : 'none';
  document.getElementById('view-flux').style.display  = v === 'flux'  ? '' : 'none';
  document.getElementById('vbtn-cards').classList.toggle('active', v === 'cards');
  document.getElementById('vbtn-flux').classList.toggle('active',  v === 'flux');
  if (v === 'flux') renderFlux();
}

// ── INIT ───────────────────────────────────────────────────────
updateDateLabel();
load();
</script>
</body>
