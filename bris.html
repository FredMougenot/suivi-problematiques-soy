<html lang="fr">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bris — Expédition SOY</title>

<style>
.pg-chart-panel{background:linear-gradient(135deg,#0B0D13 0%,#0F1118 50%,#15181F 100%);border-radius:20px;padding:24px;margin:16px 0 8px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(200,132,58,.1);}
.pg-chart-panel::before{content:'';position:absolute;inset:0;border-radius:20px;padding:2px;background:linear-gradient(135deg,rgba(200,132,58,.4) 0%,rgba(45,212,160,.3) 50%,rgba(200,132,58,.4) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.pg-chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;position:relative;z-index:1;}
@media(max-width:700px){.pg-chart-grid{grid-template-columns:1fr;}}
.pg-chart-box{background:linear-gradient(135deg,rgba(26,30,42,.8),rgba(21,24,31,.8));border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:all .4s;}
.pg-chart-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,rgba(200,132,58,.6),rgba(224,85,85,.6));opacity:0;transition:opacity .4s;}
.pg-chart-box:hover{border-color:rgba(200,132,58,.4);transform:translateY(-3px);}
.pg-chart-box:hover::before{opacity:1;}
.pg-chart-title{font-size:.68rem;font-weight:800;color:var(--copper);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.pg-chart-title::before{content:'';width:4px;height:12px;background:linear-gradient(180deg,var(--copper),var(--copper-light));border-radius:2px;}
</style>
<style>
/* ── Page Bris ───────────────────────────────────────────── */
.date-nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:18px 28px 0;}
.date-arr{width:34px;height:34px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;}
.date-arr:hover{border-color:var(--copper);color:var(--copper-light);}
.date-lbl{font-size:1rem;font-weight:700;color:var(--text-primary);padding:7px 22px;background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-md);min-width:260px;text-align:center;}
.today-chip{font-size:.65rem;font-weight:700;color:var(--copper-light);background:var(--copper-dim);border:1px solid rgba(200,132,58,.25);padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;}

/* Table Bris */
.bris-outer{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.bris-tbl{width:100%;border-collapse:collapse;min-width:980px;}
.bris-tbl thead tr{background:var(--bg-float);border-bottom:2px solid var(--text-faint);}
.bris-tbl thead th{padding:12px 13px;font-size:.6rem;font-weight:800;color:var(--copper);letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;text-align:left;}
.bris-tbl thead th.th-c{text-align:center;}
.bris-tbl tbody tr{border-bottom:1px solid var(--text-faint);transition:background .1s;}
.bris-tbl tbody tr:last-child{border-bottom:none;}
.bris-tbl tbody tr:hover td{background:rgba(200,132,58,.022);}
.bris-tbl tbody td{padding:9px 13px;font-size:.84rem;color:var(--text-primary);vertical-align:middle;}

/* Inputs */
.ii{background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-primary);border-radius:var(--r-sm);padding:6px 9px;font-size:.82rem;font-family:'Outfit',sans-serif;outline:none;transition:border-color .15s;}
.ii:focus{border-color:var(--copper);}
.ii-wide{width:180px;}
.ii-num{width:80px;text-align:right;}
.ii-cost{width:90px;text-align:right;}
.ii-comment{width:200px;}
.ii-date{width:130px;}

/* Checkbox étapes */
.step-cell{text-align:center;}
.step-chk{
  width:22px;height:22px;border-radius:5px;cursor:pointer;
  appearance:none;-webkit-appearance:none;
  background:var(--bg-float);border:2px solid var(--text-faint);
  transition:all .15s;position:relative;flex-shrink:0;
}
.step-chk:checked{background:var(--emerald);border-color:var(--emerald);}
.step-chk:checked::after{
  content:'✓';position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:#0F1118;font-size:.75rem;font-weight:900;
}
/* Étape destruction = rouge */
.step-dest:checked{background:var(--ruby);border-color:var(--ruby);}
/* Étape finalisé = amber */
.step-fin:checked{background:var(--amber);border-color:var(--amber);}

/* Input date finalisation */
.date-fin{
  background:var(--bg-float);border:1px solid var(--text-faint);
  color:var(--text-primary);border-radius:var(--r-sm);
  padding:5px 7px;font-size:.78rem;font-family:'Outfit',sans-serif;
  outline:none;transition:border-color .15s;width:130px;
}
.date-fin:focus{border-color:var(--amber);}
.date-fin:disabled{opacity:.35;cursor:not-allowed;}

/* Bouton sauver */
.btn-sv{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.73rem;font-weight:700;border:none;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn-sv:hover{opacity:.85;}
.btn-sv:disabled{opacity:.35;cursor:default;}
.btn-rm{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--text-faint);color:var(--text-muted);cursor:pointer;font-size:.72rem;margin-left:4px;transition:all .15s;}
.btn-rm:hover{border-color:var(--ruby);color:var(--ruby);background:var(--ruby-bg);}

/* Ligne numéro */
.row-num{font-size:.78rem;font-weight:700;color:var(--text-muted);text-align:center;}

/* Stats bar */
.stats-bar{display:flex;gap:10px;padding:16px 28px 0;flex-wrap:wrap;}
.sp{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--text-faint);font-size:.8rem;font-weight:600;}
.sp-dot{width:8px;height:8px;border-radius:50%;}
.sp-val{color:var(--text-primary);margin-right:2px;}
.sp-lbl{color:var(--text-muted);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:var(--bg-float);border:1px solid var(--text-faint);border-radius:var(--r-lg);padding:26px;width:400px;max-width:95vw;box-shadow:0 16px 48px rgba(0,0,0,.6);position:relative;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--copper),transparent);border-radius:var(--r-lg) var(--r-lg) 0 0;}
.modal-title{font-size:1.05rem;font-weight:700;color:var(--text-primary);margin-bottom:18px;display:flex;align-items:center;gap:9px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
.fg input{width:100%;background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-primary);border-radius:var(--r-md);padding:9px 12px;font-size:.86rem;font-family:'Outfit',sans-serif;outline:none;transition:border-color .15s;}
.fg input:focus{border-color:var(--copper);}
.m-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.btn-cx{padding:8px 16px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-secondary);font-size:.84rem;font-weight:600;cursor:pointer;}
.btn-cx:hover{color:var(--text-primary);}
.btn-ok{padding:8px 18px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.84rem;font-weight:700;border:none;cursor:pointer;}
.btn-ok:hover{opacity:.88;}

/* Total coût */
.total-bar{display:flex;align-items:center;gap:8px;padding:14px 18px;margin-top:14px;background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);}
.total-lbl{font-size:.72rem;font-weight:700;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;}
.total-val{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:700;color:var(--ruby);}

@media(max-width:1100px){.date-nav,.stats-bar{padding-left:10px;padding-right:10px;}}
.btn-add{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:var(--r-md);
  background:linear-gradient(135deg,var(--copper),var(--copper-light));
  color:#0F1118;font-size:.82rem;font-weight:800;border:none;cursor:pointer;
  transition:opacity .15s,transform .1s;white-space:nowrap;
}
.btn-add:hover{opacity:.88;transform:translateY(-1px);}
.btn-add:active{transform:translateY(0);}
</style>
</head>
<body>
<div class="tool-wrap">

<!-- TOPBAR -->
<div class="tool-topbar">
  <a href="index.html" class="tool-back">

    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>

<!-- MAIN -->
<div class="tool-main" style="padding-top:16px;">

  <!-- Graphiques Bris — coûts ($) -->
  <div class="pg-chart-panel">

      <div class="pg-chart-box">

          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>

        </div>
        <canvas id="bris-chart-week"></canvas>

          <div style="width:3px;height:14px;background:rgba(232,164,58,.8);border-radius:2px;flex-shrink:0;"></div>
          <label style="font-size:.68rem;color:var(--text-muted);font-weight:600;white-space:nowrap;">Limite acceptable ($)</label>
          <input type="number" id="bris-limit-week" min="0" placeholder="—"
            style="width:80px;background:rgba(15,17,24,.8);border:1px solid rgba(200,132,58,.3);color:var(--text-primary);border-radius:8px;padding:5px 8px;font-size:.82rem;font-family:'Outfit',sans-serif;outline:none;"
            oninput="saveBrisLimit('week',this.value)">

      </div>
      <div class="pg-chart-box">
        <div class="pg-chart-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Coûts des bris ($) — Mois
        </div>
        <canvas id="bris-chart-month"></canvas>
        <div style="display:flex;align-items:center;gap:8px;margin-top:12px;">
          <div style="width:3px;height:14px;background:rgba(232,164,58,.8);border-radius:2px;flex-shrink:0;"></div>
          <label style="font-size:.68rem;color:var(--text-muted);font-weight:600;white-space:nowrap;">Limite acceptable ($)</label>
          <input type="number" id="bris-limit-month" min="0" placeholder="—"
            style="width:80px;background:rgba(15,17,24,.8);border:1px solid rgba(200,132,58,.3);color:var(--text-primary);border-radius:8px;padding:5px 8px;font-size:.82rem;font-family:'Outfit',sans-serif;outline:none;"

  <div style="margin-bottom:8px;">

        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter un bris
      </button>
  </div>
  <div id="spinner" class="spinner" style="display:flex"><div class="spin"></div> Chargement…</div>

  <div id="bris-wrap" style="display:none">

<div style="display:flex;justify-content:center;padding:12px 0 4px;">
  <button onclick="submitNcBris()" style="display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--ruby);color:var(--ruby);font-size:.86rem;font-weight:700;cursor:pointer;transition:all .15s;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

</div><!-- /tool-wrap -->

<script>


function localToday(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const SB_URL = 'https://xppzmdmnuztozgukrcta.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';
const sb = supabase.createClient(SB_URL, SB_KEY);

let curDate = todayStr();
let rows = {}; // id -> row

function todayStr(){ return localToday(); }
function isToday(){ return curDate === todayStr(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(v){ return parseFloat(v||0).toLocaleString('fr-CA',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function toast(msg, type='info'){
  const t = document.createElement('div');
  t.className = 'toast-item toast-' + type; t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},4000);
}

// ── DATE ────────────────────────────────────────────────────
function updateDateUI(){
  const d = new Date(curDate+'T00:00:00');
  const lbl = d.toLocaleDateString('fr-CA',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('date-lbl').innerHTML = lbl + (isToday()?'<span class="today-chip">Aujourd\'hui</span>':'');
}
function changeDay(d){ const dt=new Date(curDate+'T00:00:00'); dt.setDate(dt.getDate()+d); curDate=dt.toISOString().slice(0,10); updateDateUI(); load(); }
function goToday(){ curDate=todayStr(); updateDateUI(); load(); }

// ── LOAD ────────────────────────────────────────────────────
async function init(){
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ window.location.href='index.html'; return; }
    updateDateUI();
    await load();
  } catch(e){ window.location.href='index.html'; }
}
window.addEventListener('load', init);

async function load(){
  document.getElementById('spinner').style.display='flex';
  document.getElementById('bris-wrap').style.display='none';
  rows={};
  try{
    const {data,error}=await sb.from('bris').select('*').eq('date_jour',curDate).order('created_at');
    if(error && error.code!=='PGRST116') throw error;
    (data||[]).forEach(r=>{ rows[r.id]=r; });
  }catch(e){ toast('Erreur: '+e.message,'error'); }
  render();
  document.getElementById('spinner').style.display='none';
  document.getElementById('bris-wrap').style.display='block';
  // Charger graphiques
  loadBrisHistory().then(()=>requestAnimationFrame(()=>renderBrisCharts()));
}

// ── RENDER ──────────────────────────────────────────────────
function render(){
  const list = Object.values(rows).sort((a,b)=> new Date(a.created_at)-new Date(b.created_at));
  const svgSave = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>';

  document.getElementById('bris-tbody').innerHTML = list.map((r,i)=>`
    <tr id="brow-${r.id}">
      <td class="row-num">${i+1}</td>
      <td><input class="ii ii-wide" value="${esc(r.item||'')}" placeholder="Item…" oninput="fchg(${r.id},'item',this.value)"></td>
      <td><input class="ii ii-num" type="number" min="0" step="1" value="${r.quantite||''}" placeholder="0" oninput="fchg(${r.id},'quantite',this.value)"></td>
      <td><input class="ii ii-cost" type="number" min="0" step="0.01" value="${r.poids||''}" placeholder="0.00" oninput="fchg(${r.id},'poids',this.value)"></td>
      <td><input class="ii ii-cost" type="number" min="0" step="0.01" value="${r.cout||''}" placeholder="0.00" oninput="fchg(${r.id},'cout',this.value);updateTotal()"></td>
      <td class="step-cell">
        <input type="checkbox" class="step-chk" ${r.etape1?'checked':''} onchange="fchg(${r.id},'etape1',this.checked)">
      </td>
      <td class="step-cell">
        <input type="checkbox" class="step-chk step-dest" ${r.etape2?'checked':''} onchange="fchg(${r.id},'etape2',this.checked)">
      </td>
      <td class="step-cell">
        <input type="date" class="date-fin" value="${r.date_finalisation||''}" ${!r.etape2?'disabled':''} onchange="fchg(${r.id},'date_finalisation',this.value)">
      </td>
      <td><input class="ii ii-comment" value="${esc(r.commentaires||'')}" placeholder="Commentaires…" oninput="fchg(${r.id},'commentaires',this.value)"></td>
      <td>
        <button class="btn-sv" id="bsv-${r.id}" onclick="saveRow(${r.id})">${svgSave} Sauver</button>
        <button class="btn-rm" onclick="delRow(${r.id})" title="Supprimer">✕</button>
      </td>
    </tr>`).join('');

  // Activer/désactiver la date finalisation selon étape2
  list.forEach(r=>{
    const chk = document.querySelector(`#brow-${r.id} .step-dest`);
    const dateInp = document.querySelector(`#brow-${r.id} .date-fin`);
    if(chk && dateInp){
      chk.addEventListener('change', ()=>{ dateInp.disabled = !chk.checked; });
    }
  });

  updateStats(list);
  updateTotal(list);
}

// ── CHAMPS ──────────────────────────────────────────────────
function fchg(id, field, val){
  if(!rows[id]) return;
  rows[id][field] = val;
}

// ── STATS ───────────────────────────────────────────────────
function updateStats(list){
  list = list || Object.values(rows);
  const totalCout = list.reduce((s,r)=>s+parseFloat(r.cout||0)*parseFloat(r.quantite||1),0);
  const coutFmt = fmt(totalCout)+' $';
  const el = document.getElementById('total-cout');
  if(el) el.textContent = coutFmt;
}

function updateTotal(){
  updateStats(Object.values(rows));
}

// ── SAVE ────────────────────────────────────────────────────
async function saveRow(id){
  const r = rows[id]; if(!r) return;
  const btn = document.getElementById('bsv-'+id);
  if(btn){ btn.disabled=true; btn.textContent='…'; }

  const payload = {
    date_jour:         curDate,
    item:              r.item||'',
    quantite:          parseFloat(r.quantite)||null,
    poids:             parseFloat(r.poids)||null,
    cout:              parseFloat(r.cout)||null,
    etape1:            !!r.etape1,
    etape2:            !!r.etape2,
    date_finalisation: r.date_finalisation||null,
    commentaires:      r.commentaires||null,
    updated_at:        new Date().toISOString(),
  };

  const {error} = await sb.from('bris').update(payload).eq('id',id);
  const svgSave = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>';
  if(btn){ btn.disabled=false; btn.innerHTML=svgSave+' Sauver'; }
  if(error){ toast('Erreur: '+error.message,'error'); return; }
  toast('Bris sauvegardé ✓','success');
}

// ── DELETE ──────────────────────────────────────────────────
async function delRow(id){
  if(!confirm('Supprimer ce bris ?')) return;
  const {error} = await sb.from('bris').delete().eq('id',id);
  if(error){ toast('Erreur: '+error.message,'error'); return; }
  delete rows[id]; render();
  toast('Supprimé.','info');
}

// ── MODAL ───────────────────────────────────────────────────
function openModal(){
  document.getElementById('m-item').value='';
  document.getElementById('m-qte').value='';
  document.getElementById('m-cout').value='';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('m-item').focus(),50);
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('modal').addEventListener('click',e=>{
    if(e.target===document.getElementById('modal')) closeModal();
  });
});

async function confirmAdd(){
  const item = document.getElementById('m-item').value.trim();
  if(!item){ toast('Veuillez entrer un item.','error'); return; }
  const qte  = parseFloat(document.getElementById('m-qte').value)||1;
  const cout = parseFloat(document.getElementById('m-cout').value)||null;

  const payload = {
    date_jour: curDate,
    item, quantite: qte, cout,
    etape1: false, etape2: false,
    date_finalisation: null, commentaires: null,
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString(),
  };

  const {data,error} = await sb.from('bris').insert([payload]).select().single();
  if(error){ toast('Erreur: '+error.message,'error'); return; }
  rows[data.id] = data;
  closeModal(); render();
  const tr = document.getElementById('brow-'+data.id);
  if(tr) tr.scrollIntoView({behavior:'smooth',block:'center'});
  toast('Bris ajouté ✓','success');
}

async function submitNcBris(){
  const list = Object.values(rows);
  if(list.length === 0){ toast('Aucun bris à soumettre.','error'); return; }
  const lignes = list.map(r => {
    const item  = r.item     || '—';
    const qte   = r.quantite != null ? r.quantite      : '—';
    const poids = r.poids    != null ? r.poids + ' kg' : '—';
    const cout  = r.cout     != null ? r.cout  + ' $'  : '—';
    return `• ${item} | Qté: ${qte} | Poids: ${poids} | Coût: ${cout}`;
  });
  const desc = `Date: ${curDate}\n` + lignes.join('\n');
  const {error} = await sb.from('problematiques').insert([{
    intitule: 'Perte/Bris', pilier: 'Couts', priorite: 'Basse',
    statut: 'À traiter', description: desc,
    created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
  }]);
  if(error){ toast('Erreur: '+error.message,'error'); return; }
  toast('Non-conformité créée dans Problématiques ✓','success');
}

// ── GRAPHIQUES BRIS (coûts $) ─────────────────────────────────────
let brisChartWeek=null, brisChartMonth=null;
let brisHistByDay={};

function saveBrisLimit(key, val){
  try{ localStorage.setItem('bris_limit_'+key, val); }catch(e){}
  renderBrisCharts();
}
function getBrisLimit(key){
  try{ const v=localStorage.getItem('bris_limit_'+key); return v!==null&&v!==''?Number(v):null; }catch(e){ return null; }
}

async function loadBrisHistory(){
  try{
    const now=new Date();
    const firstDay=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
    const {data,error}=await sb.from('bris').select('date_jour,cout,quantite').gte('date_jour',firstDay);
    if(error){ console.warn('loadBrisHistory:',error.message); return; }
    brisHistByDay={};
    (data||[]).forEach(r=>{
      const d=r.date_jour; if(!d) return;
      brisHistByDay[d]=(brisHistByDay[d]||0)+parseFloat(r.cout||0)*parseFloat(r.quantite||1);
    });
  }catch(e){ console.warn('loadBrisHistory:',e); }
}

function renderBrisCharts(){
  const now=new Date();
  const dow=now.getDay(), mondayOff=dow===0?-6:1-dow;
  const monday=new Date(now); monday.setDate(now.getDate()+mondayOff);
  const weekLabels=[], weekData=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    weekLabels.push(d.toLocaleDateString('fr-CA',{weekday:'short',day:'numeric'}));
    weekData.push(Math.round((brisHistByDay[ds]||0)*100)/100);
  }
  const yr=now.getFullYear(), mo=now.getMonth();
  const monthLabels=[], monthData=[];
  for(let i=1;i<=now.getDate();i++){
    const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(i).padStart(2,'0');
    monthLabels.push(String(i));
    monthData.push(Math.round((brisHistByDay[ds]||0)*100)/100);
  }

  function buildDS(data,label,limit){
    const c=document.createElement('canvas').getContext('2d');
    const gS=c.createLinearGradient(0,0,500,0);
    gS.addColorStop(0,'rgba(224,85,85,1)');gS.addColorStop(0.5,'rgba(232,164,58,1)');gS.addColorStop(1,'rgba(200,132,58,1)');
    const gF=c.createLinearGradient(0,0,0,200);
    gF.addColorStop(0,'rgba(224,85,85,0.4)');gF.addColorStop(0.5,'rgba(232,164,58,0.2)');gF.addColorStop(1,'rgba(200,132,58,0.05)');
    const ds=[{label,data,fill:true,backgroundColor:gF,borderColor:gS,borderWidth:3,
      pointRadius:4,pointHoverRadius:7,pointBackgroundColor:'rgba(224,85,85,1)',
      pointBorderColor:'#fff',pointBorderWidth:2,tension:0.4}];
    if(limit!==null) ds.push({label:'Limite',data:data.map(()=>limit),
      borderColor:'rgba(232,164,58,0.85)',backgroundColor:'rgba(232,164,58,0.08)',
      borderWidth:2,borderDash:[8,4],pointRadius:0,fill:false,tension:0});
    return ds;
  }
  const opts={responsive:false,maintainAspectRatio:false,
    animation:{duration:1000,easing:'easeInOutQuart'},
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{enabled:true,
      backgroundColor:'rgba(15,17,24,0.95)',titleColor:'#C8843A',bodyColor:'#F0EAE0',
      borderColor:'rgba(200,132,58,0.5)',borderWidth:1,padding:10,
      titleFont:{size:11,weight:'700',family:"'Outfit',sans-serif"},
      bodyFont:{size:10,weight:'500',family:"'Outfit',sans-serif"},
      callbacks:{label:(ctx)=>ctx.datasetIndex===1?'Limite : '+ctx.parsed.y+' $':ctx.parsed.y+' $'}}},
    scales:{
      x:{ticks:{color:'#BEC5D6',font:{size:9,weight:'600',family:"'Outfit',sans-serif"},maxRotation:0,padding:6},grid:{color:'rgba(255,255,255,0.05)',drawBorder:false}},
      y:{ticks:{color:'#BEC5D6',font:{size:9,weight:'600',family:"'Outfit',sans-serif"},padding:6,callback:v=>v+'$'},grid:{color:'rgba(255,255,255,0.08)',drawBorder:false},beginAtZero:true}
    }};

  function drawChart(id,labels,data,existing,label,limit){
    const el=document.getElementById(id); if(!el) return existing;
    if(existing) existing.destroy();
    const box=el.closest('.pg-chart-box')||el.parentElement;
    const w=box?Math.floor(box.getBoundingClientRect().width-40):280;
    el.width=w>80?w:280; el.height=160;
    return new Chart(el,{type:'line',data:{labels,datasets:buildDS(data,label,limit)},options:opts});
  }
  ['week','month'].forEach(k=>{
    const el=document.getElementById('bris-limit-'+k);
    if(el){ const v=getBrisLimit(k); el.value=v!==null?v:''; }
  });
  brisChartWeek =drawChart('bris-chart-week', weekLabels, weekData, brisChartWeek, 'Couts ($)', getBrisLimit('week'));
  brisChartMonth=drawChart('bris-chart-month',monthLabels,monthData,brisChartMonth,'Couts ($)', getBrisLimit('month'));
}

// ── EXPORT PDF BRIS ───────────────────────────────────────────────
async function exportPDF(){
  try{
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const W=pdf.internal.pageSize.getWidth(), H=pdf.internal.pageSize.getHeight(), M=10;
    let y=M;
    const C={copper:[200,132,58],black:[10,11,13],grey:[107,114,128],
              emerald:[45,212,160],ruby:[224,85,85],amber:[232,164,58],faint:[44,51,80]};

    pdf.setFillColor(...C.copper); pdf.rect(0,0,W,1.5,'F');
    pdf.setFontSize(15);pdf.setFont('helvetica','bold');pdf.setTextColor(...C.black);
    const pageTitle=document.getElementById('page-title')?.textContent||'Suivi des Bris';
    pdf.text(pageTitle+' — SOY', M, y+7);
    pdf.setFontSize(8);pdf.setFont('helvetica','normal');pdf.setTextColor(...C.grey);
    pdf.text('Exporte le '+new Date().toLocaleDateString('fr-CA',{day:'2-digit',month:'long',year:'numeric'})+'  Date : '+curDate, W-M, y+7,{align:'right'});
    y+=14;
    pdf.setDrawColor(...C.faint);pdf.setLineWidth(0.2);pdf.line(M,y,W-M,y);y+=5;

    // KPI
    const list=Object.values(rows);
    const totalCout=list.reduce((s,r)=>s+parseFloat(r.cout||0)*parseFloat(r.quantite||1),0);
    pdf.setFontSize(9);pdf.setFont('helvetica','bold');
    pdf.setTextColor(...C.ruby); pdf.text(list.length+' bris enregistres', M, y+5);
    pdf.setTextColor(...C.amber); pdf.text('Cout total : '+fmt(totalCout)+' $', M+70, y+5);
    y+=12;

    // Graphiques
    const charts=[{id:'bris-chart-week',label:'Couts ($) — Semaine',limKey:'week'},{id:'bris-chart-month',label:'Couts ($) — Mois',limKey:'month'}];
    const cW=(W-2*M-8)/2; let maxH=0;
    charts.forEach(c=>{const s=document.getElementById(c.id);if(s&&s.width>0){const h=cW*(s.height/s.width);if(h>maxH)maxH=h;}});
    if(maxH>0){
      charts.forEach((c,ci)=>{
        const src=document.getElementById(c.id); if(!src||!src.width) return;
        const tmp=document.createElement('canvas');tmp.width=src.width;tmp.height=src.height;
        const ctx2=tmp.getContext('2d');ctx2.fillStyle='#FFFFFF';ctx2.fillRect(0,0,tmp.width,tmp.height);ctx2.drawImage(src,0,0);
        const imgH=cW*(src.height/src.width), xPos=M+ci*(cW+8);
        pdf.setFontSize(6.5);pdf.setFont('helvetica','bold');pdf.setTextColor(...C.copper);
        pdf.text(c.label.toUpperCase(), xPos, y);
        const lim=getBrisLimit(c.limKey);
        if(lim!==null){pdf.setFontSize(5.5);pdf.setTextColor(60,65,80);pdf.text('Limite : '+lim+' $', xPos+cW-32, y+1.5);}
        pdf.setDrawColor(220,222,228);pdf.setLineWidth(0.2);pdf.rect(xPos,y+3,cW,imgH);
        pdf.addImage(tmp.toDataURL('image/jpeg',0.92),'JPEG',xPos,y+3,cW,imgH);
      });
      y+=maxH+18;
      pdf.setDrawColor(...C.faint);pdf.setLineWidth(0.2);pdf.line(M,y-4,W-M,y-4);
    }

    // Tableau
    const fixedW=10+22+22+28+28+36;
    const itemW=W-2*M-fixedW;
    const cols=[
      {label:'#',w:10,key:'num'},{label:'Item',w:itemW,key:'item'},
      {label:'Qte',w:22,key:'qte'},{label:'Poids (kg)',w:22,key:'poids'},
      {label:'Cout ($)',w:28,key:'cout'},{label:'Total ($)',w:28,key:'total'},
      {label:'Commentaires',w:36,key:'comm'}
    ];
    const hH=8, rH=7; let x=M;
    pdf.setFillColor(245,245,248);pdf.rect(M,y,W-2*M,hH,'F');
    pdf.setFontSize(6);pdf.setFont('helvetica','bold');pdf.setTextColor(...C.copper);
    cols.forEach(c=>{pdf.text(c.label.toUpperCase(),x+2,y+5.5);x+=c.w;});y+=hH;

    list.forEach((r,i)=>{
      if(y>H-12){pdf.addPage();y=M;}
      if(i%2===0){pdf.setFillColor(252,252,253);pdf.rect(M,y,W-2*M,rH,'F');}
      pdf.setDrawColor(220,222,228);pdf.setLineWidth(0.15);pdf.line(M,y+rH,W-M,y+rH);
      x=M;
      const total=parseFloat(r.cout||0)*parseFloat(r.quantite||1);
      const vals={num:String(i+1),item:r.item||'',qte:String(r.quantite||'—'),poids:r.poids?r.poids+' kg':'—',cout:r.cout?fmt(r.cout)+' $':'—',total:fmt(total)+' $',comm:r.commentaires||''};
      cols.forEach(c=>{
        pdf.setFontSize(6.5);pdf.setFont('helvetica','normal');pdf.setTextColor(40,42,55);
        if(c.key==='num'){pdf.setTextColor(...C.copper);pdf.setFont('helvetica','bold');}
        if(c.key==='cout'||c.key==='total'){pdf.setTextColor(...C.ruby);pdf.setFont('helvetica','bold');}
        const maxW=c.w-4; let txt=vals[c.key]||'—';
        while(txt.length>1&&pdf.getTextWidth(txt)>maxW) txt=txt.slice(0,-1);
        if(txt!==vals[c.key]) txt+='…';
        pdf.text(txt,x+2,y+4.5); x+=c.w;
      });
      y+=rH;
    });

    const pages=pdf.internal.getNumberOfPages();
    for(let i=1;i<=pages;i++){
      pdf.setPage(i);pdf.setDrawColor(...C.faint);pdf.setLineWidth(0.2);pdf.line(M,H-7,W-M,H-7);
      pdf.setFontSize(6);pdf.setFont('helvetica','normal');pdf.setTextColor(...C.grey);
      pdf.text('SOY — Suivi des Bris', M, H-3);pdf.text('Page '+i+' / '+pages, W-M, H-3,{align:'right'});
    }
    pdf.save('bris_'+curDate+'.pdf');
  }catch(e){console.error(e);alert('Erreur PDF : '+(e?.message||e));}
}
