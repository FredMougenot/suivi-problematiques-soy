<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Critères des piliers — SOY</title>
<link rel="stylesheet" href="soy-shared.css">
<style>
/* ══ PAGE CRITÈRES PILIERS ══════════════════════════════════════ */
.page-eyebrow{font-size:.62rem;font-weight:800;color:var(--copper);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;}
.page-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--text-primary);}
.page-sub{font-size:.84rem;color:var(--text-muted);margin-top:6px;margin-bottom:24px;}

/* ── SECTION PILIER ── */
.pilier-section{
  background:var(--bg-raised);border:1px solid var(--text-faint);
  border-radius:var(--r-lg);margin-bottom:20px;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.pilier-section:hover{border-color:rgba(200,132,58,.3);box-shadow:0 6px 24px rgba(0,0,0,.35);}
.pilier-section::before{
  content:'';display:block;height:2px;
  background:linear-gradient(90deg,var(--copper),transparent);
}

/* En-tête section */
.ps-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px 12px;border-bottom:1px solid var(--text-faint);
}
.ps-name{
  font-family:'Outfit',sans-serif;font-size:1rem;font-weight:800;
  color:var(--copper-light);letter-spacing:.04em;
  display:flex;align-items:center;gap:10px;
}
.ps-badge{
  font-size:.6rem;font-weight:800;padding:2px 9px;border-radius:20px;
  background:var(--copper-dim);border:1px solid rgba(200,132,58,.3);
  color:var(--copper);letter-spacing:.1em;text-transform:uppercase;
}
.ps-actions{display:flex;align-items:center;gap:10px;}
.ps-status{font-size:.72rem;color:var(--text-muted);font-style:italic;}
.ps-status.saved{color:var(--emerald);}
.ps-btn{
  padding:7px 16px;border-radius:var(--r-md);
  background:linear-gradient(135deg,var(--copper),var(--copper-light));
  color:#0F1118;font-size:.78rem;font-weight:800;
  border:none;cursor:pointer;transition:opacity .15s,transform .1s;
  white-space:nowrap;
}
.ps-btn:hover{opacity:.88;transform:translateY(-1px);}
.ps-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* Tableau critères */
.ps-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ps-table{width:100%;border-collapse:collapse;min-width:560px;}
.ps-table thead tr{background:var(--bg-float);}
.ps-table thead th{
  padding:10px 16px;font-size:.6rem;font-weight:800;
  color:var(--copper);letter-spacing:.14em;text-transform:uppercase;
  text-align:left;white-space:nowrap;
}
.ps-table thead th:first-child{width:36px;text-align:center;}
.ps-table thead th.th-intitule{width:35%;}
.ps-table thead th.th-objectif{width:55%;}
.ps-table thead th.th-act{width:60px;text-align:center;}

.ps-table tbody tr{border-top:1px solid var(--text-faint);transition:background .1s;}
.ps-table tbody tr:hover td{background:rgba(200,132,58,.02);}
.ps-table tbody td{padding:9px 16px;vertical-align:middle;}
.ps-table tbody td:first-child{text-align:center;}

/* Numéro ligne */
.row-num{font-size:.76rem;font-weight:700;color:var(--text-muted);}

/* Inputs */
.ci-inp{
  width:100%;background:var(--bg-float);border:1px solid var(--text-faint);
  color:var(--text-primary);border-radius:var(--r-sm);
  padding:7px 10px;font-size:.84rem;font-family:'Outfit',sans-serif;
  outline:none;transition:border-color .15s;
}
.ci-inp:focus{border-color:var(--copper);}
.ci-inp::placeholder{color:var(--text-faint);}

/* Bouton ajouter ligne */
.btn-add-row{
  display:flex;align-items:center;gap:7px;
  margin:10px 16px 14px;padding:7px 14px;
  border-radius:var(--r-md);background:transparent;
  border:1px dashed var(--text-faint);color:var(--text-muted);
  font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;
  width:fit-content;
}
.btn-add-row:hover{border-color:var(--copper);color:var(--copper-light);}

/* Bouton supprimer */
.btn-rm-row{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:var(--r-sm);
  background:transparent;border:1px solid var(--text-faint);
  color:var(--text-muted);cursor:pointer;font-size:.7rem;
  transition:all .15s;
}
.btn-rm-row:hover{border-color:var(--ruby);color:var(--ruby);background:var(--ruby-bg);}

/* Ligne vide */
.ps-empty{padding:20px;text-align:center;font-size:.82rem;color:var(--text-muted);font-style:italic;}

/* ── COLONNES SEUIL ─────────────────────────────────── */
.ps-table{min-width:720px;}
.ps-table thead th.th-seuil{width:80px;text-align:center;line-height:1.3;}
.ps-table tbody td.td-seuil{text-align:center;padding:7px 8px;}
.ci-seuil{
  width:68px;background:var(--bg-float);border:1px solid var(--text-faint);
  color:var(--text-primary);border-radius:var(--r-sm);
  padding:5px 6px;font-size:.8rem;font-family:'Outfit',sans-serif;
  outline:none;text-align:center;transition:border-color .15s;
}
.ci-seuil:focus{border-color:var(--copper);}
.ci-seuil::placeholder{color:var(--text-faint);}
.th-seuil-vert{color:var(--emerald) !important;}
.th-seuil-orange{color:var(--amber) !important;}
.th-seuil-rouge{color:var(--ruby) !important;}
.seuil-hint{font-size:.62rem;color:var(--text-muted);margin:10px 16px 14px;padding:8px 12px;background:var(--bg-float);border-radius:var(--r-sm);border-left:2px solid var(--copper);line-height:1.6;}
</style>
</head>
<body>
<div class="tool-wrap">

  <!-- TOPBAR -->
  <div class="tool-topbar">
    <a class="tool-back" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
    <div class="tool-title">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--copper)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Critères des piliers
    </div>
  </div>

  <!-- MAIN -->
  <div class="tool-main">
    <div class="page-eyebrow">Outils · Configuration</div>
    <div class="page-title">Critères des piliers</div>
    <div class="page-sub">Définissez les critères et objectifs pour chaque pilier. Ces informations s'affichent dans le tableau de bord.</div>

    <div id="cp-container">
      <div class="ps-empty">Chargement…</div>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xppzmdmnuztozgukrcta.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const PILIERS = ['SST','Qualite','Couts','Delais','Motivation','Environnement'];

// rows[pilier] = [ {id, intitule, objectif, row_index}, ... ]
let rows = {};
// nextIdx[pilier] = prochain index local pour nouvelles lignes
let nextIdx = {};

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg, type='info'){
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(()=>el.classList.add('show'), 10);
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); }, 3200);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── CHARGEMENT ────────────────────────────────────────────────────
window.addEventListener('load', load);

async function load(){
  PILIERS.forEach(p=>{ rows[p]=[]; nextIdx[p]=0; });
  try {
    const {data, error} = await sb.from('piliers_criteres_lignes').select('*').order('row_index');
    if(error && error.code !== 'PGRST116') throw error;
    (data||[]).forEach(r=>{
      if(!rows[r.pilier]) rows[r.pilier]=[];
      rows[r.pilier].push(r);
      nextIdx[r.pilier] = Math.max(nextIdx[r.pilier]||0, (r.row_index||0)+1);
    });
  } catch(e){ toast('Connexion impossible : '+e.message,'error'); }
  renderAll();
}

// ── RENDU GLOBAL ──────────────────────────────────────────────────
function renderAll(){
  document.getElementById('cp-container').innerHTML =
    PILIERS.map(p => renderSection(p)).join('');
}

// ── RENDU SECTION ─────────────────────────────────────────────────
function renderSection(p){
  const list = rows[p]||[];
  const rowsHtml = list.length === 0
    ? `<tr><td colspan="7" class="ps-empty">Aucune ligne. Cliquez sur « + Ajouter une ligne ».</td></tr>`
    : list.map((r,i) => `
        <tr id="cr-row-${p}-${r._local_id||r.id||i}">
          <td><span class="row-num">${i+1}</span></td>
          <td><input class="ci-inp" value="${esc(r.intitule||'')}"
            placeholder="Ex: Taux d'accidents…"
            oninput="fchg('${p}',${i},'intitule',this.value);markDirty('${p}')"></td>
          <td><input class="ci-inp" value="${esc(r.objectif||'')}"
            placeholder="Ex: 0 accident par mois…"
            oninput="fchg('${p}',${i},'objectif',this.value);markDirty('${p}')"></td>
          <td class="td-seuil"><input class="ci-seuil" type="number" min="0" value="${r.seuil_vert!=null?esc(r.seuil_vert):''}"
            placeholder="—"
            oninput="fchg('${p}',${i},'seuil_vert',this.value===''?null:Number(this.value));markDirty('${p}')"></td>
          <td class="td-seuil"><input class="ci-seuil" type="number" min="0" value="${r.seuil_orange!=null?esc(r.seuil_orange):''}"
            placeholder="—"
            oninput="fchg('${p}',${i},'seuil_orange',this.value===''?null:Number(this.value));markDirty('${p}')"></td>
          <td class="td-seuil"><input class="ci-seuil" type="number" min="0" value="${r.seuil_rouge!=null?esc(r.seuil_rouge):''}"
            placeholder="—"
            oninput="fchg('${p}',${i},'seuil_rouge',this.value===''?null:Number(this.value));markDirty('${p}')"></td>
          <td style="text-align:center">
            <button class="btn-rm-row" onclick="removeRow('${p}',${i})" title="Supprimer">✕</button>
          </td>
        </tr>`).join('');

  return `
    <div class="pilier-section" id="ps-${p}">
      <div class="ps-header">
        <div class="ps-name">
          ${esc(p)} <span class="ps-badge">Pilier</span>
        </div>
        <div class="ps-actions">
          <span class="ps-status" id="st-${p}">${list.length>0?'Chargé':'Vide'}</span>
          <button class="ps-btn" id="btn-${p}" onclick="saveSection('${p}')">Sauvegarder</button>
        </div>
      </div>
      <div class="ps-table-wrap">
        <table class="ps-table">
          <thead>
            <tr>
              <th>#</th>
              <th class="th-intitule">Intitulé</th>
              <th class="th-objectif">Objectif</th>
              <th class="th-seuil th-seuil-vert">😊 Vert<br><span style="font-size:.5rem;font-weight:400;color:var(--text-muted)">≤ valeur</span></th>
              <th class="th-seuil th-seuil-orange">😐 Orange<br><span style="font-size:.5rem;font-weight:400;color:var(--text-muted)">≤ valeur</span></th>
              <th class="th-seuil th-seuil-rouge">😟 Rouge<br><span style="font-size:.5rem;font-weight:400;color:var(--text-muted)">> valeur</span></th>
              <th class="th-act"></th>
            </tr>
          </thead>
          <tbody id="tbody-${p}">${rowsHtml}</tbody>
        </table>
      </div>
      <div class="seuil-hint">💡 Les seuils définissent le smiley affiché sur le tableau de bord : 😊 si la valeur réelle ≤ seuil vert · 😐 si ≤ seuil orange · 😟 au-delà.</div>
      <button class="btn-add-row" onclick="addRow('${p}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter une ligne
      </button>
    </div>`;
}

// ── MODIFIER CHAMP ────────────────────────────────────────────────
function fchg(pilier, idx, field, val){
  if(rows[pilier] && rows[pilier][idx]) rows[pilier][idx][field] = val;
}

function markDirty(pilier){
  const st = document.getElementById('st-'+pilier);
  if(st){ st.textContent='Modifié — non sauvegardé'; st.className='ps-status'; }
}

// ── AJOUTER LIGNE ─────────────────────────────────────────────────
function addRow(pilier){
  const localId = 'new_'+(nextIdx[pilier]++);
  rows[pilier].push({ _local_id: localId, pilier, intitule:'', objectif:'', row_index: rows[pilier].length });
  // Mettre à jour uniquement ce tbody sans re-render tout
  const tbody = document.getElementById('tbody-'+pilier);
  const list = rows[pilier];
  const i = list.length - 1;
  const r = list[i];
  // Retirer le message vide si présent
  const emptyRow = tbody.querySelector('.ps-empty');
  if(emptyRow) emptyRow.closest('tr').remove();
  // Insérer nouvelle ligne
  tbody.insertAdjacentHTML('beforeend', `
    <tr id="cr-row-${pilier}-${localId}">
      <td><span class="row-num">${i+1}</span></td>
      <td><input class="ci-inp" value=""
        placeholder="Ex: Taux d'accidents…"
        oninput="fchg('${pilier}',${i},'intitule',this.value);markDirty('${pilier}')"></td>
      <td><input class="ci-inp" value=""
        placeholder="Ex: 0 accident par mois…"
        oninput="fchg('${pilier}',${i},'objectif',this.value);markDirty('${pilier}')"></td>
      <td style="text-align:center">
        <button class="btn-rm-row" onclick="removeRow('${pilier}',${i})" title="Supprimer">✕</button>
      </td>
    </tr>`);
  markDirty(pilier);
  // Focus sur le premier input de la nouvelle ligne
  const newRow = tbody.lastElementChild;
  const inp = newRow.querySelector('.ci-inp');
  if(inp) inp.focus();
}

// ── SUPPRIMER LIGNE ───────────────────────────────────────────────
async function removeRow(pilier, idx){
  const r = rows[pilier][idx];
  if(!r) return;
  // Si la ligne existe en DB, la supprimer
  if(r.id && !String(r._local_id||'').startsWith('new_')){
    const {error} = await sb.from('piliers_criteres_lignes').delete().eq('id', r.id);
    if(error){ toast('Erreur: '+error.message,'error'); return; }
  }
  rows[pilier].splice(idx, 1);
  // Re-indexer
  rows[pilier].forEach((row,i)=>row.row_index=i);
  // Re-render juste cette section
  const section = document.getElementById('ps-'+pilier);
  if(section) section.outerHTML = renderSection(pilier);
  markDirty(pilier);
  toast('Ligne supprimée.','info');
}

// ── SAUVEGARDER SECTION ───────────────────────────────────────────
async function saveSection(pilier){
  const btn = document.getElementById('btn-'+pilier);
  const st  = document.getElementById('st-'+pilier);
  btn.disabled=true; btn.textContent='…';
  const list = rows[pilier]||[];
  let hasError = false;

  for(let i=0; i<list.length; i++){
    const r = list[i];
    const payload = {
      pilier,
      row_index: i,
      intitule:     r.intitule||'',
      objectif:     r.objectif||'',
      seuil_vert:   r.seuil_vert   != null ? Number(r.seuil_vert)   : null,
      seuil_orange: r.seuil_orange != null ? Number(r.seuil_orange) : null,
      seuil_rouge:  r.seuil_rouge  != null ? Number(r.seuil_rouge)  : null,
      updated_at: new Date().toISOString(),
    };
    if(r.id && !String(r._local_id||'').startsWith('new_')){
      // UPDATE
      const {error} = await sb.from('piliers_criteres_lignes').update(payload).eq('id', r.id);
      if(error){ hasError=true; toast('Erreur ligne '+(i+1)+': '+error.message,'error'); }
    } else {
      // INSERT
      const {data:saved, error} = await sb.from('piliers_criteres_lignes')
        .insert([payload]).select().single();
      if(error){ hasError=true; toast('Erreur ligne '+(i+1)+': '+error.message,'error'); }
      else if(saved){ list[i].id = saved.id; delete list[i]._local_id; }
    }
  }

  btn.disabled=false; btn.textContent='Sauvegarder';
  if(!hasError){
    st.textContent='Sauvegardé ✓'; st.className='ps-status saved';
    toast('Pilier '+pilier+' sauvegardé.','success');
  }
}
</script>
</body>
</html>
