<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOY — Paramètres</title>
<style>
  :root {
    --bg: #0a0a0b;
    --bg2: #111114;
    --bg3: #18181c;
    --border: #2a2a30;
    --border-hover: #3a3a44;
    --text: #e8e8ec;
    --text-muted: #6b6b78;
    --text-dim: #9090a0;
    --gold: #c9a84c;
    --gold-dim: #8a6f2e;
    --blue: #4a9eff;
    --blue-dim: #1a4a80;
    --green: #3dd68c;
    --red: #ff5555;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font: system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo { font-family: var(--font-mono); font-size: 11px; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; }
  header h1 { font-size: 15px; font-weight: 500; color: var(--text); }
  .header-sep { width: 1px; height: 18px; background: var(--border); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-left: auto; box-shadow: 0 0 6px var(--green); }
  .status-label { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

  main { max-width: 900px; margin: 0 auto; padding: 40px 32px; display: flex; flex-direction: column; gap: 32px; }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
  }
  .section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text-dim); }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  /* Table paramètres */
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }
  td.key { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  td.desc { color: var(--text-muted); font-size: 12px; }
  td.val { min-width: 160px; }

  .val-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 10px;
    width: 100%;
    transition: border-color 0.15s;
    outline: none;
  }
  .val-input:focus { border-color: var(--gold-dim); }
  .val-input.modified { border-color: var(--gold); color: var(--gold); }
  .val-input.saving { border-color: var(--blue); opacity: 0.7; }
  .val-input.saved { border-color: var(--green); }
  .val-input.error { border-color: var(--red); }

  /* Table destinations SKU */
  .sku-grid { display: grid; gap: 8px; padding: 16px; }
  .sku-row {
    display: grid;
    grid-template-columns: 60px 1fr 1fr 1fr 32px;
    gap: 8px;
    align-items: center;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    transition: border-color 0.1s;
  }
  .sku-row:hover { border-color: var(--border-hover); }
  .sku-row.header-row {
    background: transparent;
    border: none;
    padding: 0 12px 4px;
  }
  .col-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .sku-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 5px 8px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .sku-input:focus { border-color: var(--gold-dim); }
  .sku-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .sku-badge.default { border-color: var(--gold-dim); color: var(--gold); background: rgba(201,168,76,0.08); }
  .sku-badge:hover { border-color: var(--border-hover); }
  .btn-del {
    width: 28px; height: 28px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.1s;
    flex-shrink: 0;
  }
  .btn-del:hover { border-color: var(--red); color: var(--red); background: rgba(255,85,85,0.08); }

  .sku-actions {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  .btn {
    padding: 7px 14px;
    border-radius: 5px;
    font-size: 12px;
    font-family: var(--font-mono);
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold-dim);
    color: var(--gold);
  }
  .btn-primary:hover { background: rgba(201,168,76,0.2); border-color: var(--gold); }
  .btn-secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--text-muted);
  }
  .btn-secondary:hover { border-color: var(--border-hover); color: var(--text); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--font-mono);
    border: 1px solid;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: rgba(61,214,140,0.12); border-color: var(--green); color: var(--green); }
  .toast.error { background: rgba(255,85,85,0.12); border-color: var(--red); color: var(--red); }

  .loading-row { padding: 24px 16px; text-align: center; font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
  .ligne-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 600;
  }
  .ligne-L1 { background: rgba(201,168,76,0.15); color: var(--gold); }
  .ligne-L2 { background: rgba(74,158,255,0.15); color: var(--blue); }
</style>
</head>
<body>

<header>
  <span class="logo">SOY</span>
  <span class="header-sep"></span>
  <h1>Paramètres système</h1>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span class="status-label" id="conn-status">Connexion...</span>
    <span class="status-dot" id="conn-dot" style="background:var(--text-muted);box-shadow:none"></span>
  </div>
</header>

<main>

  <!-- Paramètres système -->
  <div>
    <div class="section-header">
      <span class="section-label">01</span>
      <span class="section-title">Paramètres opérationnels</span>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Clé</th>
            <th>Description</th>
            <th style="width:180px">Valeur</th>
          </tr>
        </thead>
        <tbody id="params-tbody">
          <tr><td colspan="3" class="loading-row">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Destinations SKU -->
  <div>
    <div class="section-header">
      <span class="section-label">02</span>
      <span class="section-title">Règles SKU → Destination</span>
    </div>
    <div class="card">
      <div class="sku-grid">
        <div class="sku-row header-row">
          <span class="col-label">Ligne</span>
          <span class="col-label">Motif SKU</span>
          <span class="col-label">Destination</span>
          <span class="col-label">Type</span>
          <span></span>
        </div>
        <div id="sku-rows">
          <div class="loading-row">Chargement...</div>
        </div>
      </div>
      <div class="sku-actions">
        <button class="btn btn-primary" onclick="addSkuRow()">+ Ajouter une règle</button>
        <button class="btn btn-primary" id="btn-save-sku" onclick="saveSkuDestinations()">Sauvegarder les destinations</button>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xppzmdmnuztozgukrcta.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';

let sb = null;

// Authorization portera le JETON DE L'UTILISATEUR connecte (et non la cle anon),
// ce qui permet a RLS de reconnaitre le role "authenticated".
const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function fetchJSON(url) {
  const r = await fetch(url, { headers });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Paramètres système ──────────────────────────────────────────
let paramsData = [];

async function loadParams() {
  try {
    paramsData = await fetchJSON(`${SUPABASE_URL}/rest/v1/parametres_systeme?select=cle,valeur,description&order=cle.asc`);
    renderParams();
    setConnected(true);
  } catch(e) {
    document.getElementById('params-tbody').innerHTML = `<tr><td colspan="3" class="loading-row" style="color:var(--red)">Erreur: ${e.message}</td></tr>`;
    setConnected(false);
  }
}

function setConnected(ok) {
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-status');
  dot.style.background = ok ? 'var(--green)' : 'var(--red)';
  dot.style.boxShadow = ok ? '0 0 6px var(--green)' : 'none';
  label.textContent = ok ? 'Connecté' : 'Erreur';
}

function renderParams() {
  const tbody = document.getElementById('params-tbody');
  tbody.innerHTML = paramsData.map(p => `
    <tr>
      <td class="key">${p.cle}</td>
      <td class="desc">${p.description || ''}</td>
      <td class="val">
        <input class="val-input" data-cle="${p.cle}" value="${p.valeur}"
          oninput="onParamInput(this)"
          onblur="saveParam(this)">
      </td>
    </tr>
  `).join('');
}

function onParamInput(el) {
  const original = paramsData.find(p => p.cle === el.dataset.cle)?.valeur;
  el.classList.toggle('modified', el.value !== original);
  el.classList.remove('saved', 'error');
}

async function saveParam(el) {
  const cle = el.dataset.cle;
  const original = paramsData.find(p => p.cle === cle)?.valeur;
  if (el.value === original) return;

  el.classList.add('saving');
  el.disabled = true;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/parametres_systeme?cle=eq.${cle}`, {
      method: 'PATCH',
      headers: { ...headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ valeur: el.value, updated_at: new Date().toISOString() })
    });
    if (!r.ok) throw new Error(await r.text());
    paramsData.find(p => p.cle === cle).valeur = el.value;
    el.classList.remove('saving', 'modified');
    el.classList.add('saved');
    toast(`✓ ${cle} mis à jour`);
    setTimeout(() => el.classList.remove('saved'), 2000);
  } catch(e) {
    el.classList.remove('saving');
    el.classList.add('error');
    toast(`Erreur: ${e.message}`, 'error');
  } finally {
    el.disabled = false;
  }
}

// ── Destinations SKU ────────────────────────────────────────────
let skuData = [];

async function loadSkuDestinations() {
  try {
    skuData = await fetchJSON(`${SUPABASE_URL}/rest/v1/sku_destinations?select=id,ligne,sku_pattern,destination,est_defaut&order=ligne.asc,est_defaut.asc`);
    renderSkuRows();
  } catch(e) {
    document.getElementById('sku-rows').innerHTML = `<div class="loading-row" style="color:var(--red)">Erreur: ${e.message}</div>`;
  }
}

function renderSkuRows() {
  const container = document.getElementById('sku-rows');
  if (!skuData.length) {
    container.innerHTML = '<div class="loading-row">Aucune règle. Cliquez sur "+ Ajouter".</div>';
    return;
  }
  container.innerHTML = skuData.map((r, i) => `
    <div class="sku-row" data-idx="${i}">
      <select class="sku-input" onchange="skuData[${i}].ligne=this.value">
        <option ${r.ligne==='L1'?'selected':''}>L1</option>
        <option ${r.ligne==='L2'?'selected':''}>L2</option>
      </select>
      <input class="sku-input" placeholder="(vide = défaut)" value="${r.sku_pattern}"
        oninput="skuData[${i}].sku_pattern=this.value">
      <input class="sku-input" placeholder="ex: LJDERY" value="${r.destination}"
        oninput="skuData[${i}].destination=this.value.toUpperCase();this.value=this.value.toUpperCase()">
      <span class="sku-badge ${r.est_defaut?'default':''}" onclick="toggleDefault(${i})" title="Cliquer pour basculer défaut">
        ${r.est_defaut ? '★ défaut' : '◇ pattern'}
      </span>
      <button class="btn-del" onclick="deleteSkuRow(${i})" title="Supprimer">×</button>
    </div>
  `).join('');
}

function toggleDefault(i) {
  skuData[i].est_defaut = !skuData[i].est_defaut;
  renderSkuRows();
}

function addSkuRow() {
  skuData.push({ id: null, ligne: 'L1', sku_pattern: '', destination: '', est_defaut: false });
  renderSkuRows();
}

async function deleteSkuRow(i) {
  const row = skuData[i];
  if (row.id) {
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/sku_destinations?id=eq.${row.id}`, {
        method: 'DELETE', headers
      });
      if (!r.ok) throw new Error(await r.text());
    } catch(e) {
      toast(`Erreur: ${e.message}`, 'error');
      return;
    }
  }
  skuData.splice(i, 1);
  renderSkuRows();
  toast('Règle supprimée');
}

async function saveSkuDestinations() {
  const btn = document.getElementById('btn-save-sku');
  btn.disabled = true;
  btn.textContent = 'Sauvegarde...';

  try {
    // Supprimer toutes les règles existantes puis réinsérer
    await fetch(`${SUPABASE_URL}/rest/v1/sku_destinations?id=gt.0`, { method: 'DELETE', headers });

    const rows = skuData.map(r => ({
      ligne: r.ligne,
      sku_pattern: r.sku_pattern,
      destination: r.destination.toUpperCase(),
      est_defaut: r.est_defaut,
      updated_at: new Date().toISOString()
    }));

    const r = await fetch(`${SUPABASE_URL}/rest/v1/sku_destinations`, {
      method: 'POST',
      headers: { ...headers, 'Prefer': 'return=representation' },
      body: JSON.stringify(rows)
    });
    if (!r.ok) throw new Error(await r.text());
    skuData = await r.json();
    renderSkuRows();
    toast('✓ Destinations sauvegardées');
  } catch(e) {
    toast(`Erreur: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sauvegarder les destinations';
  }
}

// ── Init : authentification obligatoire ─────────────────────────
async function init() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }

    // Toutes les requetes REST partent desormais avec le jeton de l'utilisateur
    headers['Authorization'] = `Bearer ${session.access_token}`;

    await loadParams();
    await loadSkuDestinations();
  } catch (e) {
    window.location.href = 'index.html';
  }
}

init();
</script>
</body>
</html>
