/* ══ PARAMÈTRES INVENTAIRE ══════════════════════════════════════ */

.page-header{margin-bottom:28px;}
.page-eyebrow{font-size:.62rem;font-weight:800;color:var(--copper);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;}
.page-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text-primary);}
.page-sub{font-size:.82rem;color:var(--text-muted);margin-top:4px;}

/* Barre d'actions */
.actions-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
.actions-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.btn-add{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.82rem;font-weight:800;border:none;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;}
.btn-add:hover{opacity:.88;transform:translateY(-1px);}
.btn-save-all{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-md);background:var(--emerald-bg);border:1px solid rgba(45,212,160,.3);color:var(--emerald);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-save-all:hover{background:rgba(45,212,160,.15);}

/* Compteur */
.item-count{font-size:.78rem;color:var(--text-muted);font-weight:600;padding:5px 12px;background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:20px;}

/* Table */
.param-tbl-wrap{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);overflow:hidden;position:relative;}
.param-tbl-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--copper),transparent);pointer-events:none;}
.param-tbl{width:100%;border-collapse:collapse;}
.param-tbl thead tr{background:var(--bg-float);border-bottom:1px solid var(--text-faint);}
.param-tbl thead th{padding:12px 16px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);text-align:left;white-space:nowrap;}
.param-tbl thead th:first-child{width:48px;text-align:center;}
.param-tbl thead th:last-child{width:80px;text-align:center;}
.param-tbl tbody tr{border-bottom:1px solid rgba(44,51,80,.5);transition:background .1s;}
.param-tbl tbody tr:hover{background:var(--bg-hover);}
.param-tbl tbody tr:last-child{border-bottom:none;}
.param-tbl tbody td{padding:8px 12px;font-size:.86rem;color:var(--text-primary);vertical-align:middle;}
.param-tbl tbody td:first-child{text-align:center;color:var(--text-muted);font-size:.76rem;font-weight:700;}
.param-tbl tbody td:last-child{text-align:center;}

/* Inputs dans la table */
.inp-item{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text-primary);font-size:.86rem;font-family:'Outfit',sans-serif;outline:none;padding:4px 6px;width:100%;transition:border-color .15s;}
.inp-item:hover{border-bottom-color:var(--text-faint);}
.inp-item:focus{border-bottom-color:var(--copper);}
.sel-rec{background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-primary);border-radius:var(--r-sm);padding:5px 10px;font-size:.82rem;font-family:'Outfit',sans-serif;outline:none;cursor:pointer;transition:border-color .15s;width:110px;}
.sel-rec:focus{border-color:var(--copper);}
.sel-rec option{background:var(--bg-float);}

/* Badge récurrence */
.rec-30{color:var(--emerald);font-weight:700;}
.rec-60{color:var(--amber);font-weight:700;}
.rec-90{color:var(--sapphire);font-weight:700;}

/* Bouton supprimer */
.btn-rm{width:28px;height:28px;border-radius:var(--r-sm);background:transparent;border:1px solid transparent;color:var(--text-muted);font-size:.85rem;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-rm:hover{background:rgba(224,85,85,.1);border-color:rgba(224,85,85,.3);color:var(--ruby);}

/* Spinner */
.spinner{display:flex;align-items:center;justify-content:center;padding:50px;gap:12px;color:var(--text-muted);font-size:.88rem;}
.sp-ring{width:24px;height:24px;border:2px solid var(--text-faint);border-top-color:var(--copper);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast-bar{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:11px 18px;border-radius:var(--r-md);font-size:.82rem;font-weight:600;border:1px solid;animation:tin .2s var(--ease);max-width:320px;pointer-events:auto;}
.toast.ok{background:rgba(45,212,160,.12);color:var(--emerald);border-color:rgba(45,212,160,.3);}
.toast.err{background:rgba(224,85,85,.12);color:var(--ruby);border-color:rgba(224,85,85,.3);}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}

@media(max-width:700px){.actions-bar{flex-direction:column;align-items:flex-start;}.param-tbl{min-width:480px;}.param-tbl-wrap{overflow-x:auto;}}
</style>

let rows = []; // [{id, item, recurrence, dirty}]
let nextTmpId = -1;

// ── INIT ────────────────────────────────────────────────────────
function initApp(){
  sb = supabase.createClient(SB_URL, SB_KEY);
  load();
}

function waitForSupabaseAndInit(){
  if(typeof supabase !== 'undefined' && supabase.createClient){
    try{ initApp(); }catch(e){ showSpinner(false); toast('Erreur init','err'); }
  } else {
    setTimeout(waitForSupabaseAndInit, 50);
  }
}
window.addEventListener('load', waitForSupabaseAndInit);

// ── CHARGEMENT ──────────────────────────────────────────────────
async function load(){
  showSpinner(true);
  try {
    const {data, error} = await sb.from('parametres')
      .select('*').order('id');
    if(error) throw error;
    if(data && data.length > 0){
      rows = data.map(r=>({id:r.id, item:r.item||'', recurrence:r.recurrence||30, dirty:false}));
    } else {
      // Pré-remplir avec les 200 items par défaut
      rows = DEFAULT_ITEMS.map((d,i)=>({id: nextTmpId--, item:d[0], recurrence:d[1], dirty:true}));
    }
  } catch(e){
    toast('Erreur chargement : '+e.message, 'err');
    rows = DEFAULT_ITEMS.map((d,i)=>({id: nextTmpId--, item:d[0], recurrence:d[1], dirty:true}));
  }
  render();
  showSpinner(false);
}

// ── RENDU ───────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        oninput="markDirty(${i},'item',this.value)"></td>
      <td>
        <select class="sel-rec" onchange="markDirty(${i},'recurrence',parseInt(this.value))">
          <option value="30" ${r.recurrence==30?'selected':''}>30 jours</option>
          <option value="60" ${r.recurrence==60?'selected':''}>60 jours</option>
          <option value="90" ${r.recurrence==90?'selected':''}>90 jours</option>
        </select>
      </td>
      <td><button class="btn-rm" onclick="removeRow(${i})" title="Supprimer">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button></td>
    </tr>`).join('');
  document.getElementById('item-count').textContent = rows.length + ' item' + (rows.length !== 1 ? 's' : '');
  document.getElementById('tbl-wrap').style.display = 'block';
}

function markDirty(idx, field, val){
  rows[idx][field] = val;
  rows[idx].dirty = true;
}

// ── AJOUTER ─────────────────────────────────────────────────────
function addRow(){
  rows.push({id: nextTmpId--, item:'', recurrence:30, dirty:true});
  render();
  // Focus sur le dernier input
  setTimeout(()=>{
    const inputs = document.querySelectorAll('.inp-item');
    if(inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

// ── SUPPRIMER ────────────────────────────────────────────────────
async function removeRow(idx){
  const r = rows[idx];
  if(r.id > 0){
    // Supprimer de Supabase
    try {
      const {error} = await sb.from('parametres').delete().eq('id', r.id);
      if(error) throw error;
    } catch(e){
      toast('Erreur suppression : '+e.message, 'err');
      return;
    }
  }
  rows.splice(idx, 1);
  render();
  toast('Item supprimé', 'ok');
}

// ── SAUVEGARDER TOUT ────────────────────────────────────────────
async function saveAll(){
  const dirty = rows.filter(r => r.dirty);
  if(!dirty.length){ toast('Aucune modification à sauvegarder', 'ok'); return; }

  let saved = 0, errors = 0;
  for(const r of dirty){
    try {
      if(r.id > 0){
        // Update
        const {error} = await sb.from('parametres')
          .update({item: r.item, recurrence: r.recurrence})
          .eq('id', r.id);
        if(error) throw error;
      } else {
        // Insert
        const {data, error} = await sb.from('parametres')
          .insert({item: r.item, recurrence: r.recurrence})
          .select().single();
        if(error) throw error;
        r.id = data.id; // remplacer l'id temporaire
      }
      r.dirty = false;
      saved++;
    } catch(e){
      errors++;
    }
  }
  if(errors) toast(errors+' erreur(s) lors de la sauvegarde', 'err');
  else toast(saved+' item(s) sauvegardé(s) ✓', 'ok');
}

// ── UTILITAIRES ─────────────────────────────────────────────────
function showSpinner(on){
  document.getElementById('spinner').style.display = on ? 'flex' : 'none';
}

function toast(msg, type='ok'){
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}
</script>
</body>
</html>
