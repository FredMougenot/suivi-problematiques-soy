<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planification Camions — Expédition SOY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:#0F1118; --bg-raised:#15181F; --bg-float:#1A1E2A;
  --copper:#C8843A; --copper-light:#E0A870; --text-primary:#F0EAE0;
  --text-secondary:#BEC5D6; --text-muted:#7A82A0; --text-faint:#2C3350;
  --r-md:10px; --r-lg:16px; --t-fast:.15s;
}
body{font-family:'Outfit',sans-serif;background:var(--bg-base);color:var(--text-primary);margin:0;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:64px;background:rgba(15,17,24,.94);border-bottom:1px solid var(--text-faint);display:flex;align-items:center;padding:0 28px;gap:20px;}
.tb-title{font-size:1.52rem;font-weight:700;}
.date-nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;}
.date-lbl{font-size:1.05rem;font-weight:700;padding:8px 22px;background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-md);min-width:260px;text-align:center;}
.main{padding:20px;}
.tbl-outer{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:1000px;}
th{padding:13px;text-align:left;font-size:.62rem;color:var(--copper);text-transform:uppercase;background:var(--bg-float);}
td{padding:11px;border-bottom:1px solid var(--text-faint);font-size:.84rem;}

/* SLIDER CORRIGÉ */
.verif-slider {
  position: relative; width: 240px; height: 40px; background: var(--bg-float);
  border-radius: 22px; border: 2px solid var(--text-faint); cursor: pointer;
  display: flex; align-items: center; padding: 4px; user-select: none; margin: auto;
}
.verif-track { position: absolute; width: calc(100% - 8px); display: flex; justify-content: space-between; padding: 0 12px; pointer-events: none; }
.verif-label { font-size: .65rem; font-weight: 700; color: var(--text-muted); }
.verif-thumb {
  position: absolute; width: 32px; height: 32px; border-radius: 50%;
  transition: all .3s cubic-bezier(.4,0,.2,1); display: flex; align-items: center;
  justify-content: center; font-size: .75rem; color: #0F1118; font-weight: 900; z-index: 2;
}
.verif-thumb[data-state="none"] { left: 4px; background: #4A5568; }
.verif-thumb[data-state="q1_ok"] { left: calc(16% - 16px); background: #10B981; }
.verif-thumb[data-state="q1_err"] { left: calc(33% - 16px); background: #EF4444; }
.verif-thumb[data-state="q2_ok"] { left: calc(50% - 16px); background: #10B981; }
.verif-thumb[data-state="q2_err"] { left: calc(66% - 16px); background: #EF4444; }
.verif-thumb[data-state="q3_ok"] { left: calc(83% - 16px); background: #10B981; }
.verif-thumb[data-state="q3_err"] { left: calc(100% - 36px); background: #EF4444; }
</style>
</head>
<body>
<header class="topbar"><div class="tb-title">Planification Camions</div></header>
<div class="date-nav"><div class="date-lbl" id="date-lbl">Chargement...</div></div>
<main class="main">
  <div class="tbl-outer">
    <table>
      <thead><tr><th>Heure</th><th>Description</th><th style="text-align:center">Vérification Quarts</th><th>Action</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>
<script>
const STATES = ["none", "q1_ok", "q1_err", "q2_ok", "q2_err", "q3_ok", "q3_err"];
const ICONS = { "none":"○", "q1_ok":"1✓", "q1_err":"1✗", "q2_ok":"2✓", "q2_err":"2✗", "q3_ok":"3✓", "q3_err":"3✗" };
const data = [
  { h: "06:00", desc: "Camion A - Stock palette", state: "none" },
  { h: "07:30", desc: "Camion B - Vide", state: "q1_ok" }
];

function cycle(idx) {
  const thumb = document.getElementById(`thumb-${idx}`);
  let current = thumb.getAttribute("data-state");
  let next = STATES[(STATES.indexOf(current) + 1) % STATES.length];
  thumb.setAttribute("data-state", next);
  thumb.innerText = ICONS[next];
}

document.getElementById('tbody').innerHTML = data.map((r, i) => `
  <tr>
    <td>${r.h}</td><td>${r.desc}</td>
    <td>
      <div class="verif-slider" onclick="cycle(${i})">
        <div class="verif-track"><span class="verif-label">Q1</span><span class="verif-label">Q2</span><span class="verif-label">Q3</span></div>
        <div id="thumb-${i}" class="verif-thumb" data-state="${r.state}">${ICONS[r.state]}</div>
      </div>
    </td>
    <td><button onclick="alert('OK')">Sauver</button></td>
  </tr>`).join('');
document.getElementById('date-lbl').innerText = new Date().toLocaleDateString('fr-FR');
</script>
</body>
</html>
