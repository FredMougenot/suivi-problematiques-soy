<head>

<style>
:root {
  --bg-void:#06070B;--bg-deep:#0B0D13;--bg-base:#0F1118;
  --bg-raised:#15181F;--bg-float:#1A1E2A;--bg-hover:#1F2436;
  --copper:#C8843A;--copper-light:#E0A870;--copper-pale:#EDD4A8;
  --copper-glow:rgba(200,132,58,.22);--copper-dim:rgba(200,132,58,.10);
  --text-primary:#F0EAE0;--text-secondary:#BEC5D6;
  --text-muted:#7A82A0;--text-faint:#2C3350;
  --emerald:#2DD4A0;--ruby:#E05555;--amber:#E8A43A;--sapphire:#4A9EE8;
  --r-sm:4px;--r-md:10px;--r-lg:16px;
  --t-fast:.15s;--ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{font-family:'Outfit',sans-serif;background:var(--bg-base);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:64px;background:rgba(15,17,24,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--text-faint);padding:0 28px;display:flex;align-items:center;justify-content:space-between;}
.tb-left{display:flex;align-items:center;gap:14px;}
.tb-back{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:var(--r-md);background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-secondary);font-size:.82rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all var(--t-fast);}
.tb-back:hover{border-color:var(--copper);color:var(--copper-light);}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-icon{width:36px;height:36px;border-radius:var(--r-md);background:var(--copper-dim);border:1px solid rgba(200,132,58,.3);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--copper-light);flex-shrink:0;}
.tb-title{font-family:'Outfit',sans-serif;font-size:1.52rem;font-weight:700;color:var(--text-primary);letter-spacing:-.01em;}
.tb-right{display:flex;align-items:center;gap:10px;}
.btn-today{padding:8px 16px;border-radius:var(--r-md);background:var(--bg-float);border:1px solid rgba(200,132,58,.3);color:var(--copper-light);font-size:.82rem;font-weight:600;cursor:pointer;transition:all var(--t-fast);}
.btn-today:hover{background:var(--copper-dim);}
.btn-add{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:var(--r-md);
  background:linear-gradient(135deg,var(--copper),var(--copper-light));
  color:#0F1118;font-size:.82rem;font-weight:800;border:none;cursor:pointer;
  transition:opacity .15s,transform .1s;white-space:nowrap;
}
.btn-add:hover{opacity:.88;transform:translateY(-1px);}
.btn-add:active{transform:translateY(0);}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(200,132,58,.45);}

/* DATE NAV */
.date-nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px 28px 0;}
.date-arr{width:36px;height:36px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all var(--t-fast);}
.date-arr:hover{border-color:var(--copper);color:var(--copper-light);}
.date-lbl{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text-primary);padding:8px 22px;background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-md);min-width:260px;text-align:center;}
.today-chip{display:inline-block;font-size:.68rem;font-weight:700;color:var(--copper-light);background:var(--copper-dim);border:1px solid rgba(200,132,58,.25);padding:2px 9px;border-radius:20px;margin-left:8px;vertical-align:middle;}

/* STATS */
.stats-bar{display:flex;gap:10px;padding:16px 28px 0;flex-wrap:wrap;}
.sp{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--text-faint);font-size:.8rem;font-weight:600;}
.sp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sp.s-actif  .sp-dot{background:var(--emerald);}
.sp.s-att    .sp-dot{background:var(--amber);}
.sp.s-fait   .sp-dot{background:var(--sapphire);}
.sp.s-annule .sp-dot{background:var(--ruby);}
.sp-val{color:var(--text-primary);margin-right:3px;}
.sp-lbl{color:var(--text-muted);}

/* MAIN */
.main{flex:1;padding:18px 28px 50px;}

/* TABLE */
.tbl-outer{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ptbl{width:100%;border-collapse:collapse;min-width:1080px;}
.ptbl thead tr{background:var(--bg-float);border-bottom:2px solid var(--text-faint);}
.ptbl thead th{padding:13px 12px;text-align:left;font-size:.62rem;font-weight:800;color:var(--copper);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;}
.ptbl tbody tr{border-bottom:1px solid var(--text-faint);transition:background var(--t-fast);}
.ptbl tbody tr:last-child{border-bottom:none;}
.ptbl tbody tr:hover td{background:rgba(200,132,58,.025);}
.ptbl tbody tr.row-extra{border-left:3px solid rgba(200,132,58,.4);}
.ptbl tbody tr.row-annule td:not(.td-act){opacity:.42;text-decoration:line-through;}
.ptbl tbody tr.row-annule .cs,.ptbl tbody tr.row-annule .ci{text-decoration:none;opacity:.55;}
.ptbl tbody td{padding:11px 12px;font-size:.84rem;color:var(--text-primary);vertical-align:middle;}

/* Heure */
.h-badge{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--copper-light);display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
.h-badge.past{color:var(--text-muted);}
.h-badge.now{color:var(--emerald);}
.h-badge.extra{color:var(--text-secondary);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;}
.now-dot{width:7px;height:7px;border-radius:50%;background:var(--emerald);flex-shrink:0;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Inputs */
.cs{background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-primary);border-radius:var(--r-sm);padding:6px 8px;font-size:.8rem;font-family:'Outfit',sans-serif;cursor:pointer;outline:none;transition:border-color var(--t-fast);min-width:100px;}
.cs:focus{border-color:var(--copper);}
.cs option{background:#1A1E2A;}
.ci{background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-primary);border-radius:var(--r-sm);padding:6px 9px;font-size:.8rem;font-family:'Outfit',sans-serif;width:100%;outline:none;transition:border-color var(--t-fast);}
.ci:focus{border-color:var(--copper);}
.ci::placeholder{color:var(--text-muted);}
.ci-t{background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-primary);border-radius:var(--r-sm);padding:6px 8px;font-size:.8rem;font-family:'Outfit',sans-serif;width:96px;outline:none;transition:border-color var(--t-fast);}
.ci-t:focus{border-color:var(--copper);}

/* Short GH */
.chk{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--text-faint);background:var(--bg-float);cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all var(--t-fast);}
.chk.on{background:rgba(224,85,85,.18);border-color:var(--ruby);}
.chk.on::after{content:'✓';font-size:.75rem;font-weight:800;color:var(--ruby);}

/* Boutons */
.btn-sv{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.75rem;font-weight:700;border:none;cursor:pointer;transition:all var(--t-fast);}
.btn-sv:hover{opacity:.85;transform:translateY(-1px);}
.btn-sv:disabled{opacity:.35;cursor:default;transform:none;}
.btn-rm{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--text-faint);color:var(--text-muted);cursor:pointer;margin-left:5px;transition:all var(--t-fast);font-size:.8rem;}
.btn-rm:hover{border-color:var(--ruby);color:var(--ruby);background:rgba(224,85,85,.08);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:var(--bg-float);border:1px solid var(--text-faint);border-radius:var(--r-lg);padding:28px;width:400px;max-width:95vw;box-shadow:0 16px 48px rgba(0,0,0,.6);}
.modal-t{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
.fg .fi,.fg .fs{width:100%;background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-primary);border-radius:var(--r-md);padding:10px 13px;font-size:.88rem;font-family:'Outfit',sans-serif;outline:none;transition:border-color var(--t-fast);}
.fg .fi:focus,.fg .fs:focus{border-color:var(--copper);}
.fg .fs option{background:var(--bg-raised);}
.m-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-cx{padding:9px 18px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-secondary);font-size:.84rem;font-weight:600;cursor:pointer;transition:all var(--t-fast);}
.btn-cx:hover{color:var(--text-primary);border-color:var(--text-muted);}
.btn-ok{padding:9px 20px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.84rem;font-weight:700;border:none;cursor:pointer;transition:opacity var(--t-fast);}
.btn-ok:hover{opacity:.88;}

/* TOAST */
#toasts{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:11px 18px;border-radius:var(--r-md);font-size:.82rem;font-weight:500;border:1px solid;animation:tin .2s var(--ease);max-width:320px;pointer-events:auto;}
.toast.success{background:rgba(45,212,160,.12);color:var(--emerald);border-color:rgba(45,212,160,.3);}
.toast.error{background:rgba(224,85,85,.12);color:var(--ruby);border-color:rgba(224,85,85,.3);}
.toast.info{background:rgba(74,158,232,.12);color:var(--sapphire);border-color:rgba(74,158,232,.3);}
@keyframes tin{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}

.spinner{display:flex;align-items:center;justify-content:center;padding:50px;gap:12px;color:var(--text-muted);font-size:.9rem;}
.spin{width:18px;height:18px;border:2px solid var(--text-faint);border-top-color:var(--copper);border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}

/* ══ TYPE CAMION COULEURS ══════════════════════════════════════════ */
.cs.type-chauf { color: #FF8C42 !important; font-weight: 700; border-color: rgba(255,140,66,.35); }
.cs.type-reefer { color: #7EC8E3 !important; font-weight: 700; border-color: rgba(126,200,227,.35); }
.desc-sel { min-width: 150px; }


/* ══ STATUT BADGE COULEUR ══════════════════════════════════════════ */
.statut-badge { display:inline-block; border-radius:var(--r-sm); overflow:hidden; }
.statut-sel { border:none !important; font-weight:700 !important; background:transparent !important; padding:6px 8px !important; }
.s-fait    .statut-sel { color: var(--emerald) !important; background:rgba(45,212,160,.12) !important; }
.s-attente .statut-sel { color: var(--amber)   !important; background:rgba(232,164,58,.12)!important; }
.s-vide    .statut-sel { color: var(--text-muted) !important; }


/* ══ MOBILE SCROLL ══════════════════════════════════════════════════ */
@media (max-width: 1100px) {
  .main { padding: 14px 10px 50px; }
  .date-nav { padding: 14px 10px 0; }
  .stats-bar { padding: 12px 10px 0; }
  .topbar { padding: 0 14px; }
  .tb-title { font-size: 1.1rem; }
  .ptbl thead th { font-size: .58rem; padding: 10px 8px; letter-spacing: .08em; }
  .ptbl tbody td { font-size: .78rem; padding: 9px 8px; }
  .cs { min-width: 80px !important; font-size: .76rem; padding: 5px 6px; }
  .ci, .ci-t { font-size: .76rem; padding: 5px 6px; }
  .btn-sv { font-size: .7rem; padding: 5px 9px; }
  .date-lbl { font-size: .88rem; min-width: 200px; padding: 7px 14px; }
}


/* ══ CHARGEMENT BADGE COULEUR ══════════════════════════════════════ */
.c-prete    .statut-sel { color: var(--emerald) !important; background:rgba(45,212,160,.12) !important; }

.cbadge.annule   {.cl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 8px; }
.cl-label { display: flex; align-items: center; color: var(--text-secondary); flex: 1; }
.cl-val { font-weight: 700; color: var(--text-primary); }
.cl-pct { font-size: .72rem; color: var(--text-muted); margin-left: 6px; }

  {idx:9, h:'19:00', lbl:'19h00',             defDesc:'',               defType:'CHAUFFÉE'},
];
const DESC_OPTS = ['','Camion vide','Stock palette','Stock 1 commande','Stock 2 grains'];
const DESTS = ['GH','ADVANTECH','PROACTIVE','LJDERY','AUCUN REPARTIR BOBTAIL'];

let curDate = todayStr();
let rows = {};  // idx -> row object

// ── UTILS ──────────────────────────────────────────────────────────
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isToday(){ return curDate === todayStr(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function nowHM(){
  const n=new Date();
  return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
function slotCls(h){
  if(!isToday()) return '';
  const hm=nowHM();
  if(h<hm) return 'past';
  // premier slot >= maintenant
  for(const s of SLOTS){ if(s.h>=hm){ return s.h===h?'now':''; } }
  return '';
}
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className='toast '+type; el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

// ── DATE ──────────────────────────────────────────────────────────
function refreshDateUI(){
  const d=new Date(curDate+'T00:00:00');
  const lbl=d.toLocaleDateString('fr-CA',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('date-lbl').innerHTML = lbl
    +(isToday()?'<span class="today-chip">Aujourd\'hui</span>':'');
}
function changeDay(delta){
  const d=new Date(curDate+'T00:00:00');
  d.setDate(d.getDate()+delta);
  curDate=d.toISOString().slice(0,10);
  refreshDateUI(); load();
}
function goToday(){ curDate=todayStr(); refreshDateUI(); load(); }

// ── LOAD ──────────────────────────────────────────────────────────
let isViewer = false;

async function initApp(){
  sb = supabase.createClient(SB_URL, SB_KEY);
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ window.location.href='index.html'; return; }
    // Déterminer le rôle
    const email = session.user.email;
    const {data:adm} = await sb.from('admins').select('email').eq('email',email).maybeSingle();
    if(!adm){
      const {data:vwr} = await sb.from('viewers').select('email').eq('email',email).maybeSingle();
      isViewer = !!vwr;
    }
    refreshDateUI();
    await load();
    if(isViewer) applyReadOnly();
  } catch(e){ window.location.href='index.html'; }
}

function applyReadOnly(){
  // Masquer les boutons d'action
  const btnAdd  = document.querySelector('.btn-add');
  const btnSave = document.getElementById('btn-save-all');
  if(btnAdd)  btnAdd.style.display  = 'none';
  if(btnSave) btnSave.style.display = 'none';
  // Désactiver tous les inputs et selects du tableau
  document.querySelectorAll('#tbody input, #tbody select').forEach(el => {
    el.disabled = true;
    el.style.pointerEvents = 'none';
    el.style.opacity = '0.7';
  });
  // Masquer les checkboxes GH
  document.querySelectorAll('#tbody .chk').forEach(el => {
    el.style.pointerEvents = 'none';
    el.style.opacity = '0.7';
  });
  // Masquer les boutons ✕ suppression camions extra
  document.querySelectorAll('#tbody button').forEach(btn => {
    btn.style.display = 'none';
  });
  // Masquer le bouton Radar Ponctualité
  const btnRadar = document.getElementById('btn-radar');
  if(btnRadar) btnRadar.style.display = 'none';
  // Afficher le bouton déconnexion topbar
  const btnLogout = document.getElementById('btn-viewer-logout');
  if(btnLogout) btnLogout.style.display = 'inline-flex';
  // Bandeau lecture seule
  const existing = document.getElementById('readonly-bar');
  if(existing) return;
  const bar = document.createElement('div');
  bar.id = 'readonly-bar';
  bar.style.cssText = 'background:rgba(184,115,51,.12);border:1px solid rgba(184,115,51,.3);border-radius:8px;padding:8px 16px;margin:0 0 12px;font-size:.8rem;color:var(--copper);text-align:center;font-weight:600;';
  bar.textContent = '👁  Mode lecture seule — consultation uniquement';

async function viewerLogout(){

}

function waitForSupabaseAndInit(){
  if(typeof supabase !== 'undefined' && supabase.createClient){
    try{ initApp(); } catch(e){ console.error('initApp error:', e); }
  } else {
    setTimeout(waitForSupabaseAndInit, 50);
  }

window.addEventListener('load', waitForSupabaseAndInit);

async function load(){
  document.getElementById('spinner').style.display='flex';
  document.getElementById('tbl').style.display='none';
  rows={};
  try {
    const {data,error}=await sb.from('planning_camions').select('*')
      .eq('date_jour',curDate).order('slot_index');
    if(error && error.code!=='PGRST116')
      toast('Erreur chargement: '+error.message,'error');
    (data||[]).forEach(r=>{ rows[r.slot_index]=r; });
  } catch(e){ toast('Connexion impossible.','error'); }
  finally{
    try{render();}catch(re){console.error('render:',re);}
    document.getElementById('spinner').style.display='none';
    document.getElementById('tbl').style.display='block';
  }

// ── RENDER ─────────────────────────────────────────────────────────
function render(){
  // Appliquer les valeurs par défaut des slots fixes si pas encore de données
  // Déterminer si la date affichée est un samedi (6) ou dimanche (0)
  const _dow = new Date(curDate+'T00:00:00').getDay();
  const _isWeekend = _dow===0 || _dow===6;
  const _wkAnnule  = [0,1,7,8,9];   // slots annulés le weekend
  const _wkDescIdx = 2;              // 07h30 → Stock palette le weekend

  // Pré-passe : appliquer d'abord les annulations weekend pour connaître
  // les vrais statuts avant de chercher le 1er Actif
  const _slotsTries = [...SLOTS].sort((a,b)=> a.h<b.h?-1:a.h>b.h?1:a.idx-b.idx);
  const _statutsEffectifs = {};
  for(const s of SLOTS){
    // Statut DB en priorité, sinon annulé si weekend+slot hors service, sinon Actif
    const dbStatut = rows[s.idx] ? rows[s.idx].statut_ligne : null;
    if(dbStatut){
      _statutsEffectifs[s.idx] = dbStatut;
    } else if(_isWeekend && _wkAnnule.includes(s.idx)){
      _statutsEffectifs[s.idx] = 'Annulé';
    } else {
      _statutsEffectifs[s.idx] = 'Actif';
    }
  }
  // Trouver le 1er slot Actif avec les vrais statuts
  let _idxPremierActif = null;
  for(const s of _slotsTries){
    if(_statutsEffectifs[s.idx] === 'Actif'){ _idxPremierActif = s.idx; break; }
  }

  SLOTS.forEach(s => {
    if(!rows[s.idx]) rows[s.idx]={slot_index:s.idx};
    // 1er actif → sentinel __VIDE__ (affiché —), Camion B semaine → REEFER, sinon CHAUFFÉE
    if(s.idx === _idxPremierActif){
      rows[s.idx].type_camion = '__VIDE__'; // Toujours écraser — 7j/7
    } else if(!_isWeekend && s.idx === 1){
      rows[s.idx].type_camion = 'REEFER'; // Camion B lundi-vendredi — toujours écraser
    } else {
      // Tous les autres : appliquer le défaut seulement si pas de valeur DB explicite
      if(!rows[s.idx].type_camion || rows[s.idx].type_camion === '__VIDE__'){
        if(_isWeekend && (s.idx===0||s.idx===1)) rows[s.idx].type_camion='__VIDE__';
        else rows[s.idx].type_camion=s.defType||'CHAUFFÉE';
      }
    }
    // Description : overrides weekend
    if(_isWeekend){
      if(s.idx===3){  // 09h00 → Stock palette
        if(!rows[s.idx].description) rows[s.idx].description='Stock palette';
      } else if(s.idx===2||s.idx===4||s.idx===5){ // 07h30, 11h30, 14h → tiret
        if(!rows[s.idx].description) rows[s.idx].description='—';
      } else {
        if(!rows[s.idx].description && s.defDesc) rows[s.idx].description=s.defDesc;
      }
    } else {
      if(!rows[s.idx].description && s.defDesc) rows[s.idx].description=s.defDesc;
    }
    if(!rows[s.idx].dest_arrivee) rows[s.idx].dest_arrivee='SOY';
    if(!rows[s.idx].statut) rows[s.idx].statut='ATTENTE';
    if(!rows[s.idx].chargement) rows[s.idx].chargement='ATTENTE';
    // Weekend : annuler automatiquement les slots hors service
    if(_isWeekend && _wkAnnule.includes(s.idx)){
      if(!rows[s.idx]._weekendOverridden){
        rows[s.idx].statut_ligne='Annulé';
        rows[s.idx]._weekendOverridden=true;
      }
    }
  });

  // ── Règle destination : dernier slot Actif → BOBTAIL, autres → vide si BOBTAIL ──
  let _idxDernierActif = null;
  for(const s of [..._slotsTries].reverse()){
    if(_statutsEffectifs[s.idx] === 'Actif'){ _idxDernierActif = s.idx; break; }
  }
  const _BOBTAIL = 'AUCUN REPARTIR BOBTAIL';
  SLOTS.forEach(s => {
    if(s.idx === _idxDernierActif){
      rows[s.idx].destination = _BOBTAIL; // Toujours écraser — dernier actif
    } else {
      // Nettoyer BOBTAIL sur toute autre ligne
      if(rows[s.idx] && rows[s.idx].destination === _BOBTAIL){
        rows[s.idx].destination = '';
      }
    }
  });

  const extras=Object.keys(rows).map(Number).filter(i=>i>=10).sort((a,b)=>a-b);

  // Construire la liste complète des entrées avec leur heure pour tri
  const all=[];
  SLOTS.forEach(s => all.push({idx:s.idx, h:s.h, lbl:s.lbl, extra:false}));
  extras.forEach(i => {
    const r=rows[i];
    const h=r.heure_planif||'00:00';
    all.push({idx:i, h:h, lbl:h+' · Extra', extra:true});
  });

  // Tri par heure, puis par idx pour départager les égalités
  all.sort((a,b)=> a.h<b.h?-1 : a.h>b.h?1 : a.idx-b.idx);

  let html='';
  all.forEach((entry, pos) => {
    html+=buildRow(entry.idx, entry.h, entry.lbl, entry.extra, pos+1);
  });
  document.getElementById('tbody').innerHTML=html;
  updateStats();
  if(isViewer) applyReadOnly();
}

function buildRow(idx, heure, lbl, isExtra, lineNum){
  const r=rows[idx]||{};
  const sl=r.statut_ligne||'Actif';
  const ann=sl==='Annulé';
  const hcls=isExtra?'extra':slotCls(heure);
  const dot=hcls==='now';
  const trCls=(ann?'row-annule':'')+(isExtra?' row-extra':'');
  const selDests=DESTS.map(d=>`<option${r.destination===d?' selected':''}>${esc(d)}</option>`).join('');
  const svgSave='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>';
  return `<tr id="tr${idx}" class="${trCls}">
    <td style="text-align:center;font-weight:700;color:var(--text-muted);font-size:.8rem">${lineNum}</td>
    <td><span class="h-badge ${hcls}">${dot?'<span class="now-dot"></span>':''}${esc(lbl)}</span></td>
    <td><select class="cs" onchange="fchg(${idx},'statut_ligne',this.value)">
      <option${sl==='Actif'?' selected':''}>Actif</option>
      <option${sl==='Annulé'?' selected':''}>Annulé</option>
    </select></td>
    <td><select class="cs ${r.type_camion==='REEFER'?'type-reefer':'type-chauf'}" style="min-width:105px"
      onchange="fchg(${idx},'type_camion',this.value);updTypeSel(this)">
      <option value="__VIDE__"${r.type_camion==='__VIDE__'||!r.type_camion?' selected':''}>—</option>
      <option${r.type_camion==='REEFER'?' selected':''}>REEFER</option>
      <option${r.type_camion==='CHAUFFÉE'?' selected':''}>CHAUFFÉE</option>
    </select></td>
    <td><input class="ci" style="max-width:95px" value="${esc(r.num_arrivee||'')}" placeholder="N° arrivée" oninput="fchg(${idx},'num_arrivee',this.value)"></td>
    <td>
      <select class="cs desc-sel" style="min-width:150px" onchange="fchg(${idx},'description',this.value)">
        <option value="" ${!r.description?'selected':''}>—</option>
        ${DESC_OPTS.map(o=>`<option value="${esc(o)}"${r.description===o?' selected':''}>${esc(o)}</option>`).join('')}
        ${r.description==='—'?`<option value="—" selected>—</option>`:''}
      </select>
    </td>
    <td><select class="cs" style="min-width:95px" onchange="fchg(${idx},'dest_arrivee',this.value)">
      <option${(r.dest_arrivee||'SOY')==='SOY'?' selected':''}>SOY</option>
      <option${r.dest_arrivee==='GH'?' selected':''}>GH</option>
      <option${r.dest_arrivee==='ADVANTECH'?' selected':''}>ADVANTECH</option>
      <option${r.dest_arrivee==='PROACTIVE'?' selected':''}>PROACTIVE</option>
      <option${r.dest_arrivee==='LJDERY'?' selected':''}>LJDERY</option>
    </select></td>
    <td><span class="statut-badge ${r.statut==='FAIT'?'s-fait':'s-attente'}">
      <select class="cs statut-sel" onchange="fchg(${idx},'statut',this.value);updStatut(this)">
        <option${r.statut==='ATTENTE'||!r.statut?' selected':''}>ATTENTE</option>
        <option${r.statut==='FAIT'?' selected':''}>FAIT</option>
      </select>
    </span></td>
    <td><select class="cs" style="min-width:170px" onchange="fchg(${idx},'destination',this.value)">
      <option value="">—</option>${selDests}
    </select></td>
    <td><input class="ci" style="max-width:95px" value="${esc(r.num_depart||'')}" placeholder="N° départ" oninput="fchg(${idx},'num_depart',this.value)"></td>
    <td><span class="statut-badge ${r.chargement==='PRÊTE'?'c-prete':r.chargement==='EN CHARGEMENT'?'c-encours':'c-attente'}">
      <select class="cs statut-sel" style="min-width:135px" onchange="fchg(${idx},'chargement',this.value);updCharg(this)">
        <option${r.chargement==='ATTENTE'||!r.chargement?' selected':''}>ATTENTE</option>
        <option${r.chargement==='PRÊTE'?' selected':''}>PRÊTE</option>
        <option${r.chargement==='EN CHARGEMENT'?' selected':''}>EN CHARGEMENT</option>
      </select>
    </span></td>
    <td><input class="ci-t" type="time" value="${esc(r.heure_reelle||'')}" oninput="fchg(${idx},'heure_reelle',this.value)"></td>

// ── CHAMPS ─────────────────────────────────────────────────────────
function fchg(idx, field, val){
  if(!rows[idx]) rows[idx]={slot_index:idx};
  rows[idx][field]=val;
  if(field==='statut_ligne'){
    const tr=document.getElementById('tr'+idx);
    if(tr){ val==='Annulé'?tr.classList.add('row-annule'):tr.classList.remove('row-annule'); }
    render(); // Recalcule destinations (BOBTAIL) et type_camion au changement de statut
    return;
  }
  updateStats();
}
function togGH(idx, el){
  if(!rows[idx]) rows[idx]={slot_index:idx};
  const v=!rows[idx].short_gh;
  rows[idx].short_gh=v;
  v?el.classList.add('on'):el.classList.remove('on');
}

// ── SAVE ───────────────────────────────────────────────────────────
async function saveAll(){
  const btn=document.getElementById('btn-save-all');
  if(btn){btn.disabled=true;btn.textContent='Sauvegarde…';}
  const allIdx=[...Object.keys(rows).map(Number), ...SLOTS.map(s=>s.idx)];
  const unique=[...new Set(allIdx)].sort((a,b)=>a-b);
  let errors=0;
  for(const idx of unique){
    const r=rows[idx];
    if(!r) continue; // ligne vide non modifiée
    const slot=SLOTS.find(s=>s.idx===idx);
    const payload={
      date_jour:curDate, slot_index:idx,
      heure_planif:r.heure_planif||(slot?slot.h:'00:00'),
      statut_ligne:r.statut_ligne||'Actif',
      type_camion:(r.type_camion==='__VIDE__'?null:r.type_camion||null),
      num_arrivee:r.num_arrivee||null,
      num_depart:r.num_depart||null,
      dest_arrivee:r.dest_arrivee||'SOY',
      destination:r.destination||null,
      description:r.description||null,
      statut:r.statut||null,
      chargement:r.chargement||null,
      heure_reelle:r.heure_reelle||null,
      short_gh:r.short_gh||false,
      updated_at:new Date().toISOString(),
    };
    if(r.id){
      const {error}=await sb.from('planning_camions').update(payload).eq('id',r.id);
      if(error) errors++;
    } else {
      const {data:saved,error}=await sb.from('planning_camions').insert([payload]).select().single();
      if(error) errors++;
      else if(saved) rows[idx]={...rows[idx],...saved};
    }
  }
  if(btn){btn.disabled=false;btn.textContent='💾 Sauvegarder tout';}
  if(errors>0){toast(errors+' erreur(s) lors de la sauvegarde','error');return;}
  toast('Tableau sauvegardé ✓','success');
  // Recharger les données puis mettre à jour bilans et graphiques
  await loadData(curDate);
}
async function saveRow(idx){
  const btn=document.getElementById('bsv'+idx);
  if(btn){btn.disabled=true;btn.textContent='…';}
  const slot=SLOTS.find(s=>s.idx===idx);
  const r=rows[idx]||{};
  const payload={
    date_jour:curDate, slot_index:idx,
    heure_planif:r.heure_planif||(slot?slot.h:'00:00'),
    statut_ligne:r.statut_ligne||'Actif',
    type_camion:r.type_camion||null,
    num_arrivee:r.num_arrivee||null,
    num_depart:r.num_depart||null,
    dest_arrivee:r.dest_arrivee||'SOY',
    destination:r.destination||null,
    description:r.description||null,
    statut:r.statut||null,
    chargement:r.chargement||null,
    heure_reelle:r.heure_reelle||null,
    short_gh:r.short_gh||false,
    updated_at:new Date().toISOString(),
  };
  let error;
  if(r.id){
    ({error}=await sb.from('planning_camions').update(payload).eq('id',r.id));
  } else {
    const {data:saved,error:err}=await sb.from('planning_camions').insert([payload]).select().single();
    error=err;
    if(!error&&saved) rows[idx]={...rows[idx],...saved};
  }
  const svgSave='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>';
  if(btn){btn.disabled=false;btn.innerHTML=svgSave+' Sauver';}
  if(error){toast('Erreur: '+error.message,'error');return;}
  toast('✓ '+(slot?slot.lbl:(r.heure_planif||'Extra'))+' sauvegardé','success');
}

// ── DELETE (extra) ─────────────────────────────────────────────────
async function delRow(idx){
  if(!confirm('Supprimer ce camion supplémentaire ?')) return;
  const r=rows[idx];
  if(r&&r.id){
    const {error}=await sb.from('planning_camions').delete().eq('id',r.id);
    if(error){toast('Erreur: '+error.message,'error');return;}
  }
  delete rows[idx]; render();
  toast('Camion supplémentaire supprimé.','info');
}

function fmtDateLbl(s){
  return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'short',day:'2-digit',month:'short'});
}

function timeDiffMin(planned, real){
  const [ph,pm] = planned.split(':').map(Number);
  const [rh,rm] = real.split(':').map(Number);
  return (rh*60+rm)-(ph*60+pm);
}





















// ── EXPORT PDF ─────────────────────────────────────────────────────
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  // ── Couleurs palette
  const C = {
    void:    [6,  7,  11],
    deep:    [11, 13, 19],
    raised:  [21, 24, 31],
    float:   [26, 30, 42],
    copper:  [200,132,58],
    copperL: [224,168,112],
    text:    [240,234,224],
    muted:   [122,130,160],
    faint:   [44, 51, 80],
    emerald: [45, 212,160],
    ruby:    [224,85, 85],
    amber:   [232,164,58],
    white:   [255,255,255],
  };

  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();

  // ── Fond page
  doc.setFillColor(...C.void);
  doc.rect(0, 0, W, H, 'F');

  // ── Bande titre
  doc.setFillColor(...C.raised);
  doc.rect(0, 0, W, 22, 'F');
  // Ligne cuivrée sous le titre
  doc.setDrawColor(...C.copper);
  doc.setLineWidth(0.6);
  doc.line(0, 22, W, 22);

  // ── Titre
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.setTextColor(...C.copperL);
  doc.text('Planification Camions', 14, 10);

  // ── Sous-titre date
  const dateObj = new Date(curDate + 'T00:00:00');
  const dateLbl = dateObj.toLocaleDateString('fr-CA', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...C.muted);
  doc.text(dateLbl.charAt(0).toUpperCase() + dateLbl.slice(1), 14, 17);

  // ── Timestamp export
  const now = new Date().toLocaleString('fr-CA', { hour:'2-digit', minute:'2-digit' });
  doc.setFontSize(7);
  doc.text('Exporté le ' + new Date().toLocaleDateString('fr-CA') + ' à ' + now, W - 14, 17, { align: 'right' });

  // ── Construire les données du tableau
  const allIdx = [...new Set([...SLOTS.map(s => s.idx), ...Object.keys(rows).map(Number)])].sort((a,b)=>a-b);

  const tableData = [];
  let lineNum = 1;

  allIdx.forEach(idx => {
    const slot = SLOTS.find(s => s.idx === idx);
    const r    = rows[idx] || {};
    const sl   = r.statut_ligne || 'Actif';
    const h    = r.heure_planif || (slot ? slot.h : '—');
    const lbl  = slot ? slot.lbl : ('Extra ' + h);

    // Calculer retard si applicable
    let retardStr = '';
    if (r.heure_reelle && r.heure_planif) {
      const d = timeDiffMin(r.heure_planif, r.heure_reelle);
      retardStr = d <= 0 ? '✓' : '+' + d + ' min';
    }

    tableData.push({
      num:       lineNum++,
      heure:     h,
      slot:      lbl,
      statut:    sl,
      type:      r.type_camion || '—',
      desc:      r.description || '—',
      dest:      r.destination || '—',
      arrivee:   r.statut      || 'ATTENTE',
      charg:     r.chargement  || 'ATTENTE',
      hReelle:   r.heure_reelle|| '—',
      retard:    retardStr,
      gh:        r.short_gh ? 'Oui' : '',
      isAnnule:  sl === 'Annulé',
      isFait:    r.statut === 'FAIT',
    });
  });

  // ── Tableau autoTable
  doc.autoTable({
    startY: 27,
    margin: { left: 6, right: 6 },
    tableWidth: 'auto',

    head: [[
      '#', 'Heure', 'Créneau', 'Ligne', 'Type',
      'Description', 'Destination', 'Arrivée', 'Chargement', 'H. Réelle', 'Retard', 'GH'
    ]],

    body: tableData.map(r => [
      r.num, r.heure, r.slot, r.statut, r.type,
      r.desc, r.dest, r.arrivee, r.charg, r.hReelle, r.retard, r.gh
    ]),

    // Style global
    styles: {
      font: 'helvetica',
      fontSize: 7.5,
      cellPadding: { top: 3, bottom: 3, left: 3, right: 3 },
      textColor: C.text,
      lineColor: C.faint,
      lineWidth: 0.2,
      fillColor: C.deep,
      overflow: 'linebreak',
      minCellHeight: 9,
    },

    // Style en-tête
    headStyles: {
      fillColor: C.float,
      textColor: C.copperL,
      fontStyle: 'bold',
      fontSize: 7,
      lineColor: C.copper,
      lineWidth: { bottom: 0.5 },
    },

    // Style lignes alternées
    alternateRowStyles: {
      fillColor: [15, 17, 26],
    },

    // Largeurs des colonnes
    columnStyles: {
      0:  { cellWidth: 8,  halign: 'center' },  // #
      1:  { cellWidth: 15, halign: 'center', textColor: C.copperL },  // Heure
      2:  { cellWidth: 28 },  // Créneau
      3:  { cellWidth: 16, halign: 'center' },  // Ligne
      4:  { cellWidth: 18, halign: 'center' },  // Type
      5:  { cellWidth: 38 },  // Description
      6:  { cellWidth: 24 },  // Destination
      7:  { cellWidth: 18, halign: 'center' },  // Arrivée
      8:  { cellWidth: 26, halign: 'center' },  // Chargement
      9:  { cellWidth: 16, halign: 'center' },  // H. Réelle
      10: { cellWidth: 16, halign: 'center' },  // Retard
      11: { cellWidth: 10, halign: 'center' },  // GH
    },

    // Couleurs par ligne selon statut
    willDrawCell: function(data) {
      if (data.section !== 'body') return;
      const r = tableData[data.row.index];
      if (!r) return;

      if (r.isAnnule) {
        data.cell.styles.textColor = C.faint;
        data.cell.styles.fillColor = C.void;
      } else if (r.isFait && data.column.index === 7) {
        data.cell.styles.textColor = C.emerald;
      }

      // Colonne retard colorée
      if (data.column.index === 10 && data.cell.raw) {
        const txt = String(data.cell.raw);
        if (txt.startsWith('+')) {
          const min = parseInt(txt);
          data.cell.styles.textColor = min > 60 ? C.ruby : C.amber;
        } else if (txt === '✓') {
          data.cell.styles.textColor = C.emerald;
        }
      }
    },
  });

  // ── Pied de page
  const finalY = doc.lastAutoTable.finalY + 6;
  if (finalY < H - 10) {
    doc.setFontSize(6.5);
    doc.setTextColor(...C.faint);
    doc.text('SOY — Planification Camions', 14, finalY);
    doc.text('Page 1 / 1', W - 14, finalY, { align: 'right' });
  }

  // ── Téléchargement
  const fname = 'planification_' + curDate + '.pdf';
  doc.save(fname);
}
</script>
