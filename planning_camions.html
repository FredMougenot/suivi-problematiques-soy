<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planification Camions — Expédition SOY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-void:#06070B;--bg-deep:#0B0D13;--bg-base:#0F1118;
  --bg-raised:#15181F;--bg-float:#1A1E2A;--bg-hover:#1F2436;
  --copper:#C8843A;--copper-light:#E0A870;--copper-pale:#EDD4A8;
  --copper-glow:rgba(200,132,58,.22);--copper-dim:rgba(200,132,58,.10);
  --text-primary:#F0EAE0;--text-secondary:#BEC5D6;
  --text-muted:#7A82A0;--text-faint:#2C3350;
  --emerald:#2DD4A0;--ruby:#E05555;--amber:#E8A43A;--sapphire:#4A9EE8;
  --r-sm:4px;--r-md:10px;--r-lg:16px;
  --t-fast:.15s;--ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{font-family:'Outfit',sans-serif;background:var(--bg-base);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:64px;background:rgba(15,17,24,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--text-faint);padding:0 28px;display:flex;align-items:center;justify-content:space-between;}
.tb-left{display:flex;align-items:center;gap:14px;}
.tb-back{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:var(--r-md);background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-secondary);font-size:.82rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all var(--t-fast);}
.tb-back:hover{border-color:var(--copper);color:var(--copper-light);}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-icon{width:36px;height:36px;border-radius:var(--r-md);background:var(--copper-dim);border:1px solid rgba(200,132,58,.3);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--copper-light);flex-shrink:0;}
.tb-title{font-family:'Outfit',sans-serif;font-size:1.52rem;font-weight:700;color:var(--text-primary);letter-spacing:-.01em;}

/* DATE NAV */
.date-nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px 28px 0;}
.date-arr{width:36px;height:36px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all var(--t-fast);}
.date-lbl{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text-primary);padding:8px 22px;background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-md);min-width:260px;text-align:center;}

/* TABLE */
.main{flex:1;padding:18px 28px 50px;}
.tbl-outer{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);overflow-x:auto;}
.ptbl{width:100%;border-collapse:collapse;min-width:1080px;}
.ptbl thead tr{background:var(--bg-float);border-bottom:2px solid var(--text-faint);}
.ptbl thead th{padding:13px 12px;text-align:left;font-size:.62rem;font-weight:800;color:var(--copper);text-transform:uppercase;}
.ptbl tbody td{padding:11px 12px;font-size:.84rem;color:var(--text-primary);border-bottom:1px solid var(--text-faint);}

/* ── SLIDER DE VÉRIFICATION ─────────────────────────────────────── */
.verif-slider {
  position: relative; width: 240px; height: 40px; background: var(--bg-float);
  border-radius: 22px; border: 2px solid var(--text-faint); display: flex;
  align-items: center; padding: 4px; cursor: pointer; user-select: none; margin: auto;
}
.verif-track { position: absolute; width: calc(100% - 8px); display: flex; justify-content: space-between; padding: 0 12px; pointer-events: none; }
.verif-label { font-size: .65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
.verif-thumb {
  position: absolute; width: 32px; height: 32px; border-radius: 50%;
  transition: all .3s cubic-bezier(.4,0,.2,1); display: flex; align-items: center;
  justify-content: center; font-size: .75rem; color: #0F1118; font-weight: 900; z-index: 2;
}

/* Positions et couleurs des états */
.verif-thumb[data-state="none"]   { left: 4px; background: #4A5568; }
.verif-thumb[data-state="q1_ok"]  { left: calc(16.66% - 16px); background: #10B981; }
.verif-thumb[data-state="q1_err"] { left: calc(33.33% - 16px); background: #EF4444; }
.verif-thumb[data-state="q2_ok"]  { left: calc(50% - 16px); background: #10B981; }
.verif-thumb[data-state="q2_err"] { left: calc(66.66% - 16px); background: #EF4444; }
.verif-thumb[data-state="q3_ok"]  { left: calc(83.33% - 16px); background: #10B981; }
.verif-thumb[data-state="q3_err"] { left: calc(100% - 36px); background: #EF4444; }
</style>
</head>
<body>

<header class="topbar">
  <div class="tb-left">
    <a href="index.html" class="tb-back">Retour</a>
    <div class="tb-brand"><div class="tb-icon">S</div><div class="tb-title">Planification Camions</div></div>
  </div>
</header>

<div class="date-nav">
  <button class="date-arr" onclick="changeDay(-1)">←</button>
  <div class="date-lbl" id="date-lbl">—</div>
  <button class="date-arr" onclick="changeDay(1)">→</button>
</div>

<main class="main">
  <div id="spinner" class="spinner">Chargement…</div>
  <div class="tbl-outer" id="tbl">
    <table class="ptbl">
      <thead>
        <tr>
          <th>Heure</th>
          <th>Description</th>
          <th style="text-align:center; min-width:260px;">✎ Vérification Quarts</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>
// --- LOGIQUE SLIDER ---
const STATES = ["none", "q1_ok", "q1_err", "q2_ok", "q2_err", "q3_ok", "q3_err"];
const ICONS  = { "none":"○", "q1_ok":"1✓", "q1_err":"1✗", "q2_ok":"2✓", "q2_err":"2✗", "q3_ok":"3✓", "q3_err":"3✗" };

function cycleState(idx) {
  const thumb = document.getElementById(`thumb-${idx}`);
  let current = thumb.getAttribute("data-state");
  let nextIndex = (STATES.indexOf(current) + 1) % STATES.length;
  let nextState = STATES[nextIndex];
  
  thumb.setAttribute("data-state", nextState);
  thumb.innerText = ICONS[nextState];
  // Ici vous pouvez ajouter la sauvegarde automatique vers Supabase si nécessaire
}

// --- LOGIQUE RENDU TABLEAU (Adaptée à votre structure Supabase) ---
// Note : Remplacez cet exemple par votre appel réel à Supabase fetch()
const SLOTS = [
  {h:'06:00', desc:'Camion A - Stock palette'},
  {h:'06:00', desc:'Camion B - Vide'},
  {h:'07:30', desc:''},
  {h:'09:00', desc:''},
  {h:'11:30', desc:'Stock 1 commande'},
  {h:'14:00', desc:'Stock 2 grains'},
  {h:'15:30', desc:''},
  {h:'17:00', desc:''},
  {h:'18:00', desc:''},
  {h:'19:00', desc:''}
];

function render() {
  const container = document.getElementById('tbody');
  // On génère dynamiquement toutes les lignes
  container.innerHTML = SLOTS.map((slot, i) => `
    <tr>
      <td style="font-weight:700; color:var(--copper-light)">${slot.h}</td>
      <td>${slot.desc || '---'}</td>
      <td>
        <div class="verif-slider" onclick="cycleState(${i})">
          <div class="verif-track">
            <span class="verif-label">Q1</span>
            <span class="verif-label">Q2</span>
            <span class="verif-label">Q3</span>
          </div>
          <div id="thumb-${i}" class="verif-thumb" data-state="none">○</div>
        </div>
      </td>
      <td><button class="btn-sv" onclick="alert('Sauvegardé')">OK</button></td>
    </tr>
  `).join('');
  document.getElementById('spinner').style.display = 'none';
}

window.onload = () => {
    document.getElementById('date-lbl').innerText = new Date().toLocaleDateString('fr-FR');
    render();
};
</script>
</body>
</html>
