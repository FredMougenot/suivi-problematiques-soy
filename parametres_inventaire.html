<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paramètres — Inventaire Cyclique — SOY</title>
<link rel="stylesheet" href="soy-shared.css">
<style>
.page-eyebrow{font-size:.62rem;font-weight:800;color:var(--copper);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;}
.page-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text-primary);}
.page-sub{font-size:.82rem;color:var(--text-muted);margin-top:4px;margin-bottom:24px;}
.actions-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
.actions-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.btn-add{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.82rem;font-weight:800;border:none;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;}
.btn-add:hover{opacity:.88;transform:translateY(-1px);}
.btn-save-all{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-md);background:var(--emerald-bg);border:1px solid rgba(45,212,160,.3);color:var(--emerald);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-save-all:hover{background:rgba(45,212,160,.15);}
.item-count{font-size:.78rem;color:var(--text-muted);font-weight:600;padding:5px 12px;background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:20px;}
.kpi-retard{display:none;padding:5px 14px;border-radius:20px;background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);color:var(--ruby);font-size:.78rem;font-weight:700;}
.param-tbl-wrap{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);overflow:hidden;position:relative;}
.param-tbl-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--copper),transparent);pointer-events:none;}
.param-tbl{width:100%;border-collapse:collapse;}
.param-tbl thead tr{background:var(--bg-float);border-bottom:1px solid var(--text-faint);}
.param-tbl thead th{padding:12px 16px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);text-align:left;white-space:nowrap;}
.param-tbl thead th:first-child{width:48px;text-align:center;}
.param-tbl thead th:last-child{width:56px;text-align:center;}
.param-tbl tbody tr{border-bottom:1px solid rgba(44,51,80,.5);transition:background .1s;}
.param-tbl tbody tr:hover{background:var(--bg-hover);}
.param-tbl tbody tr:last-child{border-bottom:none;}
.param-tbl tbody td{padding:10px 16px;font-size:.86rem;color:var(--text-primary);vertical-align:middle;}
.param-tbl tbody td:first-child{text-align:center;color:var(--text-muted);font-size:.76rem;font-weight:700;}
.param-tbl tbody td:last-child{text-align:center;}
.inp-item{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text-primary);font-size:.86rem;font-family:'Outfit',sans-serif;outline:none;padding:4px 6px;width:100%;transition:border-color .15s;}
.inp-item:hover{border-bottom-color:var(--text-faint);}
.inp-item:focus{border-bottom-color:var(--copper);}
.sel-rec{background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-primary);border-radius:var(--r-sm);padding:5px 10px;font-size:.82rem;font-family:'Outfit',sans-serif;outline:none;cursor:pointer;transition:border-color .15s;width:110px;}
.sel-rec:focus{border-color:var(--copper);}
.sel-rec option{background:var(--bg-float);}
.td-date{font-size:.78rem;color:var(--text-secondary);white-space:nowrap;}
.td-prochaine{font-size:.78rem;font-weight:700;white-space:nowrap;}
.td-prochaine.ok{color:var(--emerald);}
.td-prochaine.soon{color:var(--amber);}
.td-prochaine.overdue{color:var(--ruby);}
.td-prochaine.never{color:var(--text-faint);font-style:italic;}
.btn-rm{width:28px;height:28px;border-radius:var(--r-sm);background:transparent;border:1px solid transparent;color:var(--text-muted);font-size:.85rem;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-rm:hover{background:rgba(224,85,85,.1);border-color:rgba(224,85,85,.3);color:var(--ruby);}
.spinner{display:flex;align-items:center;justify-content:center;padding:50px;gap:12px;color:var(--text-muted);font-size:.88rem;}
.sp-ring{width:24px;height:24px;border:2px solid var(--text-faint);border-top-color:var(--copper);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-bar{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:11px 18px;border-radius:var(--r-md);font-size:.82rem;font-weight:600;border:1px solid;animation:tin .2s;max-width:320px;}
.toast.ok{background:rgba(45,212,160,.12);color:var(--emerald);border-color:rgba(45,212,160,.3);}
.toast.err{background:rgba(224,85,85,.12);color:var(--ruby);border-color:rgba(224,85,85,.3);}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="tool-wrap">
  <div class="tool-topbar">
    <a class="tool-back" href="inventaire_cyclique.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Inventaire cyclique
    </a>
    <div class="tool-title">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--copper)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Paramètres — Inventaire cyclique
    </div>
    <span style="margin-left:auto;font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--copper-dim);border:1px solid rgba(200,132,58,.2);color:var(--copper);">Qualité</span>
  </div>

  <div class="tool-main">
    <div class="page-eyebrow">Configuration</div>
    <div class="page-title">Items à vérifier</div>
    <div class="page-sub">Définissez les items et leur fréquence de vérification. Chaque item a un numéro (1–200) et une récurrence.</div>

    <div class="actions-bar">
      <div class="actions-left">
        <button class="btn-add" onclick="addRow()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajouter un item
        </button>
        <button class="btn-save-all" onclick="saveAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Tout sauvegarder
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="item-count" id="item-count">— items</div>
        <div class="kpi-retard" id="kpi-retard"><span id="kpi-retard-val">0</span> en retard</div>
      </div>
    </div>

    <div id="spinner" class="spinner"><div class="sp-ring"></div> Chargement…</div>

    <div class="param-tbl-wrap" id="tbl-wrap" style="display:none">
      <table class="param-tbl">
        <thead>
          <tr>
            <th>#</th>
            <th>Item (nom libre)</th>
            <th>Récurrence</th>
            <th>Dernière vérif.</th>
            <th>Prochaine vérif.</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="toast-bar" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://xppzmdmnuztozgukrcta.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';
let sb;

// rows[i] = {id, item_number, nom, recurrence, derniere_verification, dirty, isNew}
let rows = [];
let nextTmpId = -1;

// ── UTILS ────────────────────────────────────────────────────────
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtDate(d){if(!d)return '—';return new Date(d+'T00:00:00').toLocaleDateString('fr-CA',{day:'2-digit',month:'short',year:'numeric'});}
function diffDays(s){return Math.round((new Date(s+'T00:00:00')-new Date(todayStr()+'T00:00:00'))/86400000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showSpinner(on){document.getElementById('spinner').style.display=on?'flex':'none';}
function toast(msg,type='ok'){
  const el=document.createElement('div');
  el.className='toast '+type;el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// ── INIT ────────────────────────────────────────────────────────
function initApp(){sb=supabase.createClient(SB_URL,SB_KEY);load();}
function waitSB(){
  if(typeof supabase!=='undefined'&&supabase.createClient){try{initApp();}catch(e){showSpinner(false);toast('Erreur init','err');}}
  else setTimeout(waitSB,50);
}
window.addEventListener('load',waitSB);

// ── CHARGEMENT ────────────────────────────────────────────────────
async function load(){
  showSpinner(true);
  try{
    const{data,error}=await sb.from('parametres_inventaire').select('*').order('item_number');
    if(error) throw error;
    if(data&&data.length>0){
      rows=data.map(r=>({
        id:r.id, item_number:r.item_number,
        nom:r.nom||'Item #'+r.item_number,
        recurrence:r.recurrence||30,
        derniere_verification:r.derniere_verification||null,
        dirty:false, isNew:false
      }));
    } else {
      // Pré-remplir 200 items numérotés
      rows=Array.from({length:200},(_,i)=>({
        id:nextTmpId--, item_number:i+1,
        nom:'Item '+(i+1),
        recurrence:30, derniere_verification:null,
        dirty:true, isNew:true
      }));
    }
  }catch(e){
    toast('Erreur : '+e.message,'err');
    rows=Array.from({length:200},(_,i)=>({
      id:nextTmpId--, item_number:i+1,
      nom:'Item '+(i+1),
      recurrence:30, derniere_verification:null,
      dirty:true, isNew:true
    }));
  }
  render();showSpinner(false);
}

// ── RENDU ────────────────────────────────────────────────────────
function render(){
  const today=todayStr();
  let retardCount=0;
  document.getElementById('tbody').innerHTML=rows.map((r,i)=>{
    const prochaine=r.derniere_verification?addDays(r.derniere_verification,r.recurrence):null;
    let cls='never',lbl='Jamais vérifié';
    if(prochaine){
      const diff=diffDays(prochaine);
      if(diff<0){cls='overdue';lbl=fmtDate(prochaine)+' ('+Math.abs(diff)+'j retard)';retardCount++;}
      else if(diff<=7){cls='soon';lbl=fmtDate(prochaine)+' (dans '+diff+'j)';}
      else{cls='ok';lbl=fmtDate(prochaine);}
    }
    return `<tr id="row-${i}">
      <td>${r.item_number}</td>
      <td><input class="inp-item" value="${esc(r.nom)}" placeholder="Nom de l'item…" oninput="markDirty(${i},'nom',this.value)"></td>
      <td>
        <select class="sel-rec" onchange="markDirty(${i},'recurrence',parseInt(this.value))">
          <option value="30" ${r.recurrence==30?'selected':''}>30 jours</option>
          <option value="60" ${r.recurrence==60?'selected':''}>60 jours</option>
          <option value="90" ${r.recurrence==90?'selected':''}>90 jours</option>
        </select>
      </td>
      <td class="td-date">${fmtDate(r.derniere_verification)}</td>
      <td class="td-prochaine ${cls}">${lbl}</td>
      <td><button class="btn-rm" onclick="removeRow(${i})" title="Supprimer">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button></td>
    </tr>`;
  }).join('');

  document.getElementById('item-count').textContent=rows.length+' item'+(rows.length!==1?'s':'');
  document.getElementById('tbl-wrap').style.display='block';
  const kpi=document.getElementById('kpi-retard');
  document.getElementById('kpi-retard-val').textContent=retardCount;
  kpi.style.display=retardCount>0?'block':'none';
}

function markDirty(idx,field,val){rows[idx][field]=val;rows[idx].dirty=true;}

// ── AJOUTER ──────────────────────────────────────────────────────
function addRow(){
  const nextNum=rows.length>0?Math.max(...rows.map(r=>r.item_number))+1:1;
  rows.push({id:nextTmpId--,item_number:nextNum,nom:'Item '+nextNum,recurrence:30,derniere_verification:null,dirty:true,isNew:true});
  render();
  setTimeout(()=>{
    const inputs=document.querySelectorAll('.inp-item');
    if(inputs.length) inputs[inputs.length-1].focus();
  },50);
}

// ── SUPPRIMER ────────────────────────────────────────────────────
async function removeRow(idx){
  const r=rows[idx];
  if(!r.isNew&&r.id&&String(r.id).length>10){
    try{
      const{error}=await sb.from('parametres_inventaire').delete().eq('id',r.id);
      if(error) throw error;
    }catch(e){toast('Erreur suppression : '+e.message,'err');return;}
  }
  rows.splice(idx,1);
  render();
  toast('Item supprimé','ok');
}

// ── SAUVEGARDER ──────────────────────────────────────────────────
async function saveAll(){
  const dirty=rows.filter(r=>r.dirty);
  if(!dirty.length){toast('Aucune modification','ok');return;}
  let saved=0,errors=0;
  for(const r of dirty){
    try{
      const payload={item_number:r.item_number,nom:r.nom,recurrence:r.recurrence};
      if(r.derniere_verification) payload.derniere_verification=r.derniere_verification;
      if(!r.isNew&&r.id&&String(r.id).length>10){
        const{error}=await sb.from('parametres_inventaire').update(payload).eq('id',r.id);
        if(error) throw error;
      } else {
        const{data,error}=await sb.from('parametres_inventaire').insert(payload).select().single();
        if(error) throw error;
        r.id=data.id; r.isNew=false;
      }
      r.dirty=false; saved++;
    }catch(e){errors++;console.error(e);}
  }
  if(errors) toast(errors+' erreur(s)','err');
  else toast(saved+' item(s) sauvegardé(s) ✓','ok');
  render();
}
</script>
</body>
</html>
