<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SOY · Orchestration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:        #0b0c10;
  --depth:      #0f1118;
  --surface:    #13161e;
  --raised:     #191d28;
  --edge:       #21263a;
  --edge-hi:    #2c3348;
  --text:       #dde3f5;
  --text-2:     #7d8ba8;
  --text-3:     #404860;
  --text-4:     #242c40;
  --gold:       #c9a84c;
  --gold-dim:   rgba(201,168,76,.07);
  --gold-glow:  rgba(201,168,76,.22);
  --cold:       #5bb8d4;
  --cold-b:     rgba(91,184,212,.28);
  --cold-prod:  rgba(43,140,168,.28);
  --warm:       #d4915b;
  --warm-b:     rgba(212,145,91,.28);
  --warm-prod:  rgba(168,107,42,.28);
  --ok:         #5bd4a0;
  --danger:     #d45b7a;
  --danger-dim: rgba(212,91,122,.1);
  --warn:       #d4c45b;
  --LW: 116px;
  --QH: 88px;
  --t: .2s cubic-bezier(.4,0,.2,1);
  --ts: .42s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{background:var(--ink);color:var(--text);font-family:'Geist',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}

/* ═══ HEADER ═══ */
.hdr{height:50px;background:var(--depth);border-bottom:1px solid var(--edge);display:flex;align-items:center;padding:0 22px;gap:14px;position:relative;z-index:100;flex-shrink:0}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-glow),transparent)}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
.bmark{width:28px;height:28px;border:1px solid var(--gold);border-radius:6px;display:grid;place-items:center;background:var(--gold-dim);font-family:'Cormorant Garamond',serif;font-weight:600;font-size:.85rem;color:var(--gold)}
.bname{font-family:'Cormorant Garamond',serif;font-size:.92rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase}
.bsub{font-family:'Geist Mono',monospace;font-size:.5rem;color:var(--text-3);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
.hsep{width:1px;height:22px;background:var(--edge);flex-shrink:0}
.dnav{display:flex;align-items:center;gap:5px}
.nb{width:22px;height:22px;border:1px solid var(--edge);border-radius:4px;background:transparent;color:var(--text-3);cursor:pointer;display:grid;place-items:center;font-size:.78rem;transition:var(--t)}
.nb:hover{border-color:var(--gold);color:var(--gold)}
.dinp{background:transparent;border:1px solid var(--edge);border-radius:4px;color:var(--text-2);font-family:'Geist Mono',monospace;font-size:.64rem;letter-spacing:.04em;padding:3px 7px;outline:none;transition:var(--t);cursor:pointer}
.dinp:focus{border-color:var(--gold);color:var(--text)}
.dlbl{font-family:'Cormorant Garamond',serif;font-size:.88rem;font-style:italic;color:var(--text-2)}
.kpis{display:flex;align-items:center;gap:18px;margin-left:auto}
.kpi{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.kv{font-family:'Geist Mono',monospace;font-size:.86rem;font-weight:600;line-height:1}
.kl{font-size:.5rem;color:var(--text-3);letter-spacing:.12em;text-transform:uppercase}
.vc{color:var(--cold)}.vw{color:var(--warm)}.vo{color:var(--ok)}.vr{color:var(--danger)}.vg{color:var(--gold)}
.hbtn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:5px;font-family:'Geist',sans-serif;font-size:.66rem;cursor:pointer;transition:var(--t);text-decoration:none;white-space:nowrap}
.bg{border:1px solid var(--edge);background:transparent;color:var(--text-2)}.bg:hover{border-color:var(--edge-hi);color:var(--text)}
.bt{border:1px solid var(--gold-glow);background:var(--gold-dim);color:var(--gold)}.bt:hover{background:var(--gold);color:var(--ink)}

/* ═══ QUAY CONFIG BAR ═══ */
.qbar{height:36px;background:var(--depth);border-bottom:1px solid var(--edge);display:flex;align-items:stretch;flex-shrink:0;position:relative;z-index:90}
.qbar-lbl{width:var(--LW);flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;padding-right:14px}
.qbar-lbl span{font-family:'Geist Mono',monospace;font-size:.54rem;color:var(--text-3);letter-spacing:.18em;text-transform:uppercase}
.qcfgs{flex:1;display:grid;grid-template-columns:repeat(4,1fr);background:var(--edge);gap:1px}
.qcfg{background:var(--depth);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:var(--t)}
.qcfg:hover{background:var(--raised)}
.qcfg-name{font-family:'Cormorant Garamond',serif;font-size:.85rem;font-weight:500;letter-spacing:.08em}
.qcfg.cold .qcfg-name{color:var(--cold)}.qcfg.warm .qcfg-name{color:var(--warm)}.qcfg.neutral .qcfg-name{color:var(--text-2)}
.qtag{font-family:'Geist Mono',monospace;font-size:.5rem;padding:1px 6px;border-radius:3px;letter-spacing:.07em}
.qcfg.cold .qtag{background:rgba(91,184,212,.1);color:var(--cold)}
.qcfg.warm .qtag{background:rgba(212,145,91,.1);color:var(--warm)}
.qcfg.neutral .qtag{background:var(--raised);color:var(--text-3)}

/* ═══ BOARD ═══ */
.bwrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}
.tscale{display:flex;padding-left:var(--LW);padding-top:10px;padding-bottom:6px;background:var(--ink);flex-shrink:0;position:relative}
.tscale::after{content:'';position:absolute;bottom:0;left:var(--LW);right:0;height:1px;background:var(--edge)}
.tsh{flex:1;text-align:center;font-family:'Geist Mono',monospace;font-size:.54rem;color:var(--text-4);letter-spacing:.06em}
.tsh.maj{color:var(--text-3)}

/* Quais */
.quays{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:36px;scrollbar-width:thin;scrollbar-color:var(--edge) transparent}
.qrow{display:flex;align-items:stretch;height:var(--QH);border-bottom:1px solid var(--edge);position:relative}
.qlbl{width:var(--LW);flex-shrink:0;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;padding-right:14px;gap:2px}
.qnum{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;line-height:1;letter-spacing:-.01em}
.qrow.cold .qnum{color:var(--cold)}.qrow.warm .qnum{color:var(--warm)}.qrow.neutral .qnum{color:var(--text-2)}
.qsub{font-family:'Geist Mono',monospace;font-size:.5rem;letter-spacing:.12em;text-transform:uppercase}
.qrow.cold .qsub{color:rgba(91,184,212,.35)}.qrow.warm .qsub{color:rgba(212,145,91,.35)}.qrow.neutral .qsub{color:var(--text-3)}

/* Track */
.qtrack{flex:1;position:relative;background:var(--surface);overflow:visible}
.qrow.cold .qtrack{border-left:2px solid rgba(91,184,212,.18)}
.qrow.warm .qtrack{border-left:2px solid rgba(212,145,91,.18)}
/* Grille heures */
.vl{position:absolute;top:0;bottom:0;width:1px;background:var(--edge);pointer-events:none;z-index:1}
.vl.maj{background:var(--edge-hi)}

/* ── BLOCS PRODUCTION ── */
.pband{position:absolute;top:8px;bottom:8px;border-radius:5px;pointer-events:none;z-index:2;overflow:hidden}
.pband::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-48deg,transparent,transparent 5px,rgba(255,255,255,.016) 5px,rgba(255,255,255,.016) 10px)}
.pc{background:linear-gradient(90deg,rgba(43,140,168,.24),rgba(43,140,168,.07));border:1px solid rgba(91,184,212,.1)}
.pw{background:linear-gradient(90deg,rgba(168,107,42,.24),rgba(168,107,42,.07));border:1px solid rgba(212,145,91,.1)}
.plbl{position:absolute;bottom:5px;left:8px;font-family:'Geist Mono',monospace;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;opacity:.55;z-index:3}
.pc .plbl{color:var(--cold)}.pw .plbl{color:var(--warm)}

/* Marqueur coïncidence */
.cmark{position:absolute;top:0;bottom:0;width:1px;pointer-events:none;z-index:4;opacity:.4}
.qrow.cold .cmark{background:var(--cold)}.qrow.warm .cmark{background:var(--warm)}

/* Zone conflit */
.cband{position:absolute;top:0;bottom:0;background:rgba(212,91,122,.06);border-left:1px dashed rgba(212,91,122,.22);border-right:1px dashed rgba(212,91,122,.22);pointer-events:none;z-index:3}
.cbadge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Geist Mono',monospace;font-size:.48rem;color:var(--danger);white-space:nowrap;background:var(--surface);padding:1px 4px;border-radius:2px}

/* Ligne NOW */
.nowl{position:absolute;top:0;bottom:0;width:1px;background:var(--danger);box-shadow:0 0 7px rgba(212,91,122,.55);pointer-events:none;z-index:50;display:none}
.nowpip{position:absolute;top:-4px;left:-4px;width:9px;height:9px;border-radius:50%;background:var(--danger);box-shadow:0 0 10px var(--danger)}

/* ── BLOCS CAMION ── */
.truck{position:absolute;top:11px;bottom:11px;border-radius:6px;z-index:10;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;cursor:pointer;transition:box-shadow var(--t),transform var(--t);min-width:50px;touch-action:none;user-select:none}
.truck:hover{transform:scaleY(1.06);box-shadow:0 6px 28px rgba(0,0,0,.55);z-index:20}
.truck.selected{outline:1.5px solid var(--gold);outline-offset:1px;z-index:25}
.truck.dragging{opacity:.78;transform:scale(1.04);z-index:100;box-shadow:0 16px 48px rgba(0,0,0,.7);transition:none}
.truck.cascading{transition:left .38s cubic-bezier(.4,0,.2,1)}
.truck.cpulse{animation:cpulse 1.4s infinite}
@keyframes cpulse{0%,100%{box-shadow:0 0 0 1.5px var(--danger)}50%{box-shadow:0 0 10px 1.5px var(--danger)}}
.tc{background:linear-gradient(155deg,rgba(91,184,212,.16),rgba(91,184,212,.05));border:1px solid var(--cold-b)}
.tw{background:linear-gradient(155deg,rgba(212,145,91,.16),rgba(212,145,91,.05));border:1px solid var(--warm-b)}
.tf{border-color:rgba(91,212,160,.35)!important;background:linear-gradient(155deg,rgba(91,212,160,.1),rgba(91,212,160,.03))!important}
.tnl{border-color:rgba(212,91,122,.28)!important;background:linear-gradient(155deg,rgba(212,91,122,.09),rgba(212,91,122,.03))!important;opacity:.6}
.th{padding:4px 8px 2px;display:flex;align-items:center;justify-content:space-between}
.ttime{font-family:'Geist Mono',monospace;font-size:.7rem;font-weight:600;line-height:1}
.tc .ttime{color:var(--cold)}.tw .ttime{color:var(--warm)}.tf .ttime{color:var(--ok)!important}.tnl .ttime{color:var(--danger)!important}
.tbadge{font-family:'Geist Mono',monospace;font-size:.46rem;font-weight:500;padding:1px 5px;border-radius:3px;letter-spacing:.06em}
.bdc{background:rgba(91,184,212,.1);color:var(--cold)}.bdw{background:rgba(212,145,91,.1);color:var(--warm)}
.bdf{background:rgba(91,212,160,.12);color:var(--ok)}.bdnl{background:rgba(212,91,122,.12);color:var(--danger)}
.tbody{padding:0 8px;font-size:.58rem;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;display:flex;align-items:center}
.tfoot{padding:2px 8px 4px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.04)}
.tnum{font-family:'Geist Mono',monospace;font-size:.5rem;color:var(--text-3)}
.tstock{font-size:.48rem;color:var(--gold);font-weight:500}

/* ═══ PANNEAU ═══ */
.panel{position:fixed;right:0;top:0;bottom:0;width:272px;background:var(--depth);border-left:1px solid var(--edge);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform var(--ts);box-shadow:-20px 0 60px rgba(0,0,0,.5)}
.panel::before{content:'';position:absolute;top:0;left:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--gold-glow),transparent)}
.panel.open{transform:translateX(0)}
.phdr{padding:16px 20px 12px;border-bottom:1px solid var(--edge);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.ptime{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:300;line-height:1}
.ptype{font-family:'Geist Mono',monospace;font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.pquay{font-size:.58rem;color:var(--text-3);margin-top:2px}
.pclose{width:22px;height:22px;border:1px solid var(--edge);border-radius:4px;background:transparent;color:var(--text-3);cursor:pointer;display:grid;place-items:center;font-size:.82rem;transition:var(--t);flex-shrink:0}
.pclose:hover{border-color:var(--gold);color:var(--gold)}
.pconflict{margin:0 20px;padding:8px 12px;background:var(--danger-dim);border:1px solid rgba(212,91,122,.2);border-radius:6px;font-size:.6rem;color:var(--danger);line-height:1.5;display:none}
.pconflict.show{display:block}
.pbody{flex:1;overflow-y:auto;padding-bottom:8px}
.psec{padding:11px 20px;border-bottom:1px solid var(--edge)}
.psec-t{font-family:'Geist Mono',monospace;font-size:.53rem;font-weight:500;color:var(--text-3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.psec-t::after{content:'';flex:1;height:1px;background:var(--edge)}
.df{margin-bottom:7px}.df:last-child{margin-bottom:0}
.dl{display:block;font-size:.52rem;font-weight:500;color:var(--text-3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.di,.ds{width:100%;background:var(--surface);border:1px solid var(--edge);border-radius:5px;color:var(--text);font-family:'Geist',sans-serif;font-size:.7rem;padding:6px 9px;outline:none;transition:var(--t);appearance:none}
.di:focus,.ds:focus{border-color:var(--gold)}.di::placeholder{color:var(--text-4)}
.dr{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pfooter{padding:12px 20px;border-top:1px solid var(--edge);display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.pb{width:100%;padding:8px;border-radius:5px;font-family:'Geist',sans-serif;font-size:.7rem;font-weight:500;cursor:pointer;transition:var(--t)}
.pb-p{background:var(--gold);color:var(--ink);border:none}.pb-p:hover{filter:brightness(1.1)}
.pb-g{background:transparent;border:1px solid var(--edge);color:var(--text-2)}.pb-g:hover{border-color:var(--edge-hi);color:var(--text)}
.pb-d{background:transparent;border:1px solid rgba(212,91,122,.25);color:var(--danger)}.pb-d:hover{background:var(--danger-dim)}

/* ═══ BARRE BAS ═══ */
.bbar{position:fixed;bottom:0;left:0;right:0;height:30px;background:rgba(11,12,16,.95);border-top:1px solid var(--edge);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:150;backdrop-filter:blur(8px);font-family:'Geist Mono',monospace;font-size:.56rem;color:var(--text-3);letter-spacing:.06em}
.bbd{width:5px;height:5px;border-radius:50%}
.bok{background:var(--ok);box-shadow:0 0 5px var(--ok)}.bwarn{background:var(--warn);animation:blink 1s infinite}.bdanger{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.bsep{width:1px;height:12px;background:var(--edge)}
.bhint{margin-left:auto;font-size:.5rem;color:var(--text-4);letter-spacing:.1em}

/* ═══ GHOST ═══ */
.ghost{position:fixed;pointer-events:none;z-index:9999;padding:6px 12px;border-radius:6px;font-family:'Geist Mono',monospace;font-size:.7rem;font-weight:600;white-space:nowrap;box-shadow:0 12px 40px rgba(0,0,0,.7);display:none;transition:none}
.gc{background:#0c1e2e;border:1px solid var(--cold-b);color:var(--cold)}.gw{background:#1e1008;border:1px solid var(--warm-b);color:var(--warm)}

/* ═══ TOASTS ═══ */
.toasts{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none}
.toast{background:var(--raised);border:1px solid var(--edge-hi);border-radius:7px;padding:8px 16px;font-size:.68rem;color:var(--text);display:flex;align-items:center;gap:7px;animation:tin .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap}
.toast.ok{border-left:2px solid var(--ok)}.toast.err{border-left:2px solid var(--danger)}.toast.warn{border-left:2px solid var(--warn)}
@keyframes tin{from{opacity:0;transform:translateY(6px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--edge-hi);border-radius:2px}
</style>
</head>
<body>

<div class="ghost" id="ghost"></div>

<!-- HEADER -->
<header class="hdr">
  <div class="brand">
    <div class="bmark">S</div>
    <div><div class="bname">Expédition SOY</div><div class="bsub">Orchestration · Quais</div></div>
  </div>
  <div class="hsep"></div>
  <div class="dnav">
    <button class="nb" onclick="shiftDay(-1)">‹</button>
    <input type="date" class="dinp" id="date-inp">
    <button class="nb" onclick="shiftDay(1)">›</button>
  </div>
  <span class="dlbl" id="day-lbl">—</span>
  <div class="kpis">
    <div class="kpi"><div class="kv vc" id="k-c">—</div><div class="kl">Réfrigérés</div></div>
    <div class="kpi"><div class="kv vw" id="k-w">—</div><div class="kl">Tempérés</div></div>
    <div class="kpi"><div class="kv vo" id="k-o">—</div><div class="kl">Livrés</div></div>
    <div class="kpi"><div class="kv vr" id="k-n">—</div><div class="kl">Non livrés</div></div>
    <div class="kpi"><div class="kv vg" id="k-e">—</div><div class="kl">Efficacité</div></div>
  </div>
  <div class="hsep"></div>
  <button class="hbtn bt" onclick="goToday()">Aujourd'hui</button>
  <a href="planning_camions.html" class="hbtn bg">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    Vue classique
  </a>
</header>

<!-- QUAY CONFIG -->
<div class="qbar">
  <div class="qbar-lbl"><span>Quais</span></div>
  <div class="qcfgs" id="qcfgs"></div>
</div>

<!-- BOARD -->
<div class="bwrap">
  <div class="tscale" id="tscale"></div>
  <div class="quays" id="quays"></div>
</div>

<!-- PANNEAU -->
<div class="panel" id="panel">
  <div class="phdr">
    <div>
      <div class="ptime" id="p-time">—</div>
      <div class="ptype" id="p-type">—</div>
      <div class="pquay" id="p-quay">—</div>
    </div>
    <button class="pclose" onclick="closePanel()">✕</button>
  </div>
  <div class="pconflict" id="p-conflict">⚡ Conflit — contrainte 1h30 non respectée.</div>
  <div class="pbody">
    <div class="psec">
      <div class="psec-t">Arrivée</div>
      <div class="dr">
        <div class="df"><label class="dl">N° entrant</label><input class="di" id="p-narr" placeholder="4872"></div>
        <div class="df"><label class="dl">Provenance</label><select class="ds" id="p-darr"></select></div>
      </div>
      <div class="dr">
        <div class="df"><label class="dl">Statut</label><select class="ds" id="p-sarr"></select></div>
        <div class="df"><label class="dl">Heure réelle</label><input class="di" id="p-hr" type="time"></div>
      </div>
    </div>
    <div class="psec">
      <div class="psec-t">Contenu</div>
      <div class="df"><label class="dl">Description</label><select class="ds" id="p-desc"></select></div>
      <div class="df"><label class="dl">Type camion</label><select class="ds" id="p-type"></select></div>
    </div>
    <div class="psec">
      <div class="psec-t">Départ</div>
      <div class="dr">
        <div class="df"><label class="dl">N° sortant</label><input class="di" id="p-ndep" placeholder="5103"></div>
        <div class="df"><label class="dl">Destination</label><select class="ds" id="p-dest"></select></div>
      </div>
      <div class="df"><label class="dl">Chargement</label><select class="ds" id="p-charg"></select></div>
    </div>
  </div>
  <div class="pfooter">
    <button class="pb pb-p" onclick="savePanel()">Enregistrer</button>
    <button class="pb pb-d" onclick="markNL()">Marquer Non Livré</button>

</div>

<!-- BARRE BAS -->
<div class="bbar" id="bbar">
  <div class="bbd bok"></div><span id="bb-ok">0</span>&nbsp;livrés
  <div class="bsep"></div>
  <span id="bb-conf" style="display:none;color:var(--danger)">
    <div class="bbd bdanger" style="display:inline-block;margin-right:5px"></div>
    <span id="bb-conf-txt"></span>
  </span>
  <span id="bb-cas" style="display:none;color:var(--warn)">
    <div class="bbd bwarn" style="display:inline-block;margin-right:5px"></div>
    cascade active
  </span>
  <span class="bhint">TAP LONG → GLISSER · CASCADE AUTOMATIQUE</span>
</div>

<div class="toasts" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://xppzmdmnuztozgukrcta.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';
const sb=supabase.createClient(SB_URL,SB_KEY);

const TL_S=6*60, TL_E=20*60, TL_R=14*60;
const GAP=90, PROD=240;
const WK_I=[0,1,7,8,9];

// Quais configurables
let QUAYS=[
  {id:0,name:'Quai 1',type:'cold',ps:6*60},
  {id:1,name:'Quai 2',type:'cold',ps:6*60+20},
  {id:2,name:'Quai 3',type:'warm',ps:6*60+30},
  {id:3,name:'Quai 4',type:'warm',ps:7*60},
];

// Slots de base — distribués sur les 4 quais
const BASE=[
  {idx:0,h:'06:00',lbl:'A',  quay:0},
  {idx:1,h:'06:00',lbl:'B',  quay:1},
  {idx:2,h:'07:30',lbl:'3',  quay:2},
  {idx:3,h:'09:00',lbl:'4',  quay:3},
  {idx:4,h:'11:30',lbl:'5',  quay:0},
  {idx:5,h:'14:00',lbl:'6',  quay:1},
  {idx:6,h:'15:30',lbl:'7',  quay:2},
  {idx:7,h:'17:00',lbl:'8',  quay:3},
  {idx:8,h:'18:00',lbl:'9',  quay:0},
  {idx:9,h:'19:00',lbl:'10', quay:1},
];

let curDate=todayStr(), _params={}, _rows={}, _slots=[], _sel=null;

// ── UTILS ──────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10)}
function toMin(h){if(!h)return 0;const[a,b]=h.split(':').map(Number);return a*60+b}
function minH(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
function pct(m){return Math.max(0,Math.min(100,(m-TL_S)/TL_R*100))}
function vP(t,i){return(_params[t]||[])[i]?.valeur||''}
function isWk(){const d=new Date(curDate+'T12:00:00').getDay();return d===0||d===6}
function isInactif(s,r){const sl=(r?.statut_ligne||'').trim();if(sl===vP('statut_ligne',1))return true;if(!sl&&isWk()&&WK_I.includes(s.idx))return true;return false}
function isNL(r){return(r?.statut_ligne||'').trim()===vP('statut_ligne',2)}
function isFait(r){return(r?.statut_arrivee||'').trim()===vP('statut_arrivee',0)}
function sType(s,r){const tc=(r?.type_camion||'').trim();if(tc===vP('type_camion',0))return'cold';if(tc===vP('type_camion',1))return'warm';const qt=QUAYS[s.quay]?.type||'cold';return qt==='neutral'?'cold':qt}
function hasConflict(idx){
  const s=_slots.find(s=>s.idx===idx),r=_rows[idx];
  if(!s||isInactif(s,r))return false;
  const hA=toMin(s.h);
  return _slots.some(s2=>{
    if(s2.idx===idx)return false;
    const r2=_rows[s2.idx];
    if(isInactif(s2,r2))return false;
    const diff=Math.abs(hA-toMin(s2.h));
    return diff>0&&diff<GAP;
  });
}

// ── LOAD ───────────────────────────────────────────────────────
async function load(){
  document.getElementById('quays').innerHTML='<div style="padding:60px;text-align:center;color:var(--text-4);font-family:Geist Mono,monospace;font-size:.6rem;letter-spacing:.2em">CHARGEMENT</div>';

  const{data:pD}=await sb.from('planning_params').select('*');
  _params={};
  if(pD){pD.forEach(p=>{if(!_params[p.type])_params[p.type]=[];_params[p.type].push(p)});Object.values(_params).forEach(a=>a.sort((x,y)=>x.ordre-y.ordre))}

  const{data:rD}=await sb.from('planning_camions').select('*').eq('date_jour',curDate);
  _rows={};
  if(rD)rD.forEach(r=>{_rows[r.slot_index]=r});

  _slots=JSON.parse(JSON.stringify(BASE));
  _slots.forEach(s=>{if(_rows[s.idx]?.heure_planif)s.h=_rows[s.idx].heure_planif});

  buildQBar(); buildScale(); render(); updateKPIs(); checkConf(); updateNow();
}

// ── QUAY BAR ──────────────────────────────────────────────────
function buildQBar(){
  const c=document.getElementById('qcfgs');c.innerHTML='';
  QUAYS.forEach((q,i)=>{
    const d=document.createElement('div');
    d.className=`qcfg ${q.type}`;
    d.innerHTML=`<span class="qcfg-name">${q.name}</span><span class="qtag">${q.type==='cold'?'REEFER':q.type==='warm'?'CHAUFFÉE':'MIXTE'}</span>`;
    d.onclick=()=>{QUAYS[i].type=['cold','warm','neutral'][(['cold','warm','neutral'].indexOf(q.type)+1)%3];buildQBar();render()};
    c.appendChild(d);
  });
}

// ── TIME SCALE ────────────────────────────────────────────────
function buildScale(){
  const ts=document.getElementById('tscale');ts.innerHTML='';
  for(let h=6;h<=19;h++){const m=document.createElement('div');m.className='tsh'+(h%2===0?' maj':'');m.textContent=h+'h';ts.appendChild(m)}
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const qd=document.getElementById('quays');qd.innerHTML='';
  QUAYS.forEach((q,qi)=>{
    const slots=_slots.filter(s=>s.quay===qi&&!isInactif(s,_rows[s.idx]));
    qd.appendChild(buildRow(q,qi,slots));
  });
  updateNow();
}

function buildRow(q,qi,slots){
  const row=document.createElement('div');
  row.className=`qrow ${q.type}`;row.id='qrow-'+qi;

  const lbl=document.createElement('div');
  lbl.className='qlbl';
  lbl.innerHTML=`<div class="qnum">${qi+1}</div><div class="qsub">${q.name}</div>`;
  row.appendChild(lbl);

  const track=document.createElement('div');
  track.className='qtrack';track.id='qtrack-'+qi;

  // Lignes heures verticales
  for(let h=6;h<=19;h++){
    const v=document.createElement('div');
    v.className='vl'+(h%2===0?' maj':'');
    v.style.left=pct(h*60)+'%';
    track.appendChild(v);
  }

  // Ligne NOW
  const nw=document.createElement('div');
  nw.className='nowl';nw.id='nowl-'+qi;
  nw.innerHTML='<div class="nowpip"></div>';
  track.appendChild(nw);

  // Cycles production
  if(q.type!=='neutral'){
    const lane=q.type==='cold'?'pc':'pw';
    for(let ps=q.ps||TL_S,ci=1;ps<TL_E;ps+=PROD,ci++){
      const pe=Math.min(ps+PROD,TL_E);
      const pb=document.createElement('div');
      pb.className=`pband ${lane}`;
      pb.style.left=pct(ps)+'%';
      pb.style.width=(pct(pe)-pct(ps))+'%';
      pb.innerHTML=`<div class="plbl">Prod. ${ci} · ${(pe-ps)/60}h</div>`;
      track.appendChild(pb);
    }
  }

  // Zones conflit + marqueurs coïncidence
  slots.forEach(s=>{
    const sm=toMin(s.h);
    const cm=document.createElement('div');
    cm.className='cmark';cm.style.left=pct(sm)+'%';
    track.appendChild(cm);

    if(hasConflict(s.idx)){
      _slots.forEach(s2=>{
        if(s2.idx===s.idx)return;
        const r2=_rows[s2.idx];if(isInactif(s2,r2))return;
        const h2=toMin(s2.h),diff=Math.abs(sm-h2);
        if(diff>0&&diff<GAP){
          const cb=document.createElement('div');cb.className='cband';
          cb.style.left=pct(Math.min(sm,h2))+'%';
          cb.style.width=(pct(Math.max(sm,h2))-pct(Math.min(sm,h2)))+'%';
          const badge=document.createElement('div');badge.className='cbadge';
          badge.textContent='⚡'+diff+'m';cb.appendChild(badge);
          track.appendChild(cb);
        }
      });
    }
  });

  // Blocs camion
  slots.forEach(s=>track.appendChild(buildBlock(s,_rows[s.idx],qi)));

  row.appendChild(track);return row;
}

function buildBlock(s,row,qi){
  const nl=isNL(row),fait=isFait(row),tp=sType(s,row);
  const sm=toMin(s.h),wp=pct(sm+90)-pct(sm);
  const el=document.createElement('div');
  let cls=`truck t${tp.charAt(0)}`;
  if(fait)cls+=' tf';if(nl)cls+=' tnl';
  if(hasConflict(s.idx))cls+=' cpulse';
  el.className=cls;el.id='truck-'+s.idx;
  el.dataset.idx=s.idx;el.dataset.quay=qi;
  el.style.left=pct(sm)+'%';
  el.style.width=Math.max(wp,4)+'%';

  const dest=row?.destination||vP('destination',0);
  const na=row?.num_arr||'',nd=row?.num_dep||'';
  const desc=row?.description||'';
  const stock=desc.toLowerCase().includes('stock');
  let bc=`bd${tp.charAt(0)}`,bl=tp==='cold'?'REEFER':'CHAUFFÉE';
  if(fait){bc='bdf';bl='LIVRÉ'}if(nl){bc='bdnl';bl='N.LIVRÉ'}

  el.innerHTML=`
    <div class="th"><span class="ttime">${s.h.replace(':','h')}</span><span class="tbadge ${bc}">${bl}</span></div>
    <div class="tbody">${dest||'—'}</div>
    <div class="tfoot">
      <span class="tnum">${na?'↓'+na:''}${na&&nd?' ':''}${nd?'↑'+nd:''}</span>
      ${stock?`<span class="tstock">📦</span>`:`<span class="tnum" style="color:var(--text-4)">${desc.substring(0,9)||'—'}</span>`}
    </div>`;

  el.addEventListener('click',e=>{e.stopPropagation();openPanel(s.idx)});
  setupTouch(el,s.idx,qi);
  return el;
}

// ── TOUCH DRAG + CASCADE ───────────────────────────────────────
function setupTouch(el,idx,qi){
  let timer=null,dragging=false,startX=0,trackRect=null;
  const LPRESS=480;

  el.addEventListener('touchstart',e=>{
    if(isNL(_rows[idx]))return;
    startX=e.touches[0].clientX;
    timer=setTimeout(()=>{
      dragging=true;
      el.classList.add('dragging');
      const tr=document.getElementById('qtrack-'+qi);
      trackRect=tr.getBoundingClientRect();
      const s=_slots.find(s=>s.idx===idx);
      showGhost(s,sType(s,_rows[idx]));
      navigator.vibrate&&navigator.vibrate(45);
      // Surligner les blocs qui vont être décalés
      highlightCascade(idx,true);
    },LPRESS);
  },{passive:true});

  el.addEventListener('touchmove',e=>{
    if(!dragging){if(Math.abs(e.touches[0].clientX-startX)>8)clearTimeout(timer);return}
    e.preventDefault();
    const tx=e.touches[0].clientX;
    const relX=(tx-trackRect.left)/trackRect.width;
    const rawM=TL_S+relX*TL_R;
    const snapped=Math.round(rawM/30)*30;
    const newM=Math.max(TL_S,Math.min(TL_E-60,snapped));
    el.style.left=pct(newM)+'%';
    moveGhost(tx,e.touches[0].clientY,minH(newM));
  },{passive:false});

  el.addEventListener('touchend',e=>{
    clearTimeout(timer);hideGhost();
    highlightCascade(idx,false);
    if(!dragging){dragging=false;return}
    dragging=false;el.classList.remove('dragging');
    const lp=parseFloat(el.style.left);
    const newM=Math.round((TL_S+lp/100*TL_R)/30)*30;
    cascade(idx,minH(Math.max(TL_S,Math.min(TL_E-60,newM))));
  },{passive:true});

  el.addEventListener('touchcancel',()=>{
    clearTimeout(timer);dragging=false;
    el.classList.remove('dragging');hideGhost();
    highlightCascade(idx,false);
  });
}

function highlightCascade(idx,on){
  const s=_slots.find(s=>s.idx===idx);
  const oldM=toMin(s.h);
  _slots.forEach(s2=>{
    if(s2.idx===idx)return;
    if(isInactif(s2,_rows[s2.idx]))return;
    if(toMin(s2.h)>=oldM){
      const el=document.getElementById('truck-'+s2.idx);
      if(el)el.style.opacity=on?'0.45':'';
    }
  });
}

function cascade(idx,newH){
  const s=_slots.find(s=>s.idx===idx);
  const oldM=toMin(s.h),newM=toMin(newH);
  const delta=newM-oldM;
  if(delta===0){render();return}

  // Tous les slots actifs APRÈS l'heure du slot déplacé, tous quais confondus
  const affected=_slots
    .filter(s2=>s2.idx!==idx&&!isInactif(s2,_rows[s2.idx])&&toMin(s2.h)>=oldM)
    .sort((a,b)=>toMin(a.h)-toMin(b.h));

  s.h=newH;
  affected.forEach(s2=>{
    s2.h=minH(Math.max(TL_S,Math.min(TL_E-30,toMin(s2.h)+delta)));
  });

  const dir=delta>0?'+':'';
  toast(`${dir}${delta} min · ${affected.length} camion${affected.length>1?'s décalés en cascade':' décalé en cascade'}`,'warn');

  // Indiquer cascade active
  const bbc=document.getElementById('bb-cas');bbc.style.display='flex';
  setTimeout(()=>bbc.style.display='none',3000);

  render();updateKPIs();checkConf();

  // Sauvegarder
  saveH(idx);affected.forEach(s2=>saveH(s2.idx));
}

// ── GHOST ─────────────────────────────────────────────────────
function showGhost(s,tp){
  const g=document.getElementById('ghost');
  g.className='ghost g'+tp.charAt(0);
  g.textContent=s.h.replace(':','h');g.style.display='block';
}
function moveGhost(x,y,h){
  const g=document.getElementById('ghost');
  g.style.left=(x+14)+'px';g.style.top=(y-28)+'px';g.textContent=h.replace(':','h');
}
function hideGhost(){document.getElementById('ghost').style.display='none'}

// ── NOW ───────────────────────────────────────────────────────
function updateNow(){
  const now=new Date(),m=now.getHours()*60+now.getMinutes();
  document.querySelectorAll('.nowl').forEach(nl=>{
    if(curDate!==todayStr()||m<TL_S||m>TL_E){nl.style.display='none';return}
    nl.style.display='block';nl.style.left=pct(m)+'%';
  });
}

// ── CONFLITS ──────────────────────────────────────────────────
function checkConf(){
  const confs=_slots.filter(s=>hasConflict(s.idx));
  const el=document.getElementById('bb-conf');
  const txt=document.getElementById('bb-conf-txt');
  if(confs.length){
    el.style.display='inline-flex';
    txt.textContent=confs.length+' conflit'+(confs.length>1?'s':'')+' · '+confs.map(s=>s.h.replace(':','h')).join(', ');
  } else el.style.display='none';
}

// ── KPIs ──────────────────────────────────────────────────────
function updateKPIs(){
  let c=0,w=0,o=0,n=0,tot=0;
  _slots.forEach(s=>{const r=_rows[s.idx];if(isInactif(s,r))return;tot++;const t=sType(s,r);if(t==='cold')c++;else w++;if(isNL(r))n++;else if(isFait(r))o++;});
  document.getElementById('k-c').textContent=c;
  document.getElementById('k-w').textContent=w;
  document.getElementById('k-o').textContent=o;
  document.getElementById('k-n').textContent=n;
  document.getElementById('bb-ok').textContent=o;
  const d=tot-n;document.getElementById('k-e').textContent=d>0?Math.round(o/d*100)+'%':'—';
}

// ── PANNEAU ───────────────────────────────────────────────────
function openPanel(idx){
  _sel=idx;
  const s=_slots.find(s=>s.idx===idx),r=_rows[idx]||{};
  const tp=sType(s,r),q=QUAYS[s.quay];
  document.getElementById('panel').classList.add('open');
  const pt=document.getElementById('p-time');
  pt.textContent=s.h.replace(':','h');
  pt.style.color=tp==='cold'?'var(--cold)':'var(--warm)';
  document.getElementById('p-type').textContent=tp==='cold'?'❄  REEFER':'◈  CHAUFFÉE';
  document.getElementById('p-type').style.color=tp==='cold'?'var(--cold)':'var(--warm)';
  document.getElementById('p-quay').textContent=q.name;
  document.getElementById('p-conflict').classList.toggle('show',hasConflict(idx));
  document.getElementById('p-narr').value=r.num_arr||'';
  document.getElementById('p-ndep').value=r.num_dep||'';
  document.getElementById('p-hr').value=r.heure_reelle||'';
  fillS('p-darr','dest_arrivee',r.dest_arrivee);
  fillS('p-sarr','statut_arrivee',r.statut_arrivee);
  fillS('p-desc','description',r.description);
  fillS('p-type','type_camion',r.type_camion);
  fillS('p-dest','destination',r.destination);
  fillS('p-charg','chargement',r.chargement);
  document.querySelectorAll('.truck').forEach(t=>t.classList.remove('selected'));
  document.getElementById('truck-'+idx)?.classList.add('selected');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.truck').forEach(t=>t.classList.remove('selected'));
  _sel=null;
}
function fillS(id,type,cur){
  const s=document.getElementById(id);
  s.innerHTML='<option value="">—</option>'+(_params[type]||[]).map(it=>`<option value="${it.valeur}"${cur===it.valeur?' selected':''}>${it.valeur}</option>`).join('');
}

// ── SAVE ──────────────────────────────────────────────────────
async function savePanel(){
  if(_sel===null)return;
  if(!_rows[_sel])_rows[_sel]={};const r=_rows[_sel];
  r.num_arr=document.getElementById('p-narr').value;
  r.num_dep=document.getElementById('p-ndep').value;
  r.heure_reelle=document.getElementById('p-hr').value||null;
  r.dest_arrivee=document.getElementById('p-darr').value;
  r.statut_arrivee=document.getElementById('p-sarr').value;
  r.description=document.getElementById('p-desc').value;
  r.type_camion=document.getElementById('p-type').value;
  r.destination=document.getElementById('p-dest').value;
  r.chargement=document.getElementById('p-charg').value;
  await saveRow(_sel);render();updateKPIs();checkConf();toast('Enregistré','ok');
}
async function saveRow(idx){
  const r=_rows[idx]||{},s=_slots.find(s=>s.idx===idx);
  const{error}=await sb.from('planning_camions').upsert({
    slot_index:idx,date_jour:curDate,heure_planif:s.h,
    num_arr:r.num_arr||null,num_dep:r.num_dep||null,heure_reelle:r.heure_reelle||null,
    dest_arrivee:r.dest_arrivee||null,statut_arrivee:r.statut_arrivee||null,
    description:r.description||null,type_camion:r.type_camion||null,
    destination:r.destination||null,chargement:r.chargement||null,statut_ligne:r.statut_ligne||null,
  },{onConflict:'date_jour,slot_index'});
  if(error)toast('Erreur: '+error.message,'err');
}
async function saveH(idx){
  const s=_slots.find(s=>s.idx===idx),r=_rows[idx]||{};
  await sb.from('planning_camions').upsert({
    slot_index:idx,date_jour:curDate,heure_planif:s.h,
    ...(r.statut_ligne&&{statut_ligne:r.statut_ligne}),
  },{onConflict:'date_jour,slot_index'});
}
async function markNL(){
  if(_sel===null)return;if(!_rows[_sel])_rows[_sel]={};
  _rows[_sel].statut_ligne=vP('statut_ligne',2);
  await saveRow(_sel);render();updateKPIs();closePanel();toast('Non Livré','warn');
}
async function toggleInactif(){
  if(_sel===null)return;if(!_rows[_sel])_rows[_sel]={};
  const cur=_rows[_sel].statut_ligne;
  _rows[_sel].statut_ligne=cur===vP('statut_ligne',1)?vP('statut_ligne',0):vP('statut_ligne',1);
  await saveRow(_sel);render();updateKPIs();closePanel();
}

// ── DATE ──────────────────────────────────────────────────────
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('fr-CA',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase())}
function updDate(){document.getElementById('day-lbl').textContent=fmtDate(curDate);document.getElementById('date-inp').value=curDate}
function shiftDay(d){const dt=new Date(curDate+'T12:00:00');dt.setDate(dt.getDate()+d);curDate=dt.toISOString().slice(0,10);updDate();load()}
function goToday(){curDate=todayStr();updDate();load()}
document.getElementById('date-inp').addEventListener('change',e=>{curDate=e.target.value;updDate();load()});

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const z=document.getElementById('toasts'),t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;z.appendChild(t);
  setTimeout(()=>t.remove(),2600);
}

// ── INIT ──────────────────────────────────────────────────────
updDate();load();
setInterval(updateNow,60000);
</script>
