<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventaire Cyclique — SOY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="soy-shared.css">
<style>
/* ══ INVENTAIRE CYCLIQUE ════════════════════════════════════════ */
.ic-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-eyebrow{font-size:.62rem;font-weight:800;color:var(--copper);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;}
.page-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text-primary);}
.page-sub{font-size:.82rem;color:var(--text-muted);margin-top:4px;}

/* Navigation date */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;}
.date-lbl{font-size:.9rem;font-weight:700;color:var(--text-primary);background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-md);padding:8px 16px;min-width:220px;text-align:center;}
.nav-btn{width:34px;height:34px;border-radius:var(--r-sm);background:var(--bg-raised);border:1px solid var(--text-faint);color:var(--text-secondary);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.nav-btn:hover{border-color:var(--copper);color:var(--copper-light);}
.btn-today{padding:7px 14px;border-radius:var(--r-sm);background:var(--copper-dim);border:1px solid rgba(200,132,58,.3);color:var(--copper-light);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-today:hover{background:rgba(200,132,58,.2);}

/* Bouton ajouter */
.btn-add{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:var(--r-md);
  background:linear-gradient(135deg,var(--copper),var(--copper-light));
  color:#0F1118;font-size:.82rem;font-weight:800;border:none;cursor:pointer;
  transition:opacity .15s,transform .1s;white-space:nowrap;
}
.btn-add:hover{opacity:.88;transform:translateY(-1px);}
.btn-add:active{transform:none;}

/* Table inventaire */
.ic-tbl-wrap{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative;}
.ic-tbl-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--copper),transparent);}
.ic-tbl{width:100%;border-collapse:collapse;min-width:1100px;}
.ic-tbl thead tr{background:var(--bg-float);border-bottom:1px solid var(--text-faint);}
.ic-tbl thead th{padding:11px 12px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);text-align:center;white-space:nowrap;}
.ic-tbl thead th:first-child{text-align:left;padding-left:16px;}
.ic-tbl tbody tr{border-bottom:1px solid rgba(44,51,80,.5);transition:background .1s;}
.ic-tbl tbody tr:hover{background:var(--bg-hover);}
.ic-tbl tbody tr:last-child{border-bottom:none;}
.ic-tbl tbody td{padding:8px 10px;font-size:.84rem;color:var(--text-primary);vertical-align:middle;text-align:center;}
.ic-tbl tbody td:first-child{text-align:left;padding-left:16px;}

/* Groupes de colonnes */
.th-group{background:var(--bg-active) !important;color:var(--copper) !important;font-size:.58rem !important;letter-spacing:.12em !important;border-bottom:1px solid rgba(200,132,58,.2) !important;}

/* Inputs numérique */
.ni{
  background:var(--bg-float);border:1px solid var(--text-faint);
  color:var(--text-primary);border-radius:var(--r-sm);
  padding:5px 8px;font-size:.82rem;font-family:'Outfit',sans-serif;
  outline:none;transition:border-color .15s;width:90px;text-align:center;
}
.ni:focus{border-color:var(--copper);}
.ni-item{
  background:transparent;border:none;border-bottom:1px solid var(--text-faint);
  color:var(--text-primary);font-size:.84rem;font-family:'Outfit',sans-serif;
  outline:none;padding:4px 6px;width:160px;text-align:left;
  transition:border-color .15s;
}
.ni-item:focus{border-color:var(--copper);}

/* Colonnes calculées */
.td-calc{font-weight:700;font-size:.85rem;}
.td-total{
  font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;
  color:var(--text-primary);
}
.td-ecart-pos{color:var(--emerald);font-weight:700;}
.td-ecart-neg{color:var(--ruby);font-weight:700;}
.td-ecart-zero{color:var(--text-muted);font-weight:600;}

/* Ligne numéro */
.item-num{font-weight:800;color:var(--text-muted);font-size:.78rem;min-width:24px;}

/* Bouton sauver */
.btn-rm{
  width:26px;height:26px;border-radius:var(--r-sm);
  background:rgba(224,85,85,.08);border:1px solid rgba(224,85,85,.2);
  color:var(--ruby);font-size:.8rem;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s;margin-left:4px;
}
.btn-rm:hover{background:rgba(224,85,85,.18);}

/* Spinner */
.spinner{display:none;align-items:center;justify-content:center;padding:40px;}
.sp-ring{width:32px;height:32px;border:2px solid var(--text-faint);border-top-color:var(--copper);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Totaux bas de tableau */
.ic-tbl tfoot tr{background:var(--bg-float);border-top:2px solid rgba(200,132,58,.3);}
.ic-tbl tfoot td{padding:10px 12px;font-weight:800;font-size:.84rem;color:var(--copper-light);}

@media(max-width:1100px){
  .ic-header-row{flex-direction:column;align-items:flex-start;}
}
.btn-save-all{display:inline-flex;align-items:center;gap:8px;padding:11px 36px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--copper),var(--copper-light));color:#0F1118;font-size:.86rem;font-weight:800;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(184,115,51,.3);transition:opacity .15s,transform .1s;}
.btn-save-all:hover{opacity:.88;}
.btn-save-all:active{transform:scale(.97);}
</style>
</head>
<body>
<div class="tool-wrap">

  <!-- TOPBAR -->
  <div class="tool-topbar">
    <a class="tool-back" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
    <div class="tool-title">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--copper)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Inventaire Cyclique
    </div>
    <span style="font-size:.72rem;color:var(--text-muted);margin-left:auto;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--copper-dim);border:1px solid rgba(200,132,58,.2);color:var(--copper);">Qualité</span>
    <a href="parametres.html" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:#1A1E2A;border:1px solid #2C3350;color:#BEC5D6;font-size:.78rem;font-weight:600;text-decoration:none;margin-left:12px;transition:all .15s;" onmouseover="this.style.borderColor='#C8843A';this.style.color='#E0A870'" onmouseout="this.style.borderColor='#2C3350';this.style.color='#BEC5D6'">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Paramètres
    </a>
  </div>

  <!-- MAIN -->
  <div class="tool-main">
    <!-- Navigation date — centrée, au-dessus du tableau -->
    <div class="date-nav">
      <button class="nav-btn" onclick="changeDate(-1)">&#8592;</button>
      <div class="date-lbl" id="date-lbl">—</div>
      <button class="nav-btn" onclick="changeDate(1)">&#8594;</button>
      <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
    </div>

    <!-- Bouton Ajouter collé en haut à gauche du tableau -->
    <div style="margin-bottom:8px;">
      <button class="btn-add" onclick="addItem()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter un item
      </button>
    </div>

    <!-- Tableau -->
    <div class="ic-tbl-wrap">
      <div class="spinner" id="spinner"><div class="sp-ring"></div></div>
      <table class="ic-tbl" id="ic-tbl" style="display:none">
        <thead>
          <tr>
            <th rowspan="2" style="text-align:center">#</th>
            <th rowspan="2" style="text-align:left;min-width:160px">Item</th>
            <th rowspan="2">Poids unitaire<br><small style="font-weight:400;font-size:.58rem">(kg)</small></th>
            <th colspan="2" class="th-group">Entrepôt 1</th>
            <th colspan="2" class="th-group">Entrepôt 2</th>
            <th rowspan="2">Total<br><small style="font-weight:400;font-size:.58rem">(kg)</small></th>
            <th rowspan="2">ERP<br><small style="font-weight:400;font-size:.58rem">(kg)</small></th>
            <th rowspan="2">Écart<br><small style="font-weight:400;font-size:.58rem">(kg)</small></th>
            <th rowspan="2"></th>
          </tr>
          <tr>
            <th class="th-group">Qté Entrepôt 1</th>
            <th class="th-group">Balance 1</th>
            <th class="th-group">Qté Entrepôt 2</th>
            <th class="th-group">Balance 2</th>
          </tr>
        </thead>
        <tbody id="ic-tbody"></tbody>
        <tfoot id="ic-tfoot"></tfoot>
      </table>
    </div>

  </div>

  <div style="display:flex;justify-content:center;align-items:center;gap:12px;padding:12px 0 4px;flex-wrap:wrap;">
    <button id="btn-save-all-ic" class="btn-save-all" onclick="saveAllIc()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Sauvegarder tout
    </button>
    <button onclick="submitNcIc()" style="display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid var(--ruby);color:var(--ruby);font-size:.86rem;font-weight:700;cursor:pointer;transition:all .15s;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Soumettre les non-conformités
    </button>
  </div>
</div>

<!-- TOASTS -->
<div class="toasts" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

function localToday(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const SUPABASE_URL = 'https://xppzmdmnuztozgukrcta.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2b3JLbLOKDnHpTUqJc66ET-8Kug';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let curDate = localToday();
let rows = {};        // {param_id: rowData}  clé = id dans parametres
let paramItems = [];  // [{id, item, recurrence, derniere_verification}]
let nextExtra = 100;  // index pour items extra ajoutés dynamiquement
let extraRows = {};   // {idx: rowData} pour items extra (idx >= 100)

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg, type='info'){
  const c=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast-item toast-'+type;
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>el.classList.add('show'),10);
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},3200);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── DATE ──────────────────────────────────────────────────────────
function refreshDateUI(){
  const d = new Date(curDate+'T00:00:00');
  const opts = {weekday:'long',day:'2-digit',month:'long',year:'numeric'};
  document.getElementById('date-lbl').textContent =
    d.toLocaleDateString('fr-CA', opts).replace(/^\w/, c=>c.toUpperCase());
}
function changeDate(delta){
  const d = new Date(curDate+'T00:00:00');
  d.setDate(d.getDate()+delta);
  curDate = d.toISOString().slice(0,10);
  refreshDateUI(); load();
}
function goToday(){
  curDate = localToday();
  refreshDateUI(); load();
}

// ── CALCULS ───────────────────────────────────────────────────────
function calcRow(r){
  const pu   = parseFloat(r.poids_unitaire)||0;
  const q1   = parseFloat(r.qte_e1)||0;
  const b1   = parseFloat(r.balance1)||0;
  const q2   = parseFloat(r.qte_e2)||0;
  const b2   = parseFloat(r.balance2)||0;
  const erp  = parseFloat(r.erp)||0;
  const total = (q1 * pu + b1) + (q2 * pu + b2);
  const ecart = total - erp;
  return {total, ecart};
}

function fmtNum(n){
  if(isNaN(n)||n===null||n===undefined) return '—';
  return n.toFixed(2).replace(/\.?0+$/, '').replace(/\B(?=(\d{3})+(?!\d))/g,'\u202f');
}

function fmtDate(d){
  if(!d) return '—';
  return new Date(d+'T00:00:00').toLocaleDateString('fr-CA',{day:'2-digit',month:'short',year:'numeric'});
}

function addDays(dateStr, days){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}

// ── RENDU ─────────────────────────────────────────────────────────
function render(){
  const today = localToday();
  let totalTotal=0, totalErp=0, totalEcart=0, totalItems=0;
  let retardCount = 0;
  let html = '';
  let pos = 0;

  // Items depuis parametres
  paramItems.forEach(param => {
    const key = 'p'+param.id;
    const r = rows[key] || {};
    const {total, ecart} = calcRow(r);
    const hasVal=[r.qte_e1,r.balance1,r.qte_e2,r.balance2].some(v=>parseFloat(v||0)!==0);
    if(hasVal){ totalItems++; }
    if(!isNaN(total)) totalTotal += total;
    if(!isNaN(parseFloat(r.erp))) totalErp += parseFloat(r.erp)||0;
    if(!isNaN(ecart) && hasVal) totalEcart += ecart;

    const ecartCls = ecart > 0 ? 'td-ecart-pos' : ecart < 0 ? 'td-ecart-neg' : 'td-ecart-zero';
    const ecartPfx = ecart > 0 ? '+' : '';

    // Calcul retard pour cet item
    const prochaine = param.derniere_verification ? addDays(param.derniere_verification, param.recurrence) : null;
    const isOverdue = prochaine && prochaine < today;
    if(isOverdue) retardCount++;
    const verifiedToday = r.verifie_le === today;

    // Badge récurrence
    const recCls = param.recurrence===30?'rec-30':param.recurrence===60?'rec-60':'rec-90';

    html += `<tr id="ictr${key}">
      <td style="text-align:center"><span class="item-num">${pos+1}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:.84rem;color:var(--text-primary)">${esc(param.item)}</span>
          <span class="${recCls}" style="font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.05);white-space:nowrap;">${param.recurrence}j</span>
          ${isOverdue ? '<span style="font-size:.6rem;font-weight:800;color:var(--ruby);padding:1px 6px;border-radius:10px;background:rgba(224,85,85,.12);border:1px solid rgba(224,85,85,.25);white-space:nowrap;">EN RETARD</span>' : ''}
        </div>
        <div style="font-size:.7rem;color:var(--text-muted);margin-top:2px;">
          Dernière vérif. : ${fmtDate(param.derniere_verification)}
          ${prochaine ? ' · Prochaine : <span style="color:'+(isOverdue?'var(--ruby)':'var(--emerald)')+'">'+fmtDate(prochaine)+'</span>' : ''}
        </div>
      </td>
      <td><input class="ni" id="pu${key}" type="number" step="0.001" value="${r.poids_unitaire||''}" placeholder="0" oninput="fchg('${key}','poids_unitaire',this.value)"></td>
      <td><input class="ni" type="number" step="0.01" value="${r.qte_e1||''}" placeholder="0" oninput="fchg('${key}','qte_e1',this.value)"></td>
      <td><input class="ni" type="number" step="0.01" value="${r.balance1||''}" placeholder="0" oninput="fchg('${key}','balance1',this.value)"></td>
      <td><input class="ni" type="number" step="0.01" value="${r.qte_e2||''}" placeholder="0" oninput="fchg('${key}','qte_e2',this.value)"></td>
      <td><input class="ni" type="number" step="0.01" value="${r.balance2||''}" placeholder="0" oninput="fchg('${key}','balance2',this.value)"></td>
      <td class="td-total" id="tot${key}">${isNaN(total)?'—':fmtNum(total)}</td>
      <td><input class="ni" type="number" step="0.01" value="${r.erp||''}" placeholder="0" oninput="fchg('${key}','erp',this.value)"></td>
      <td class="td-calc ${ecartCls}" id="eca${key}">${isNaN(ecart)||(!r.erp&&!r.qte_e1&&!r.qte_e2)?'—':ecartPfx+fmtNum(ecart)}</td>
      <td style="text-align:center">
        <button onclick="saveAndVerify('${key}', ${param.id})" title="Marquer comme vérifié aujourd'hui"
          style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--r-sm);
                 background:${verifiedToday?'rgba(45,212,160,.15)':'var(--bg-float)'};
                 border:1px solid ${verifiedToday?'rgba(45,212,160,.4)':'var(--text-faint)'};
                 color:${verifiedToday?'var(--emerald)':'var(--text-muted)'};
                 font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;"
          onmouseover="this.style.borderColor='var(--emerald)';this.style.color='var(--emerald)'"
          onmouseout="this.style.borderColor='${verifiedToday?'rgba(45,212,160,.4)':'var(--text-faint)'}';this.style.color='${verifiedToday?'var(--emerald)':'var(--text-muted)'}'">
          ${verifiedToday ? '✓ Vérifié' : '✓ Vérifier'}
        </button>
      </td>
    </tr>`;
    pos++;
  });

  // Items extras
  const extras = Object.keys(extraRows).map(Number).sort((a,b)=>a-b);
  extras.forEach(idx => {
    const key = 'e'+idx;
    const r = extraRows[idx] || {};
    const {total, ecart} = calcRow(r);
    const hasVal=[r.qte_e1,r.balance1,r.qte_e2,r.balance2].some(v=>parseFloat(v||0)!==0);
    if(hasVal){ totalItems++; }
    if(!isNaN(total)) totalTotal += total;
    if(!isNaN(parseFloat(r.erp))) totalErp += parseFloat(r.erp)||0;
    if(!isNaN(ecart) && hasVal) totalEcart += ecart;

    const ecartCls = ecart > 0 ? 'td-ecart-pos' : ecart < 0 ? 'td-ecart-neg' : 'td-ecart-zero';
    const ecartPfx = ecart > 0 ? '+' : '';

    html += `<tr id="ictr${key}">
      <td style="text-align:center"><span class="item-num">${pos+1}</span></td>
      <td><input class="ni-item" id="lbl${key}" value="${esc(r.label||'')}" placeholder="Nom de l'item…" oninput="fchgExtra(${idx},'label',this.value)"></td>
      <td><input class="ni" type="number" step="0.001" value="${r.poids_unitaire||''}" placeholder="0" oninput="fchgExtra(${idx},'poids_unitaire',this.value)"></td>
      <td><input class="ni" type="number" step="0.01" value="${r.qte_e1||''}" placeholder="0" oninput="fchgExtra(${idx},'qte_e1',this.value)"></td>
      <td><input class="ni" type="number" step="0.01" value="${r.balance1||''}" placeholder="0" oninput="fchgExtra(${idx},'balance1',this.value)"></td>
      <td><input class="ni" type="number" step="0.01" value="${r.qte_e2||''}" placeholder="0" oninput="fchgExtra(${idx},'qte_e2',this.value)"></td>
      <td><input class="ni" type="number" step="0.01" value="${r.balance2||''}" placeholder="0" oninput="fchgExtra(${idx},'balance2',this.value)"></td>
      <td class="td-total" id="tot${key}">${isNaN(total)?'—':fmtNum(total)}</td>
      <td><input class="ni" type="number" step="0.01" value="${r.erp||''}" placeholder="0" oninput="fchgExtra(${idx},'erp',this.value)"></td>
      <td class="td-calc ${ecartCls}" id="eca${key}">${isNaN(ecart)||(!r.erp&&!r.qte_e1&&!r.qte_e2)?'—':ecartPfx+fmtNum(ecart)}</td>
      <td style="text-align:center"><button class="btn-rm" onclick="delExtra(${idx})" title="Supprimer">✕</button></td>
    </tr>`;
    pos++;
  });

  document.getElementById('ic-tbody').innerHTML = html;

  // Pied de tableau
  const ecartTotCls = totalEcart>0?'td-ecart-pos':totalEcart<0?'td-ecart-neg':'td-ecart-zero';
  document.getElementById('ic-tfoot').innerHTML = `<tr>
    <td colspan="2" style="text-align:left;padding:8px 16px;">
      ${retardCount > 0 ? `<span style="color:var(--ruby);font-size:.78rem;font-weight:700;padding:3px 10px;background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.25);border-radius:20px;">⚠ ${retardCount} item${retardCount>1?'s':''} en retard de vérification</span>` : '<span style="color:var(--emerald);font-size:.78rem;font-weight:600;">✓ Tous les items sont à jour</span>'}
    </td>
    <td colspan="7" style="text-align:right;padding:6px 16px;color:var(--text-muted);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;">Items enregistrés</td>
    <td style="font-weight:700;color:var(--text-primary);font-size:.88rem;padding:6px 12px;">${totalItems}</td>
    <td></td>
  </tr>`;
}

// ── CHANGEMENT DE CHAMP (items parametres) ────────────────────────
function fchg(key, field, val){
  if(!rows[key]) rows[key]={};
  rows[key][field] = val;
  const paramId = key.replace('p',''); // UUID — pas de parseInt
  const param = paramItems.find(p=>p.id===paramId);
  if(!param) return;
  const r = rows[key];
  const {total, ecart} = calcRow(r);
  const totEl = document.getElementById('tot'+key);
  const ecaEl = document.getElementById('eca'+key);
  if(totEl) totEl.textContent = isNaN(total)?'—':fmtNum(total);
  if(ecaEl){
    const hasData = r.qte_e1||r.qte_e2||r.erp;
    ecaEl.className = 'td-calc '+(ecart>0?'td-ecart-pos':ecart<0?'td-ecart-neg':'td-ecart-zero');
    ecaEl.textContent = (!hasData||isNaN(ecart))?'—':(ecart>0?'+':'')+fmtNum(ecart);
  }
}

// ── CHANGEMENT DE CHAMP (items extra) ─────────────────────────────
function fchgExtra(idx, field, val){
  if(!extraRows[idx]) extraRows[idx]={item_index:idx};
  extraRows[idx][field] = val;
  const key = 'e'+idx;
  const r = extraRows[idx];
  const {total, ecart} = calcRow(r);
  const totEl = document.getElementById('tot'+key);
  const ecaEl = document.getElementById('eca'+key);
  if(totEl) totEl.textContent = isNaN(total)?'—':fmtNum(total);
  if(ecaEl){
    const hasData = r.qte_e1||r.qte_e2||r.erp;
    ecaEl.className = 'td-calc '+(ecart>0?'td-ecart-pos':ecart<0?'td-ecart-neg':'td-ecart-zero');
    ecaEl.textContent = (!hasData||isNaN(ecart))?'—':(ecart>0?'+':'')+fmtNum(ecart);
  }
}

// ── MARQUER VÉRIFIÉ + SAUVEGARDER ─────────────────────────────────
async function saveAndVerify(key, paramId){
  const r = rows[key] || {};
  const {total, ecart} = calcRow(r);
  const today = localToday();
  const payload = {
    date_jour:      curDate,
    param_id:       paramId,
    label:          paramItems.find(p=>p.id===paramId)?.item||'',
    poids_unitaire: parseFloat(r.poids_unitaire)||null,
    qte_e1:         parseFloat(r.qte_e1)||null,
    balance1:       parseFloat(r.balance1)||null,
    qte_e2:         parseFloat(r.qte_e2)||null,
    balance2:       parseFloat(r.balance2)||null,
    erp:            parseFloat(r.erp)||null,
    total_calcule:  isNaN(total)?null:total,
    ecart_calcule:  isNaN(ecart)?null:ecart,
    verifie_le:     today,
    updated_at:     new Date().toISOString(),
  };
  try {
    const {error} = await sb.from('inventaire_cyclique')
      .upsert(payload, {onConflict:'date_jour,param_id'});
    if(error) throw error;
    rows[key] = {...r, ...payload};

    // Mettre à jour derniere_verification dans parametres
    const {error: e2} = await sb.from('parametres')
      .update({derniere_verification: today})
      .eq('id', paramId);
    if(e2) console.warn('Mise à jour derniere_verification:', e2.message);
    else {
      const param = paramItems.find(p=>p.id===paramId);
      if(param) param.derniere_verification = today;
    }

    render();
    toast('Vérifié et sauvegardé ✓','success');
  } catch(e){ toast('Erreur: '+e.message,'error'); }
}

// ── AJOUTER ITEM EXTRA ────────────────────────────────────────────
function addItem(){
  const idx = nextExtra++;
  extraRows[idx] = {item_index:idx, label:'Nouvel item'};
  render();
  setTimeout(()=>{
    const el = document.getElementById('lble'+idx);
    if(el){el.focus();el.select();}
  },50);
}

// ── SUPPRIMER ITEM EXTRA ──────────────────────────────────────────
async function delExtra(idx){
  if(!confirm('Supprimer cet item?')) return;
  try {
    await sb.from('inventaire_cyclique').delete()
      .eq('date_jour',curDate).eq('item_index',idx);
  } catch(e){}
  delete extraRows[idx];
  render();
  toast('Item supprimé.','info');
}

// ── CHARGER ───────────────────────────────────────────────────────
async function load(){
  document.getElementById('spinner').style.display='flex';
  document.getElementById('ic-tbl').style.display='none';
  rows={}; extraRows={};
  try {
    // 1. Charger les items depuis parametres
    const {data:params, error:e1} = await sb.from('parametres').select('*').order('id');
    if(e1) throw e1;
    paramItems = (params||[]).map(p=>({
      id: p.id,
      item: p.item||'',
      recurrence: p.recurrence||30,
      derniere_verification: p.derniere_verification||null,
    }));

    // 2. Charger les données d'inventaire pour la date courante
    const {data:inv, error:e2} = await sb.from('inventaire_cyclique').select('*')
      .eq('date_jour',curDate);
    if(e2 && e2.code!=='PGRST116') throw e2;

    // Mapper par param_id pour les items parametres
    (inv||[]).forEach(r=>{
      if(r.param_id){
        rows['p'+r.param_id] = r;
      } else if(r.item_index >= 100){
        extraRows[r.item_index] = r;
        if(r.item_index >= nextExtra) nextExtra = r.item_index + 1;
      }
    });
  } catch(e){ toast('Erreur chargement: '+e.message,'error'); }
  render();
  document.getElementById('spinner').style.display='none';
  document.getElementById('ic-tbl').style.display='table';
}

async function init(){
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ window.location.href='index.html'; return; }
    refreshDateUI();
    await load();
  } catch(e){ window.location.href='index.html'; }
}
window.addEventListener('load', init);

// ── Sauvegarder tout ──────────────────────────────────────────────
async function saveAllIc(){
  const btn = document.getElementById('btn-save-all-ic');
  if(btn){ btn.disabled=true; btn.textContent='Sauvegarde…'; }
  const today = localToday();
  let errors = 0;

  // Sauvegarder items parametres
  for(const param of paramItems){
    const key = 'p'+param.id;
    const r = rows[key]||{};
    const hasData = r.qte_e1||r.balance1||r.qte_e2||r.balance2||r.erp||r.poids_unitaire;
    if(!r.param_id && !hasData) continue;
    const {total, ecart} = calcRow(r);
    const payload = {
      date_jour:      curDate,
      param_id:       param.id,
      label:          param.item,
      poids_unitaire: parseFloat(r.poids_unitaire)||null,
      qte_e1:         parseFloat(r.qte_e1)||null,
      balance1:       parseFloat(r.balance1)||null,
      qte_e2:         parseFloat(r.qte_e2)||null,
      balance2:       parseFloat(r.balance2)||null,
      erp:            parseFloat(r.erp)||null,
      total_calcule:  isNaN(total)?null:total,
      ecart_calcule:  isNaN(ecart)?null:ecart,
      verifie_le:     today,
      updated_at:     new Date().toISOString(),
    };
    try{
      const {data, error} = await sb.from('inventaire_cyclique')
        .upsert(payload, {onConflict:'date_jour,param_id'}).select().single();
      if(error){ errors++; }
      else {
        rows[key] = {...r, ...data};
        // Mettre à jour derniere_verification
        await sb.from('parametres').update({derniere_verification: today}).eq('id', param.id);
        param.derniere_verification = today;
      }
    }catch(e){ errors++; }
  }

  // Sauvegarder items extra
  for(const idx of Object.keys(extraRows).map(Number)){
    const r = extraRows[idx]||{};
    const hasData = r.qte_e1||r.balance1||r.qte_e2||r.balance2||r.erp||r.poids_unitaire;
    if(!r.id && !hasData) continue;
    const {total, ecart} = calcRow(r);
    const payload = {
      date_jour:      curDate,
      item_index:     idx,
      label:          r.label||'',
      poids_unitaire: parseFloat(r.poids_unitaire)||null,
      qte_e1:         parseFloat(r.qte_e1)||null,
      balance1:       parseFloat(r.balance1)||null,
      qte_e2:         parseFloat(r.qte_e2)||null,
      balance2:       parseFloat(r.balance2)||null,
      erp:            parseFloat(r.erp)||null,
      total_calcule:  isNaN(total)?null:total,
      ecart_calcule:  isNaN(ecart)?null:ecart,
      updated_at:     new Date().toISOString(),
    };
    try{
      const {data, error} = await sb.from('inventaire_cyclique')
        .upsert(payload, {onConflict:'date_jour,item_index'}).select().single();
      if(error){ errors++; }
      else extraRows[idx] = {...r, ...data};
    }catch(e){ errors++; }
  }

  if(btn){ btn.disabled=false; btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Sauvegarder tout'; }
  if(errors) toast(errors+' erreur(s) lors de la sauvegarde.','error');
  else { toast('Tout sauvegardé ✓','success'); render(); }
}

// ── Soumettre non-conformité ───────────────────────────────────────
async function submitNcIc(){
  const desc = 'Inventaire cyclique non complété — Date: ' + curDate;
  const {error} = await sb.from('problematiques').insert([{
    intitule:    'Non conformité inventaire cyclique',
    pilier:      'Qualite',
    priorite:    'Haute',
    statut:      'À traiter',
    description: desc,
    created_at:  new Date().toISOString(),
    updated_at:  new Date().toISOString(),
  }]);
  if(error){ toast('Erreur: '+error.message,'error'); return; }
  toast('Non-conformité créée dans Problématiques ✓','success');
}
