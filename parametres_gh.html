<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paramètres GH — SOY</title>
<link rel="stylesheet" href="soy-shared.css">
<style>
.param-layout{display:grid;grid-template-columns:280px 1fr;gap:0;min-height:calc(100vh - 60px);}
@media(max-width:800px){.param-layout{grid-template-columns:1fr;}}
.param-sidebar{background:var(--bg-raised);border-right:1px solid rgba(255,255,255,.06);padding:16px 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-section{font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);padding:0 18px 10px;margin-top:8px;}
.sidebar-section:first-child{margin-top:0;}
.cat-nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;}
.cat-nav-item:hover{background:rgba(255,255,255,.04);}
.cat-nav-item.active{background:rgba(74,158,232,.07);border-left-color:var(--sapphire);}
.cat-nav-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.cat-nav-name{font-size:.83rem;font-weight:600;color:var(--text-secondary);flex:1;}
.cat-nav-item.active .cat-nav-name{color:var(--sapphire);}
.cat-nav-count{font-size:.68rem;padding:2px 7px;border-radius:10px;background:var(--bg-float);color:var(--text-faint);font-weight:700;}
.add-cat-btn{margin:12px 18px 0;display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:var(--r-md);background:rgba(45,212,160,.05);border:1px dashed rgba(45,212,160,.2);color:var(--emerald);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;width:calc(100% - 36px);}
.add-cat-btn:hover{background:rgba(45,212,160,.1);border-color:rgba(45,212,160,.35);}
.param-main{padding:28px 32px;background:var(--bg-base);}
.cat-editor-hd{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.cat-emoji-btn{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;transition:transform .2s;position:relative;}
.cat-emoji-btn:hover{transform:scale(1.08);}
.cat-name-input{flex:1;background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-md);padding:9px 14px;color:var(--text-primary);font-size:1rem;font-weight:700;font-family:Outfit,sans-serif;outline:none;transition:border-color .15s;}
.cat-name-input:focus{border-color:var(--sapphire);}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.color-swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.color-swatch:hover,.color-swatch.active{transform:scale(1.25);border-color:rgba(255,255,255,.5);}
.rules-title{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.rules-table{background:var(--bg-raised);border:1px solid rgba(255,255,255,.07);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;}
.rules-table-header{display:grid;grid-template-columns:70px 160px 180px 1fr 36px;gap:0;padding:8px 12px;background:var(--bg-float);border-bottom:1px solid rgba(255,255,255,.06);font-size:.67rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);}
.rule-row{display:grid;grid-template-columns:70px 160px 180px 1fr 36px;gap:0;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;transition:background .1s;}
.rule-row:last-child{border-bottom:none;}
.rule-row:hover{background:rgba(255,255,255,.02);}
.rule-select,.rule-input{background:var(--bg-float);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:5px 8px;color:var(--text-primary);font-size:.78rem;font-family:Outfit,sans-serif;outline:none;transition:border-color .12s;width:100%;}
.rule-select:focus,.rule-input:focus{border-color:var(--sapphire);}
.rule-logic-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:5px;font-size:.68rem;font-weight:800;cursor:pointer;transition:all .12s;user-select:none;letter-spacing:.05em;}
.rule-logic-badge.AND{background:rgba(74,158,232,.15);color:var(--sapphire);}
.rule-logic-badge.OR{background:rgba(245,158,11,.15);color:var(--amber);}
.rule-del-btn{background:none;border:none;cursor:pointer;color:var(--text-faint);padding:4px;border-radius:4px;transition:color .12s,background .12s;display:flex;align-items:center;justify-content:center;}
.rule-del-btn:hover{color:var(--ruby);background:rgba(255,82,82,.08);}
.add-rule-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-md);background:var(--bg-raised);border:1px solid rgba(255,255,255,.08);color:var(--text-muted);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;}
.add-rule-btn:hover{border-color:var(--sapphire);color:var(--sapphire);}
.preview-section{background:var(--bg-raised);border:1px solid rgba(255,255,255,.07);border-radius:var(--r-lg);padding:16px;margin-top:20px;}
.preview-title{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.emoji-picker-pop{position:absolute;top:56px;left:0;background:var(--bg-raised);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-lg);padding:10px;display:flex;flex-wrap:wrap;gap:4px;width:220px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:popIn .15s cubic-bezier(.4,0,.2,1);}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(-4px);}to{opacity:1;transform:scale(1) translateY(0);}}
.emoji-opt{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;transition:background .1s;}
.emoji-opt:hover{background:rgba(255,255,255,.1);}
.save-bar{display:flex;align-items:center;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06);}
.btn-save{display:inline-flex;align-items:center;gap:7px;padding:9px 22px;background:linear-gradient(135deg,var(--sapphire),#1a6bff);border:none;border-radius:var(--r-md);color:#fff;font-size:.84rem;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn-save:hover{opacity:.88;}
.btn-delete{padding:9px 16px;background:rgba(255,82,82,.07);border:1px solid rgba(255,82,82,.18);border-radius:var(--r-md);color:var(--ruby);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-delete:hover{background:rgba(255,82,82,.13);}
.empty-pg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;color:var(--text-faint);}
.empty-pg svg{margin-bottom:16px;opacity:.25;}
.empty-pg-title{font-size:.95rem;font-weight:600;color:var(--text-muted);margin-bottom:8px;}

/* Styles pour la table des poids */
.poids-table{width:100%;border-collapse:collapse;background:var(--bg-raised);border:1px solid rgba(255,255,255,.07);border-radius:var(--r-lg);overflow:hidden;}
.poids-table thead{background:var(--bg-float);border-bottom:1px solid rgba(255,255,255,.08);}
.poids-table th{padding:10px 12px;text-align:left;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);}
.poids-table tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;}
.poids-table tbody tr:hover{background:rgba(255,255,255,.02);}
.poids-table tbody tr:last-child{border-bottom:none;}
.poids-table td{padding:9px 12px;font-size:.8rem;color:var(--text-secondary);}
.poids-table td:first-child{color:var(--sapphire);font-weight:700;font-size:.78rem;}
.poids-input{background:var(--bg-float);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:5px 8px;color:var(--text-primary);font-size:.78rem;font-family:Outfit,sans-serif;outline:none;transition:border-color .12s;width:100px;}
.poids-input:focus{border-color:var(--sapphire);}
.add-poids-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-md);background:rgba(45,212,160,.05);border:1px dashed rgba(45,212,160,.2);color:var(--emerald);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;margin-top:12px;}
.add-poids-btn:hover{background:rgba(45,212,160,.1);border-color:rgba(45,212,160,.35);}
</style>
</head>
<body>
<div class="tool-topbar">
  <a class="tool-back" href="inventaire_gh.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Inventaire GH
  </a>
  <div class="tool-title">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--sapphire)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Paramètres GH
  </div>
</div>

<div class="param-layout">
  <div class="param-sidebar">
    <div class="sidebar-section">Navigation</div>
    <div class="cat-nav-item" onclick="showSection('categories')" id="nav-categories">
      <div class="cat-nav-icon">📂</div>
      <div class="cat-nav-name">Catégories</div>
      <div class="cat-nav-count" id="cat-count">0</div>
    </div>
    <div class="cat-nav-item" onclick="showSection('poids')" id="nav-poids">
      <div class="cat-nav-icon">⚖️</div>
      <div class="cat-nav-name">Poids</div>
      <div class="cat-nav-count" id="poids-count">0</div>
    </div>
  </div>

  <div class="param-main" id="param-main">
    <!-- Section Catégories -->
    <div id="section-categories" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <h2 style="font-size:1.1rem;font-weight:700;color:var(--text-primary);margin:0;">Catégories d'inventaire</h2>
        <button class="add-cat-btn" onclick="createCategory()" style="margin:0;width:auto;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvelle catégorie
        </button>
      </div>
      <div id="categories-list"></div>
      <div id="category-editor" style="display:none;"></div>
    </div>

    <!-- Section Poids -->
    <div id="section-poids" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div>
          <h2 style="font-size:1.1rem;font-weight:700;color:var(--text-primary);margin:0 0 4px 0;">Poids unitaires</h2>
          <p style="font-size:.82rem;color:var(--text-muted);margin:0;">Définissez le poids unitaire (kg) pour chaque code produit</p>
        </div>
        <button class="add-poids-btn" onclick="addPoidsRow()" style="margin:0;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajouter un produit
        </button>
      </div>
      
      <table class="poids-table">
        <thead>
          <tr>
            <th>Code produit</th>
            <th>Description</th>
            <th>Poids unitaire (kg)</th>
            <th style="width:50px;"></th>
          </tr>
        </thead>
        <tbody id="poids-tbody"></tbody>
      </table>
      
      <div class="save-bar">
        <button class="btn-save" onclick="savePoids()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Sauvegarder
        </button>
      </div>
    </div>

    <!-- Page vide par défaut -->
    <div id="section-empty">
      <div class="empty-pg">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <div class="empty-pg-title">Sélectionnez une section</div>
        <div style="font-size:.8rem;max-width:340px;line-height:1.6">Choisissez Catégories ou Poids dans le menu latéral</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL='https://xppzmdmnuztozgukrcta.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';
let sb;
const COLORS=['#4A9EE8','#2DD4A0','#F59E0B','#EF4444','#A78BFA','#F97316','#EC4899','#06B6D4','#84CC16','#14B8A6'];
const EMOJIS=['📦','🧪','🏭','⚗️','🔬','🧬','🌿','🍃','💊','🧴','🥤','🫙','📋','⚙️','🔧','🏷️','🎯','🔑','⭐','🚀'];
const COLUMNS=[
  {key:'1',label:'No. produit'},
  {key:'2',label:'Description'},
  {key:'3',label:'Qté inv.'},
  {key:'8',label:'No. comm client'},
  {key:'11',label:'No. lot'},
  {key:'12',label:'No. sous-lot'},
  {key:'13',label:'Date lot'},
  {key:'14',label:'Expiration'},
  {key:'15',label:'Réception originale'},
];
const OPERATORS=[
  {key:'contains',label:'contient'},
  {key:'not_contains',label:'ne contient pas'},
  {key:'starts_with',label:'commence par'},
  {key:'ends_with',label:'se termine par'},
  {key:'equals',label:'est égal à'},
  {key:'not_equals',label:'est différent de'},
  {key:'is_empty',label:'est vide'},
  {key:'is_not_empty',label:'n\'est pas vide'},
];

let categories=[];
let poidsList=[];
let activeCatId=null;
let emojiOpen=false;
let currentSection='';

// Données de base des poids (depuis Excel)
const BASE_POIDS = [
  {code:'CI.1750',description:'ALMOND BUTTER MEDIUM ROAST edde / YREOCAB004',poids_unitaire:25},
  {code:'CI.4028',description:'PBC DEXTROSE CERELOSE CALDIC SW08154 XRPBCDE002',poids_unitaire:22.7},
  {code:'CI.4038',description:'PBC YEAST EXTRACT SAVOURY ORG 3211 XRPBOYE002',poids_unitaire:22.7},
  {code:'CI.4052',description:'PBC POWDER CHICKEN BROTH IDF 3475 XRPBCBC007',poids_unitaire:22.7},
  {code:'CI.4064',description:'B2301 SPRAY-DRIED NATURAL BEEF EXTRACT ITEM 12691',poids_unitaire:22.7},
  {code:'CI.4070',description:'NO SALT CHICKEN BROTH',poids_unitaire:15},
  {code:'CI.5200',description:'FLAVOUR VANILLA ORGANIC MET0009944 YREOOFV003',poids_unitaire:20}
];

window.addEventListener('DOMContentLoaded',async()=>{
  try{sb=supabase.createClient(SB_URL,SB_KEY);}catch(e){}
  await loadCategories();
  await loadPoids();
  showSection('categories');
});

async function loadCategories(){
  try{
    const {data,error}=await sb.from('gh_categories').select('*').order('created_at');
    if(!error&&data) categories=data.map(c=>({...c,rules:c.cat_rules||[]}));
  }catch(e){}
  if(categories.length===0){
    const local=localStorage.getItem('gh_categories');
    if(local){try{categories=JSON.parse(local);}catch(e){}}
  }
  document.getElementById('cat-count').textContent=categories.length;
}

async function loadPoids(){
  try{
    const {data,error}=await sb.from('gh_poids').select('*').order('code');
    if(!error&&data) poidsList=data;
  }catch(e){}
  if(poidsList.length===0){
    const local=localStorage.getItem('gh_poids');
    if(local){
      try{poidsList=JSON.parse(local);}catch(e){}
    }
    if(poidsList.length===0){
      poidsList=BASE_POIDS.map(p=>({...p,id:'poids_'+Date.now()+'_'+Math.random()}));
    }
  }
  document.getElementById('poids-count').textContent=poidsList.length;
}

function showSection(section){
  currentSection=section;
  document.getElementById('section-categories').style.display='none';
  document.getElementById('section-poids').style.display='none';
  document.getElementById('section-empty').style.display='none';
  document.getElementById('nav-categories').classList.remove('active');
  document.getElementById('nav-poids').classList.remove('active');
  
  if(section==='categories'){
    document.getElementById('section-categories').style.display='block';
    document.getElementById('nav-categories').classList.add('active');
    renderCategoriesList();
  }else if(section==='poids'){
    document.getElementById('section-poids').style.display='block';
    document.getElementById('nav-poids').classList.add('active');
    renderPoidsTable();
  }
}

// ── CATÉGORIES (code existant simplifié) ──
function renderCategoriesList(){
  const list=document.getElementById('categories-list');
  if(categories.length===0){
    list.innerHTML='<div class="empty-pg"><div class="empty-pg-title">Aucune catégorie</div></div>';
    return;
  }
  list.innerHTML=categories.map(cat=>`
    <div class="cat-nav-item" onclick="editCategory('${cat.id}')" style="margin-bottom:8px;">
      <div class="cat-nav-icon" style="background:${cat.color}20;color:${cat.color}">${cat.icon}</div>
      <div class="cat-nav-name">${escH(cat.name)}</div>
      <div class="cat-nav-count">${cat.rules?cat.rules.length:0}</div>
    </div>
  `).join('');
}

function createCategory(){
  const id='cat_'+Date.now();
  const cat={id,name:'Nouvelle catégorie',icon:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
    color:COLORS[categories.length%COLORS.length],rules:[],created_at:new Date().toISOString()};
  categories.push(cat);
  activeCatId=id;
  renderCategoriesList();
  editCategory(id);
}

function editCategory(id){
  activeCatId=id;
  document.getElementById('categories-list').style.display='none';
  document.getElementById('category-editor').style.display='block';
  // Afficher l'éditeur complet ici (code simplifié pour la démo)
  const cat=categories.find(c=>c.id===id);
  document.getElementById('category-editor').innerHTML=`
    <h3>Édition: ${cat.name}</h3>
    <button onclick="backToCategories()">← Retour</button>
  `;
}

function backToCategories(){
  document.getElementById('categories-list').style.display='block';
  document.getElementById('category-editor').style.display='none';
  activeCatId=null;
}

// ── POIDS ──
function renderPoidsTable(){
  const tbody=document.getElementById('poids-tbody');
  if(poidsList.length===0){
    tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-faint);">Aucun poids défini. Cliquez sur "Ajouter un produit"</td></tr>';
    return;
  }
  
  tbody.innerHTML=poidsList.map((p,i)=>`
    <tr>
      <td><input type="text" class="poids-input" style="width:150px;" value="${escH(p.code)}" onchange="updatePoids(${i},'code',this.value)"></td>
      <td><input type="text" class="poids-input" style="width:100%;" value="${escH(p.description||'')}" onchange="updatePoids(${i},'description',this.value)"></td>
      <td><input type="number" step="0.1" class="poids-input" value="${p.poids_unitaire}" onchange="updatePoids(${i},'poids_unitaire',parseFloat(this.value))"></td>
      <td>
        <button class="rule-del-btn" onclick="deletePoids(${i})" title="Supprimer">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </td>
    </tr>
  `).join('');
}

function updatePoids(idx,field,value){
  if(poidsList[idx]) poidsList[idx][field]=value;
}

function addPoidsRow(){
  poidsList.push({
    id:'poids_'+Date.now(),
    code:'',
    description:'',
    poids_unitaire:0
  });
  renderPoidsTable();
}

function deletePoids(idx){
  if(confirm('Supprimer ce poids ?')){
    poidsList.splice(idx,1);
    renderPoidsTable();
    document.getElementById('poids-count').textContent=poidsList.length;
  }
}

async function savePoids(){
  try{
    // Sauvegarder dans Supabase
    for(const p of poidsList){
      await sb.from('gh_poids').upsert({id:p.id,code:p.code,description:p.description,poids_unitaire:p.poids_unitaire,updated_at:new Date().toISOString()});
    }
    toast('Poids sauvegardés ✓','ok');
  }catch(e){
    console.error(e);
    // Fallback localStorage
    localStorage.setItem('gh_poids',JSON.stringify(poidsList));
    toast('Sauvegardé en local ✓','ok');
  }
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type='info'){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:10px;font-size:.82rem;font-weight:600;z-index:9999;color:#fff;background:${type==='ok'?'#1a7a50':'#1a3a7a'}`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}
</script>
</body>
</html>
