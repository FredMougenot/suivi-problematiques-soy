<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Erreurs Papier — SOY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  /* Fond */
  --void:   #07080C;
  --base:   #0C0E16;
  --surf:   #10131C;
  --surf2:  #151923;
  --surf3:  #1B2030;
  --line:   #1E2438;
  --line2:  #252D42;
  --muted:  #3D4F6E;
  --ghost:  #607090;
  --soft:   #8899BB;
  --pale:   #C8D5EE;
  --snow:   #EEF2FA;

  /* Quarts — couleurs signature très distinctes */
  --q1:     #F5A623;   /* or brûlé */
  --q1b:    rgba(245,166,35,.13);
  --q1s:    rgba(245,166,35,.06);
  --q1g:    rgba(245,166,35,.35);

  --q2:     #00D4FF;   /* cyan électrique */
  --q2b:    rgba(0,212,255,.12);
  --q2s:    rgba(0,212,255,.05);
  --q2g:    rgba(0,212,255,.30);

  --q3:     #FF5E7D;   /* corail vif */
  --q3b:    rgba(255,94,125,.13);
  --q3s:    rgba(255,94,125,.06);
  --q3g:    rgba(255,94,125,.32);

  /* Status */
  --green:  #22D3A0;
  --yellow: #F5C842;
  --orange: #F07840;
  --red:    #EE4444;

  /* Or accent topbar */
  --gold:   #C9963A;
  --gold-:  rgba(201,150,58,.15);

  --r6: 6px; --r10: 10px; --r14: 14px; --r20: 20px;
  --fast: .15s; --mid: .3s;
  --ease: cubic-bezier(.4,0,.2,1);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:14px; }
body {
  font-family:'IBM Plex Sans', sans-serif;
  background:var(--void);
  color:var(--pale);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
button { cursor:pointer; border:none; background:none; font-family:inherit; color:inherit; }
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--line2); border-radius:3px; }

/* Texture subtile */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  opacity:.016;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:250px;
}

/* ═══════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════ */
.topbar {
  position:sticky; top:0; z-index:200;
  height:58px; padding:0 24px;
  display:flex; align-items:center; gap:16px;
  background:rgba(7,8,12,.96); backdrop-filter:blur(24px);
  border-bottom:1px solid var(--line);
}
.tb-back {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 14px; border-radius:var(--r6);
  border:1px solid var(--line2); color:var(--ghost);
  font-size:.76rem; font-weight:500; letter-spacing:.02em;
  text-decoration:none; transition:all var(--fast);
  flex-shrink:0;
}
.tb-back:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-); }
.tb-divider { width:1px; height:22px; background:var(--line2); flex-shrink:0; }
.tb-logo {
  width:30px; height:30px; border-radius:8px;
  background:var(--gold-); border:1px solid rgba(201,150,58,.3);
  display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond', serif; font-style:italic;
  font-size:1rem; font-weight:600; color:var(--gold);
  flex-shrink:0;
}
.tb-text .tb-title { font-size:.9rem; font-weight:600; color:var(--snow); }
.tb-text .tb-sub {
  font-family:'IBM Plex Mono', monospace;
  font-size:.56rem; color:var(--ghost); letter-spacing:.1em; text-transform:uppercase; margin-top:1px;
}
.tb-pulse {
  margin-left:auto; display:flex; align-items:center; gap:6px;
  font-family:'IBM Plex Mono', monospace; font-size:.58rem; color:var(--muted); letter-spacing:.08em;
}
.pulse-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pdot 2.2s ease-in-out infinite; }
@keyframes pdot { 0%,100%{opacity:1;box-shadow:0 0 0 0 var(--green)} 50%{opacity:.5;box-shadow:0 0 0 4px rgba(34,211,160,0)} }

/* ═══════════════════════════════════════════════════
   CONTRÔLES DATE + TABS
═══════════════════════════════════════════════════ */
.controls {
  position:relative; z-index:1;
  padding:20px 24px 0;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.date-nav { display:flex; align-items:center; gap:6px; }
.arr {
  width:34px; height:34px; border-radius:var(--r6);
  border:1px solid var(--line2); color:var(--ghost);
  display:flex; align-items:center; justify-content:center;
  font-size:.95rem; transition:all var(--fast); flex-shrink:0;
}
.arr:hover { border-color:var(--q1); color:var(--q1); background:var(--q1b); }
.date-box {
  display:flex; align-items:center; gap:10px;
  padding:8px 18px; background:var(--surf);
  border:1px solid var(--line2); border-radius:var(--r10);
  min-width:240px; position:relative; overflow:hidden;
}
.date-box::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
  background:linear-gradient(to bottom, var(--q1), var(--q3)); opacity:.7;
}
.date-label {
  font-family:'IBM Plex Mono', monospace; font-size:.76rem; font-weight:500;
  color:var(--snow); text-transform:uppercase; letter-spacing:.03em; flex:1;
}
.today-badge {
  font-family:'IBM Plex Mono', monospace; font-size:.52rem; font-weight:600;
  padding:2px 8px; border-radius:20px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--q1); background:var(--q1s); border:1px solid rgba(245,166,35,.3);
}
.btn-today {
  padding:8px 16px; border-radius:var(--r6);
  border:1px solid var(--line2); color:var(--ghost);
  font-size:.72rem; font-weight:500; letter-spacing:.04em;
  transition:all var(--fast);
}
.btn-today:hover { border-color:var(--q1); color:var(--q1); }

/* Tabs */
.tabs {
  display:flex; align-items:center; gap:3px;
  background:var(--surf); border:1px solid var(--line2);
  border-radius:var(--r10); padding:3px;
  margin-left:auto;
}
.tab {
  padding:6px 18px; border-radius:var(--r6);
  font-size:.74rem; font-weight:600; letter-spacing:.04em;
  color:var(--ghost); transition:all var(--fast);
}
.tab:hover { color:var(--pale); }
.tab.on {
  background:var(--surf3); color:var(--snow);
  box-shadow:0 1px 3px rgba(0,0,0,.4);
}

/* ═══════════════════════════════════════════════════
   QUART CARDS — identiques sur les 3 vues
═══════════════════════════════════════════════════ */
.quart-cards {
  display:grid; grid-template-columns:repeat(3,1fr); gap:14px;
  margin-bottom:20px;
}
@media(max-width:700px){ .quart-cards { grid-template-columns:1fr; } }

.qcard {
  background:var(--surf);
  border:1px solid var(--qline);
  border-radius:var(--r14);
  padding:20px 22px 18px;
  position:relative; overflow:hidden;
  animation:cardIn .4s var(--ease) both;
  transition:border-color var(--fast), box-shadow var(--fast);
}
.qcard:nth-child(2){animation-delay:.07s;}
.qcard:nth-child(3){animation-delay:.14s;}
.qcard:hover { border-color:var(--qc); box-shadow:0 0 24px var(--qg); }
@keyframes cardIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* glow en coin */
.qcard::after {
  content:''; position:absolute; top:-40px; right:-40px;
  width:150px; height:150px; border-radius:50%;
  background:radial-gradient(circle, var(--qg), transparent 70%);
  pointer-events:none; opacity:.5;
  transition:opacity var(--mid);
}
.qcard:hover::after { opacity:.9; }

.qc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.qc-tag {
  display:inline-flex; align-items:center; gap:7px;
  padding:5px 12px 5px 8px; border-radius:20px;
  background:var(--qb); border:1px solid var(--qline);
  font-size:.7rem; font-weight:700; color:var(--qc); letter-spacing:.06em;
}
.qc-tag-dot { width:7px; height:7px; border-radius:50%; background:var(--qc); box-shadow:0 0 6px var(--qc); }

/* Anneau SVG efficacité */
.qc-ring-wrap { position:relative; width:60px; height:60px; flex-shrink:0; }
.qc-ring { width:60px; height:60px; transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:var(--line2); stroke-width:4; cx:30; cy:30; r:24; }
.ring-fg {
  fill:none; stroke-width:4; stroke-linecap:round;
  cx:30; cy:30; r:24;
  stroke:var(--qc);
  filter:drop-shadow(0 0 4px var(--qc));
  stroke-dasharray:150.8;
  stroke-dashoffset:150.8;
  transition:stroke-dashoffset 1.1s var(--ease);
}
.qc-ring-pct {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono', monospace; font-size:.6rem; font-weight:600;
  color:var(--qc); line-height:1;
}

/* Gros chiffre erreurs */
.qc-body { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; }
.qc-left {}
.qc-count {
  font-family:'Cormorant Garamond', serif;
  font-size:4.8rem; font-weight:600; line-height:.9;
  color:var(--qc);
  text-shadow:0 0 30px var(--qg);
  letter-spacing:-.02em;
  transition:all .6s var(--ease);
}
.qc-count-label {
  font-size:.68rem; font-weight:500; color:var(--ghost);
  margin-top:6px; letter-spacing:.04em;
}
.qc-eff-label {
  font-size:.62rem; font-weight:600; color:var(--qc);
  margin-top:3px; opacity:.8;
}

/* Barre de fond décorative */
.qc-bg-bar {
  position:absolute; bottom:0; left:0; right:0; height:3px;
  background:linear-gradient(to right, transparent, var(--qc), transparent);
  opacity:.3;
}

/* ═══════════════════════════════════════════════════
   PANELS
═══════════════════════════════════════════════════ */
.panel {
  background:var(--surf); border:1px solid var(--line2);
  border-radius:var(--r14); overflow:hidden;
  margin-bottom:14px;
  animation:cardIn .45s var(--ease) both;
}
.panel-hd {
  padding:14px 20px 12px;
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.panel-ttl {
  font-size:.88rem; font-weight:600; color:var(--snow);
  display:flex; align-items:center; gap:9px;
}
.panel-ttl-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--q1); box-shadow:0 0 8px var(--q1);
  flex-shrink:0;
}
.panel-meta {
  font-family:'IBM Plex Mono', monospace;
  font-size:.56rem; color:var(--ghost); letter-spacing:.1em; text-transform:uppercase;
}
.panel-body { padding:20px; }
.panel-body-sm { padding:14px 20px; }

/* ═══════════════════════════════════════════════════
   KPI ROW (semaine/mois) — compact, sous les qcards
═══════════════════════════════════════════════════ */
.kpi-strip { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.kpi-pill {
  flex:1; min-width:130px; padding:14px 18px;
  background:var(--surf); border:1px solid var(--line2);
  border-radius:var(--r10); position:relative; overflow:hidden;
  animation:cardIn .4s var(--ease) both;
}
.kpi-pill::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--ka,var(--q1)), transparent);
  opacity:.6;
}
.kpi-pill-label {
  font-family:'IBM Plex Mono', monospace; font-size:.55rem; font-weight:600;
  color:var(--ghost); letter-spacing:.12em; text-transform:uppercase; margin-bottom:6px;
}
.kpi-pill-val {
  font-family:'Cormorant Garamond', serif; font-size:2.4rem; font-weight:600;
  color:var(--ka,var(--q1)); line-height:1; letter-spacing:-.01em;
}
.kpi-pill-sub { font-size:.62rem; color:var(--muted); margin-top:4px; }

/* ═══════════════════════════════════════════════════
   GRILLES
═══════════════════════════════════════════════════ */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media(max-width:900px){ .g2{grid-template-columns:1fr;} }

/* ═══════════════════════════════════════════════════
   CHART HEIGHTS
═══════════════════════════════════════════════════ */
.ch-160 { height:160px; position:relative; }
.ch-220 { height:220px; position:relative; }
.ch-280 { height:280px; position:relative; }
.ch-320 { height:320px; position:relative; }

/* ═══════════════════════════════════════════════════
   BARS
═══════════════════════════════════════════════════ */
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.bar-row:last-child { margin-bottom:0; }
.bar-tag {
  display:inline-flex; align-items:center; gap:5px;
  font-size:.64rem; font-weight:700; padding:2px 9px; border-radius:12px;
  border:1px solid; letter-spacing:.04em; min-width:54px; justify-content:center;
}
.bt1 { color:var(--q1); border-color:rgba(245,166,35,.3); background:var(--q1s); }
.bt2 { color:var(--q2); border-color:rgba(0,212,255,.25); background:var(--q2s); }
.bt3 { color:var(--q3); border-color:rgba(255,94,125,.3); background:var(--q3s); }
.bar-track { flex:1; height:5px; background:var(--surf3); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width 1s var(--ease); }
.bar-num { font-family:'IBM Plex Mono', monospace; font-size:.64rem; color:var(--soft); min-width:22px; text-align:right; }

/* ═══════════════════════════════════════════════════
   ERR LIST
═══════════════════════════════════════════════════ */
.err-list { display:flex; flex-direction:column; gap:6px; }
.err-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 13px; background:var(--surf2);
  border:1px solid var(--line); border-radius:var(--r10);
  border-left:2px solid var(--ec);
  transition:background var(--fast);
}
.err-item:hover { background:var(--surf3); }
.err-time {
  font-family:'IBM Plex Mono', monospace; font-size:.68rem;
  color:var(--ghost); min-width:42px; flex-shrink:0;
}
.err-none {
  padding:36px 20px; text-align:center;
  font-family:'IBM Plex Mono', monospace; font-size:.66rem;
  color:var(--muted); letter-spacing:.06em;
}

/* ═══════════════════════════════════════════════════
   HEATMAP
═══════════════════════════════════════════════════ */
.hm-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.hm-table { border-collapse:separate; border-spacing:3px; }
.hm-col-head {
  font-family:'IBM Plex Mono', monospace; font-size:.52rem;
  color:var(--muted); letter-spacing:.06em; text-transform:uppercase;
  padding:3px 4px; text-align:center; white-space:nowrap;
}
.hm-row-head {
  font-family:'IBM Plex Mono', monospace; font-size:.58rem;
  color:var(--ghost); text-align:right; padding-right:10px; white-space:nowrap;
}
.hm-cell {
  width:34px; height:30px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono', monospace; font-size:.54rem; font-weight:600;
  cursor:default; transition:transform var(--fast), filter var(--fast);
}
.hm-cell:hover { transform:scale(1.18); filter:brightness(1.4); z-index:2; position:relative; }

/* ═══════════════════════════════════════════════════
   CALENDRIER
═══════════════════════════════════════════════════ */
.cal-week-hdr { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:4px; }
.cal-week-dn {
  font-family:'IBM Plex Mono', monospace; font-size:.52rem;
  color:var(--muted); text-align:center; letter-spacing:.05em;
}
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-day {
  aspect-ratio:1; border-radius:5px;
  border:1px solid var(--line2);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; transition:transform var(--fast), border-color var(--fast);
}
.cal-day:hover { transform:scale(1.1); z-index:2; position:relative; }
.cal-dn { font-family:'IBM Plex Mono', monospace; font-size:.5rem; color:var(--muted); line-height:1; }
.cal-dv { font-family:'Cormorant Garamond', serif; font-size:.88rem; font-weight:600; line-height:1.1; }

/* ═══════════════════════════════════════════════════
   DIVIDER
═══════════════════════════════════════════════════ */
.div { height:1px; background:var(--line); margin:14px 0; }

/* ═══════════════════════════════════════════════════
   SPINNER / TOASTS
═══════════════════════════════════════════════════ */
.spin-wrap {
  display:flex; align-items:center; justify-content:center; padding:90px;
  gap:10px; font-family:'IBM Plex Mono', monospace;
  font-size:.68rem; color:var(--muted); letter-spacing:.08em;
}
.spin {
  width:18px; height:18px; border-radius:50%;
  border:2px solid var(--line2); border-top-color:var(--q1);
  animation:rot .75s linear infinite;
}
@keyframes rot { to{transform:rotate(360deg)} }

#toasts { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:6px; }
.toast {
  padding:10px 16px; border-radius:var(--r10);
  font-family:'IBM Plex Mono', monospace; font-size:.64rem; font-weight:600; letter-spacing:.04em;
  border:1px solid var(--line2); background:var(--surf2); color:var(--pale);
  animation:tin .2s var(--ease);
}
.toast.s { color:var(--green); border-color:rgba(34,211,160,.25); background:rgba(34,211,160,.06); }
.toast.e { color:var(--red); border-color:rgba(238,68,68,.25); background:rgba(238,68,68,.06); }
@keyframes tin { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ═══════════════════════════════════════════════════
   CONTENT
═══════════════════════════════════════════════════ */
.content { position:relative; z-index:1; padding:20px 24px 60px; max-width:1440px; margin:0 auto; }
.content-section-title {
  font-family:'IBM Plex Mono', monospace; font-size:.58rem; font-weight:600;
  color:var(--muted); letter-spacing:.18em; text-transform:uppercase;
  margin-bottom:14px; display:flex; align-items:center; gap:10px;
}
.content-section-title::after { content:''; flex:1; height:1px; background:var(--line); }
</style>
</head>
<body>
<div id="toasts"></div>

<!-- ══════ TOPBAR ══════ -->
<header class="topbar">
  <a href="index.html" class="tb-back">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </a>
  <div class="tb-divider"></div>
  <div class="tb-logo">S</div>
  <div class="tb-text">
    <div class="tb-title">Erreurs Papier</div>
    <div class="tb-sub">Statistiques · Quarts de travail</div>
  </div>
  <div class="tb-pulse"><div class="pulse-dot"></div>EN LIGNE</div>
</header>

<!-- ══════ CONTRÔLES ══════ -->
<div class="controls">
  <div class="date-nav">
    <button class="arr" onclick="changeDay(-1)">&#8592;</button>
    <div class="date-box">
      <span class="date-label" id="date-lbl">—</span>
      <span class="today-badge" id="today-chip" style="display:none">Aujourd'hui</span>
    </div>
    <button class="arr" onclick="changeDay(1)">&#8594;</button>
  </div>
  <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('jour',this)">Journée</button>
    <button class="tab" onclick="switchTab('semaine',this)">Semaine</button>
    <button class="tab" onclick="switchTab('mois',this)">Mois</button>
  </div>
</div>

<!-- ══════ CONTENU DYNAMIQUE ══════ -->
<div class="content" id="content">
  <div class="spin-wrap"><div class="spin"></div>CHARGEMENT...</div>
</div>

<script>
const SB_URL='https://xppzmdmnuztozgukrcta.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';
let sb, curTab='jour', curDate=todayStr();
let charts=[];

/* Quarts */
const Q=[
  {id:1,s:'Q1',l:'Quart 1',c:'#F5A623',b:'rgba(245,166,35,.13)',s2:'rgba(245,166,35,.06)',g:'rgba(245,166,35,.35)',line:'rgba(245,166,35,.25)'},
  {id:2,s:'Q2',l:'Quart 2',c:'#00D4FF',b:'rgba(0,212,255,.12)',s2:'rgba(0,212,255,.05)',g:'rgba(0,212,255,.30)',line:'rgba(0,212,255,.22)'},
  {id:3,s:'Q3',l:'Quart 3',c:'#FF5E7D',b:'rgba(255,94,125,.13)',s2:'rgba(255,94,125,.06)',g:'rgba(255,94,125,.32)',line:'rgba(255,94,125,.25)'},
];
const SLOTS_H=['06:00','06:00','07:30','09:00','11:30','14:00','15:30','17:00','18:00','19:00'];
const UNI_SLOTS=[...new Set(SLOTS_H)].sort();

/* Chart.js defaults */
Chart.defaults.font.family='IBM Plex Mono';
Chart.defaults.color='#607090';

/* ─── Helpers ─────────────────────────────────────────────── */
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtLong(s){return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function fmtShort(s){return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{day:'2-digit',month:'short'});}
function fmtWD(s){return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'short',day:'numeric'});}
function weekRange(s){const d=new Date(s+'T00:00:00');const dow=d.getDay();const diff=dow===0?-6:1-dow;const m=new Date(d);m.setDate(d.getDate()+diff);const su=new Date(m);su.setDate(m.getDate()+6);return[m,su].map(x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'));}
function monthRange(s){const[y,m]=s.split('-').map(Number);return[`${y}-${String(m).padStart(2,'0')}-01`,`${y}-${String(m).padStart(2,'0')}-${String(new Date(y,m,0).getDate()).padStart(2,'0')}`];}
function daysInRange(a,b){const r=[];let d=a;while(d<=b){r.push(d);d=addDays(d,1);}return r;}

/*
 * isComptable : une ligne est comptée dans le dénominateur seulement si
 *   1. statut_ligne != 'INACTIF'
 *   2. destination est remplie ET n'est pas "AUCUN REPARTIR BOBTAIL"
 * → si destination est vide ou BOBTAIL, le camion n'était pas vraiment prévu : on l'exclut.
 */
function isComptable(r){
  const sl=(r.statut_ligne||'').toUpperCase();
  if(sl==='INACTIF') return false;
  const dest=(r.destination||'').trim();
  if(!dest) return false;
  if(dest.toUpperCase().includes('BOBTAIL')) return false;
  return true;
}

/*
 * tauxEff : (lignes comptables sans erreur sur ce quart) / lignes comptables
 * e = nb erreurs quart i, t = nb lignes comptables
 */
function tauxEff(e,t){if(!t)return null;return Math.round((1-e/t)*100);}

/* Heure d'une ligne : heure_planif en priorité, sinon SLOTS_H[slot_index], sinon '?' */
function heureRow(r){
  if(r.heure_planif&&r.heure_planif.trim()) return r.heure_planif.trim().slice(0,5);
  const idx=Number(r.slot_index);
  if(!isNaN(idx)&&idx>=0&&idx<SLOTS_H.length) return SLOTS_H[idx];
  return '?';
}

function effColor(pct){
  if(pct===null)return'#3D4F6E';
  if(pct>=90)return'#22D3A0';
  if(pct>=70)return'#F5C842';
  if(pct>=50)return'#F07840';
  return'#EE4444';
}
function effLabel(pct){return pct===null?'—':pct+'%';}

function toast(msg,t=''){const el=document.createElement('div');el.className='toast'+(t?' '+t:'');el.textContent=msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3200);}

function refreshDateUI(){
  document.getElementById('date-lbl').textContent=fmtLong(curDate);
  document.getElementById('today-chip').style.display=curDate===todayStr()?'inline-flex':'none';
}
function changeDay(d){curDate=addDays(curDate,d);refreshDateUI();render();}
function goToday(){curDate=todayStr();refreshDateUI();render();}
function switchTab(t,btn){
  curTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

async function fetchRange(a,b){
  const days=daysInRange(a,b);
  let all=[];
  for(const day of days){
    const{data,error}=await sb.from('planning_camions').select('*').eq('date_jour',day).order('slot_index');
    if(error){toast('Erreur: '+error.message,'e');continue;}
    all=[...all,...(data||[])];
  }
  return all.map(r=>({...r,erreur_q1:r.erreur_q1===true,erreur_q2:r.erreur_q2===true,erreur_q3:r.erreur_q3===true}));
}

function killCharts(){charts.forEach(c=>c&&c.destroy());charts=[];}

async function render(){
  document.getElementById('content').innerHTML='<div class="spin-wrap"><div class="spin"></div>CHARGEMENT...</div>';
  killCharts();
  let a=curDate,b=curDate;
  if(curTab==='semaine')[a,b]=weekRange(curDate);
  else if(curTab==='mois')[a,b]=monthRange(curDate);
  const data=await fetchRange(a,b);
  if(curTab==='jour')renderJour(data);
  else if(curTab==='semaine')renderSemaine(data,a,b);
  else renderMois(data,a,b);
}

/* ═══════════════════════════════════════════════════
   COMPOSANT QUART CARDS (commun aux 3 vues)
   rows  = toutes les lignes de la période concernée
   tq    = [nb erreurs Q1, Q2, Q3]
   Le dénominateur = lignes isComptable() de la période
═══════════════════════════════════════════════════ */
function quartsHTML(tq, rows){
  const C=2*Math.PI*24; // circonférence r=24
  // Lignes comptables pour le dénominateur
  const comptables=rows.filter(r=>isComptable(r)).length;
  return `<div class="quart-cards">`+Q.map((q,i)=>{
    const pct=tauxEff(tq[i],comptables);
    const eff=effColor(pct);
    const offset=pct===null?C:C*(1-pct/100);
    const errLabel=tq[i]===0?'Aucune erreur':tq[i]===1?'1 erreur détectée':tq[i]+' erreurs détectées';
    return `<div class="qcard" style="--qc:${q.c};--qb:${q.b};--qg:${q.g};--qline:${q.line}">
      <div class="qc-header">
        <div class="qc-tag"><div class="qc-tag-dot"></div>${q.l}</div>
        <div class="qc-ring-wrap">
          <svg class="qc-ring" viewBox="0 0 60 60">
            <circle class="ring-bg" cx="30" cy="30" r="24" stroke-dasharray="${C}" stroke-dashoffset="0"/>
            <circle class="ring-fg" cx="30" cy="30" r="24" stroke="${eff}"
              stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="qc-ring-pct" style="color:${eff}">${effLabel(pct)}</div>
        </div>
      </div>
      <div class="qc-body">
        <div class="qc-left">
          <div class="qc-count">${tq[i]}</div>
          <div class="qc-count-label">${errLabel}</div>
          <div class="qc-eff-label">${pct===null?'—':pct+'% d\'efficacité'} · ${comptables} camion${comptables!==1?'s':''}</div>
        </div>
      </div>
      <div class="qc-bg-bar"></div>
    </div>`;
  }).join('')+'</div>';
}

/* ═══════════════════════════════════════════════════
   VUE JOURNÉE
═══════════════════════════════════════════════════ */
function renderJour(data){
  const rows=data.filter(r=>r.date_jour===curDate);
  const tq=[0,0,0];
  rows.forEach(r=>{if(r.erreur_q1)tq[0]++;if(r.erreur_q2)tq[1]++;if(r.erreur_q3)tq[2]++;});
  const tot=tq[0]+tq[1]+tq[2];
  const comptables=rows.filter(r=>isComptable(r)).length;

  document.getElementById('content').innerHTML=`
    <div class="content-section-title">Journée du ${fmtLong(curDate)}</div>

    ${quartsHTML(tq,rows)}

    <div class="g2">
      <div class="panel">
        <div class="panel-hd">
          <span class="panel-ttl"><div class="panel-ttl-dot" style="background:var(--q1);box-shadow:0 0 8px var(--q1)"></div>Journal des erreurs</span>
          <span class="panel-meta">${tot} TOTAL · ${comptables} CAMION${comptables!==1?'S':''}</span>
        </div>
        <div class="panel-body-sm" id="jour-list"></div>
      </div>
      <div class="panel">
        <div class="panel-hd">
          <span class="panel-ttl"><div class="panel-ttl-dot" style="background:var(--q2);box-shadow:0 0 8px var(--q2)"></div>Répartition par quart</span>
          <span class="panel-meta">${fmtShort(curDate)}</span>
        </div>
        <div class="panel-body">
          <div class="ch-220"><canvas id="c-doughnut"></canvas></div>
          <div class="div"></div>
          ${Q.map((q,i)=>`<div class="bar-row">
            <span class="bar-tag bt${q.id}">${q.s}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${tot?Math.round(tq[i]/tot*100):0}%;background:${q.c}"></div></div>
            <span class="bar-num">${tq[i]}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd">
        <span class="panel-ttl"><div class="panel-ttl-dot" style="background:var(--q3);box-shadow:0 0 8px var(--q3)"></div>Distribution horaire</span>
        <span class="panel-meta">ERREURS PAR CRÉNEAU</span>
      </div>
      <div class="panel-body"><div class="ch-160"><canvas id="c-slots"></canvas></div></div>
    </div>
  `;

  /* liste */
  const errs=[];
  rows.forEach(r=>{Q.forEach(q=>{if(r['erreur_q'+q.id])errs.push({h:heureRow(r),q});});});
  errs.sort((a,b)=>a.h<b.h?-1:1);
  const listEl=document.getElementById('jour-list');
  if(!errs.length){
    listEl.innerHTML='<div class="err-none">✓ Aucune erreur papier enregistrée</div>';
  }else{

      <div class="err-item" style="--ec:${e.q.c}">

        <span style="font-size:.72rem;color:var(--soft)">${e.q.l}</span>
      </div>`).join('')+'</div>';
  }

  /* doughnut */
  const dCtx=document.getElementById('c-doughnut').getContext('2d');
  charts.push(new Chart(dCtx,{type:'doughnut',data:{
    labels:Q.map(q=>q.l),
    datasets:[{data:tq,backgroundColor:Q.map(q=>q.b),borderColor:Q.map(q=>q.c),borderWidth:2,hoverBackgroundColor:Q.map(q=>q.g)}]
  },options:{responsive:true,maintainAspectRatio:true,cutout:'72%',plugins:{
    legend:{display:true,position:'bottom',labels:{font:{size:10},padding:16,usePointStyle:true,pointStyleWidth:8}},
    tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+ctx.raw+(ctx.raw>1?' erreurs':' erreur')}}
  }}}));

  /* bar slots — utilise heureRow */
  const bCtx=document.getElementById('c-slots').getContext('2d');
  charts.push(new Chart(bCtx,{type:'bar',data:{
    labels:UNI_SLOTS,
    datasets:Q.map(q=>({label:q.l,data:UNI_SLOTS.map(h=>rows.filter(r=>heureRow(r)===h&&r['erreur_q'+q.id]).length),backgroundColor:q.b,borderColor:q.c,borderWidth:1.5,borderRadius:4}))
  },options:{responsive:true,maintainAspectRatio:false,
    scales:{
      x:{stacked:true,grid:{color:'rgba(30,36,56,.8)'},ticks:{font:{size:9}}},
      y:{stacked:true,grid:{color:'rgba(30,36,56,.8)'},ticks:{stepSize:1,font:{size:9}},beginAtZero:true}
    },plugins:{legend:{display:false}}
  }}));
}

/* ═══════════════════════════════════════════════════
   VUE SEMAINE
═══════════════════════════════════════════════════ */
function renderSemaine(data,a,b){
  const days=daysInRange(a,b);
  const bd={};
  days.forEach(d=>{
    bd[d]={q1:0,q2:0,q3:0,tot:0};
    data.filter(r=>r.date_jour===d).forEach(r=>{
      if(r.erreur_q1){bd[d].q1++;bd[d].tot++;}
      if(r.erreur_q2){bd[d].q2++;bd[d].tot++;}
      if(r.erreur_q3){bd[d].q3++;bd[d].tot++;}
    });
  });
  const tq=[0,0,0];days.forEach(d=>{tq[0]+=bd[d].q1;tq[1]+=bd[d].q2;tq[2]+=bd[d].q3;});
  const tot=tq[0]+tq[1]+tq[2];
  const touch=days.filter(d=>bd[d].tot>0).length;
  const comptablesTotal=data.filter(r=>isComptable(r)).length;

  document.getElementById('content').innerHTML=`
    <div class="content-section-title">Semaine du ${fmtShort(a)} au ${fmtShort(b)}</div>

    ${quartsHTML(tq,data)}

    <div class="kpi-strip">
      <div class="kpi-pill" style="--ka:var(--q1)">
        <div class="kpi-pill-label">Total semaine</div>
        <div class="kpi-pill-val">${tot}</div>
        <div class="kpi-pill-sub">${comptablesTotal} camion${comptablesTotal!==1?'s':''} comptabilisé${comptablesTotal!==1?'s':''}</div>
      </div>
      <div class="kpi-pill" style="--ka:#22D3A0">
        <div class="kpi-pill-label">Jours touchés</div>
        <div class="kpi-pill-val">${touch}<span style="font-size:1.2rem;color:var(--muted)"> / ${days.length}</span></div>
        <div class="kpi-pill-sub">${Math.round(touch/days.length*100)}% des jours</div>
      </div>
      <div class="kpi-pill" style="--ka:var(--q2)">
        <div class="kpi-pill-label">Moyenne / jour</div>
        <div class="kpi-pill-val">${tot?+(tot/days.length).toFixed(1):0}</div>
        <div class="kpi-pill-sub">erreurs par jour</div>
      </div>
      <div class="kpi-pill" style="--ka:var(--q3)">
        <div class="kpi-pill-label">Pic journalier</div>
        <div class="kpi-pill-val">${Math.max(...days.map(d=>bd[d].tot))}</div>
        <div class="kpi-pill-sub">maximum sur la semaine</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd">
        <span class="panel-ttl"><div class="panel-ttl-dot"></div>Évolution hebdomadaire</span>
        <span class="panel-meta">ERREURS PAR JOUR · TOUS QUARTS</span>
      </div>
      <div class="panel-body"><div class="ch-280"><canvas id="c-sem-line"></canvas></div></div>
    </div>

    <div class="g2">
      <div class="panel">
        <div class="panel-hd">
          <span class="panel-ttl"><div class="panel-ttl-dot" style="background:var(--q2);box-shadow:0 0 8px var(--q2)"></div>Répartition des quarts</span>
          <span class="panel-meta">CONTRIBUTION</span>
        </div>
        <div class="panel-body">
          <div class="ch-220"><canvas id="c-sem-d"></canvas></div>
          <div class="div"></div>
          ${Q.map((q,i)=>`<div class="bar-row">
            <span class="bar-tag bt${q.id}">${q.s}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${tot?Math.round(tq[i]/tot*100):0}%;background:${q.c}"></div></div>
            <span class="bar-num">${tq[i]}</span>
          </div>`).join('')}
        </div>
      </div>
      <div class="panel">
        <div class="panel-hd">
          <span class="panel-ttl"><div class="panel-ttl-dot" style="background:var(--q3);box-shadow:0 0 8px var(--q3)"></div>Empilé par jour</span>
          <span class="panel-meta">Q1 · Q2 · Q3</span>
        </div>
        <div class="panel-body"><div class="ch-280"><canvas id="c-sem-stack"></canvas></div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd">
        <span class="panel-ttl"><div class="panel-ttl-dot" style="background:var(--q1);box-shadow:0 0 8px var(--q1)"></div>Carte thermique — Créneau × Jour</span>
        <span class="panel-meta">INTENSITÉ</span>
      </div>
      <div class="panel-body"><div class="hm-scroll" id="hm-sem"></div></div>
    </div>
  `;

  /* courbe semaine — avec remplissage dégradé */
  const lCtx=document.getElementById('c-sem-line').getContext('2d');
  const gradTotal=lCtx.createLinearGradient(0,0,0,280);
  gradTotal.addColorStop(0,'rgba(245,166,35,.25)');
  gradTotal.addColorStop(1,'rgba(245,166,35,.01)');

    labels:days.map(d=>fmtWD(d)),
    datasets:[
      {label:'Total',data:days.map(d=>bd[d].tot),borderColor:'#F5A623',backgroundColor:gradTotal,fill:true,tension:.4,pointRadius:6,pointBackgroundColor:'#F5A623',pointBorderColor:'#07080C',pointBorderWidth:2,borderWidth:2.5},
      ...Q.map(q=>({label:q.l,data:days.map(d=>bd[d]['q'+q.id]),borderColor:q.c,backgroundColor:'transparent',fill:false,tension:.4,pointRadius:4,pointBackgroundColor:q.c,pointBorderColor:'#07080C',pointBorderWidth:1.5,borderWidth:1.5,borderDash:[5,3]}))
    ]

    scales:{
      x:{grid:{color:'rgba(30,36,56,.8)'},ticks:{font:{size:9}}},

    },plugins:{legend:{labels:{font:{size:10},usePointStyle:true,pointStyleWidth:8,padding:16}}}

  /* doughnut */

  }}}));

  /* stacked */
  const sCtx=document.getElementById('c-sem-stack').getContext('2d');
  charts.push(new Chart(sCtx,{type:'bar',data:{
    labels:days.map(d=>fmtWD(d)),
    datasets:Q.map(q=>({label:q.l,data:days.map(d=>bd[d]['q'+q.id]),backgroundColor:q.b,borderColor:q.c,borderWidth:1.5,borderRadius:4}))
  },options:{responsive:true,maintainAspectRatio:false,
    scales:{
      x:{stacked:true,grid:{color:'rgba(30,36,56,.8)'},ticks:{font:{size:9}}},
      y:{stacked:true,grid:{color:'rgba(30,36,56,.8)'},ticks:{stepSize:1,font:{size:9}},beginAtZero:true}
    },plugins:{legend:{display:false}}
  }}));

  buildHeatmap('hm-sem',data,days);
}

/* ═══════════════════════════════════════════════════

        <div class="kpi-pill-val">${tot?+(tot/days.length).toFixed(1):0}</div>
        <div class="kpi-pill-sub">erreurs / jour</div>
      </div>
      <div class="kpi-pill" style="--ka:${pireQ.c}">
        <div class="kpi-pill-label">Quart critique</div>
        <div class="kpi-pill-val" style="font-size:1.6rem">${pireQ.l}</div>
        <div class="kpi-pill-sub">${Math.max(...tq)} erreurs</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd">
        <span class="panel-ttl"><div class="panel-ttl-dot"></div>Évolution mensuelle</span>
        <span class="panel-meta">ERREURS PAR JOUR · ${moisNom.toUpperCase()}</span>
      </div>
      <div class="panel-body"><div class="ch-320"><canvas id="c-mois-line"></canvas></div></div>
    </div>

    <div class="g2">
      <div class="panel">
        <div class="panel-hd">
          <span class="panel-ttl"><div class="panel-ttl-dot" style="background:var(--q2);box-shadow:0 0 8px var(--q2)"></div>Répartition des quarts</span>
          <span class="panel-meta">${moisNom.toUpperCase()}</span>
        </div>
        <div class="panel-body">
          <div class="ch-220"><canvas id="c-mois-d"></canvas></div>
          <div class="div"></div>
          ${Q.map((q,i)=>`<div class="bar-row">
            <span class="bar-tag bt${q.id}">${q.s}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${tot?Math.round(tq[i]/tot*100):0}%;background:${q.c}"></div></div>
            <span class="bar-num">${tq[i]}</span>
          </div>`).join('')}
          <div class="div"></div>
          <div style="display:flex;align-items:center;gap:8px;padding:4px 0">
            <span class="bar-tag bt${pireQ.id}">${pireQ.s}</span>
            <span style="font-size:.7rem;color:var(--soft)">Quart le plus problématique ce mois</span>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-hd">
          <span class="panel-ttl"><div class="panel-ttl-dot" style="background:var(--q1);box-shadow:0 0 8px var(--q1)"></div>Calendrier thermique</span>
          <span class="panel-meta">INTENSITÉ PAR JOUR</span>
        </div>
        <div class="panel-body" id="cal-mois"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd">
        <span class="panel-ttl"><div class="panel-ttl-dot" style="background:var(--q3);box-shadow:0 0 8px var(--q3)"></div>Carte thermique — Créneau × Jour</span>
        <span class="panel-meta">TOUTES ERREURS DU MOIS</span>
      </div>
      <div class="panel-body"><div class="hm-scroll" id="hm-mois"></div></div>
    </div>
  `;

  /* courbe mensuelle */
  const lCtx=document.getElementById('c-mois-line').getContext('2d');
  const grd=lCtx.createLinearGradient(0,0,0,320);
  grd.addColorStop(0,'rgba(245,166,35,.22)');
  grd.addColorStop(1,'rgba(245,166,35,.01)');
  charts.push(new Chart(lCtx,{type:'line',data:{
    labels:days.map(d=>String(new Date(d+'T00:00:00').getDate())),
    datasets:[
      {label:'Total',data:days.map(d=>bd[d].tot),borderColor:'#F5A623',backgroundColor:grd,fill:true,tension:.35,pointRadius:3,pointBackgroundColor:'#F5A623',pointBorderColor:'#07080C',pointBorderWidth:1.5,borderWidth:2.5,spanGaps:true},
      ...Q.map(q=>({label:q.l,data:days.map(d=>bd[d]['q'+q.id]),borderColor:q.c,backgroundColor:'transparent',fill:false,tension:.35,pointRadius:2,borderWidth:1.5,borderDash:[4,3],spanGaps:true}))
    ]
  },options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    scales:{
      x:{grid:{color:'rgba(30,36,56,.8)'},ticks:{maxTicksLimit:16,font:{size:9}}},
      y:{grid:{color:'rgba(30,36,56,.8)'},ticks:{stepSize:1,font:{size:9}},beginAtZero:true,min:0}
    },plugins:{legend:{labels:{font:{size:10},usePointStyle:true,pointStyleWidth:8,padding:16}}}
  }}));

  /* doughnut */
  const dCtx=document.getElementById('c-mois-d').getContext('2d');
  charts.push(new Chart(dCtx,{type:'doughnut',data:{
    labels:Q.map(q=>q.l),
    datasets:[{data:tq,backgroundColor:Q.map(q=>q.b),borderColor:Q.map(q=>q.c),borderWidth:2}]
  },options:{responsive:true,maintainAspectRatio:true,cutout:'72%',plugins:{
    legend:{display:true,position:'bottom',labels:{font:{size:10},padding:14,usePointStyle:true,pointStyleWidth:8}}
  }}}));

  buildCalendar('cal-mois',bd,days,maxD);
  buildHeatmap('hm-mois',data,days);
}

/* ═══════════════════════════════════════════════════
   HEATMAP
═══════════════════════════════════════════════════ */
function buildHeatmap(id,data,days){
  const el=document.getElementById(id);if(!el)return;
  const get=(h,d)=>data.filter(r=>r.date_jour===d&&heureRow(r)===h)
    .reduce((s,r)=>s+(r.erreur_q1?1:0)+(r.erreur_q2?1:0)+(r.erreur_q3?1:0),0);
  const max=Math.max(1,...UNI_SLOTS.flatMap(h=>days.map(d=>get(h,d))));

  let html='<table class="hm-table"><thead><tr><th class="hm-row-head">Créneau</th>';
  days.forEach(d=>{html+=`<th class="hm-col-head">${fmtWD(d)}</th>`;});
  html+='</tr></thead><tbody>';
  UNI_SLOTS.forEach(h=>{
    html+=`<tr><th class="hm-row-head">${h}</th>`;
    days.forEach(d=>{
      const v=get(h,d),intens=v/max;
      const a=v===0?.04:.14+intens*.78;
      // dégradé or → corail selon intensité
      const rr=v===0?30:Math.round(245-intens*10);
      const gg=v===0?40:Math.round(166-intens*172);
      const bb=v===0?60:Math.round(35+intens*90);
      const bg=`rgba(${rr},${gg},${bb},${a})`;
      const tc=v===0?'rgba(80,100,140,.2)':intens>.5?'#EEF2FA':'#F5A623';
      html+=`<td title="${h} · ${fmtShort(d)} : ${v} erreur${v!==1?'s':''}">
        <div class="hm-cell" style="background:${bg};color:${tc}">${v||''}</div></td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}

/* ═══════════════════════════════════════════════════
   CALENDRIER MENSUEL
═══════════════════════════════════════════════════ */
function buildCalendar(id,bd,days,maxD){
  const el=document.getElementById(id);if(!el)return;
  const off=(()=>{const dow=new Date(days[0]+'T00:00:00').getDay();return dow===0?6:dow-1;})();
  const dnames=['L','M','M','J','V','S','D'];
  let html='<div class="cal-week-hdr">'+dnames.map(d=>`<div class="cal-week-dn">${d}</div>`).join('')+'</div>';
  html+='<div class="cal-grid">';
  for(let i=0;i<off;i++) html+='<div></div>';
  days.forEach(day=>{
    const v=bd[day].tot,intens=v/maxD;
    const isToday=day===todayStr(),isCur=day===curDate;
    const rr=v===0?19:Math.round(245-intens*10);
    const gg=v===0?25:Math.round(166-intens*172);
    const bb=v===0?38:Math.round(35+intens*90);
    const bg=v===0?'var(--surf2)':`rgba(${rr},${gg},${bb},${.22+intens*.68})`;
    const bord=isToday?'2px solid #F5A623':isCur?'1px solid rgba(245,166,35,.5)':'1px solid var(--line2)';
    const dn=new Date(day+'T00:00:00').getDate();
    html+=`<div class="cal-day" style="background:${bg};border:${bord}"
      title="${fmtShort(day)}: ${v} erreur${v!==1?'s':''}"
      onclick="curDate='${day}';refreshDateUI();goJour()">
      <span class="cal-dn" style="color:${v>0?'var(--soft)':'var(--muted)'}">${dn}</span>
      ${v>0?`<span class="cal-dv" style="color:${intens>.55?'#EEF2FA':'#F5A623'}">${v}</span>`:''}
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function goJour(){
  curTab='jour';
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===0));
  render();
}

/* ═══════════════════════════════════════════════════
   AUTH + INIT
═══════════════════════════════════════════════════ */
async function initApp(){
  sb=supabase.createClient(SB_URL,SB_KEY);
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){window.location.href='index.html';return;}
    await sb.from('admins').select('email').eq('email',session.user.email).maybeSingle();
  }catch(e){}
  refreshDateUI();
  render();
}
function waitForSupabaseAndInit(){
  if(typeof supabase!=='undefined'&&supabase.createClient){initApp();}
  else{setTimeout(waitForSupabaseAndInit,50);}
}
window.addEventListener('load',waitForSupabaseAndInit);
</script>
