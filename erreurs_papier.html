<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Erreurs Papier — SOY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --ink:    #080A0F;
  --ink1:   #0D1017;
  --ink2:   #121620;
  --ink3:   #181D28;
  --ink4:   #1E2535;
  --wire:   #232D42;
  --wire2:  #2A3650;
  --dim:    #3D4F6E;
  --muted:  #5C7099;
  --ghost:  #8898BB;
  --pale:   #C8D4EE;
  --snow:   #EDF1FA;

  --amber:  #F0A030;
  --amber2: #FFD080;
  --amber-: rgba(240,160,48,.12);
  --blue:   #5B8EF0;
  --blue2:  #A0C0FF;
  --blue-:  rgba(91,142,240,.12);
  --violet: #A870E8;
  --violet2:#D0A8FF;
  --violet-:rgba(168,112,232,.12);
  --green:  #30C898;
  --red:    #E84848;

  --q1c: var(--amber);  --q1d: var(--amber-);  --q1t: var(--amber2);
  --q2c: var(--blue);   --q2d: var(--blue-);   --q2t: var(--blue2);
  --q3c: var(--violet); --q3d: var(--violet-); --q3t: var(--violet2);

  --r3: 3px; --r6: 6px; --r10: 10px; --r16: 16px;
  --ease: cubic-bezier(.4,0,.2,1);
  --fast: .14s; --mid: .28s;

  --font-ui:   'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-disp: 'Instrument Serif', serif;
}

/* ── RESET ──────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:14px; }
body { font-family:var(--font-ui); background:var(--ink); color:var(--pale);
       min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
button { cursor:pointer; border:none; background:none; font-family:inherit; color:inherit; }
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--wire2); border-radius:3px; }

/* ── GRID BACKGROUND ────────────────────────────────────────── */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(var(--wire) 1px, transparent 1px),
    linear-gradient(90deg, var(--wire) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity:.08;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 20%, black, transparent);
}
/* Grain */
body::after {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.topbar {
  position:sticky; top:0; z-index:200;
  height:56px; padding:0 20px;
  background:rgba(8,10,15,.95); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--wire);
  display:flex; align-items:center; gap:14px;
}
.tb-back {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 12px; border-radius:var(--r6);
  border:1px solid var(--wire2); color:var(--muted);
  font-family:var(--font-mono); font-size:.68rem; font-weight:700;
  text-decoration:none; letter-spacing:.06em;
  transition:all var(--fast) var(--ease);
}
.tb-back:hover { border-color:var(--amber); color:var(--amber); background:var(--amber-); }
.tb-back svg { flex-shrink:0; }
.tb-sep { width:1px; height:24px; background:var(--wire2); }
.tb-icon {
  width:28px; height:28px; border-radius:var(--r6);
  background:var(--amber-); border:1px solid rgba(240,160,48,.25);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-disp); font-style:italic; font-size:.88rem; color:var(--amber);
}
.tb-name { font-size:.92rem; font-weight:700; color:var(--snow); letter-spacing:.02em; }
.tb-sub  { font-family:var(--font-mono); font-size:.55rem; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; margin-top:1px; }
.tb-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
/* live indicator */
.tb-live {
  display:flex; align-items:center; gap:5px;
  font-family:var(--font-mono); font-size:.58rem; letter-spacing:.1em; color:var(--muted);
}
.tb-live-dot {
  width:6px; height:6px; border-radius:50%; background:var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

/* ── DATE ZONE ──────────────────────────────────────────────── */
.date-zone {
  position:relative; z-index:1;
  padding:20px 20px 0;
  display:flex; align-items:center; gap:8px;
  flex-wrap:wrap;
}
.date-arr {
  width:32px; height:32px; border-radius:var(--r6);
  border:1px solid var(--wire2); color:var(--muted);
  display:flex; align-items:center; justify-content:center;
  font-size:.9rem; transition:all var(--fast);
  flex-shrink:0;
}
.date-arr:hover { border-color:var(--amber); color:var(--amber); background:var(--amber-); }
.date-display {
  display:flex; align-items:center; gap:10px;
  padding:7px 18px; flex:1; min-width:220px; max-width:400px;
  background:var(--ink2); border:1px solid var(--wire2); border-radius:var(--r6);
  position:relative; overflow:hidden;
}
.date-display::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
  background:var(--amber); opacity:.7;
}
.date-txt {
  font-family:var(--font-mono); font-size:.78rem; font-weight:700;
  color:var(--snow); letter-spacing:.02em; text-transform:uppercase; flex:1;
}
.today-chip {
  font-family:var(--font-mono); font-size:.52rem; font-weight:700;
  color:var(--amber); background:var(--amber-); border:1px solid rgba(240,160,48,.3);
  padding:2px 7px; border-radius:20px; letter-spacing:.1em; text-transform:uppercase;
}
.btn-today {
  padding:7px 14px; border-radius:var(--r6);
  border:1px solid var(--wire2); color:var(--muted);
  font-family:var(--font-mono); font-size:.62rem; font-weight:700;
  letter-spacing:.08em; text-transform:uppercase;
  transition:all var(--fast);
}
.btn-today:hover { border-color:var(--amber); color:var(--amber); }

/* ── TABS ───────────────────────────────────────────────────── */
.tabs-zone {
  position:relative; z-index:1;
  display:flex; align-items:center; gap:2px;
  padding:14px 20px 0;
}
.tab-btn {
  padding:7px 20px; border-radius:var(--r6);
  font-family:var(--font-mono); font-size:.62rem; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  border:1px solid transparent; color:var(--muted);
  transition:all var(--fast);
}
.tab-btn:hover { color:var(--pale); background:var(--ink3); }
.tab-btn.on {
  color:var(--amber); border-color:rgba(240,160,48,.3);
  background:var(--amber-);
  box-shadow:0 0 12px rgba(240,160,48,.12);
}

/* ── CONTENT ────────────────────────────────────────────────── */
.content { position:relative; z-index:1; padding:20px; max-width:1400px; margin:0 auto 60px; }

/* ── SECTION TITLE ──────────────────────────────────────────── */
.sec-title {
  font-family:var(--font-mono); font-size:.55rem; font-weight:700;
  color:var(--dim); letter-spacing:.2em; text-transform:uppercase;
  margin-bottom:10px; padding-bottom:6px;
  border-bottom:1px solid var(--wire);
  display:flex; align-items:center; gap:8px;
}
.sec-title::before { content:'//'; color:var(--amber); opacity:.6; }

/* ── QUART GAUGES — vue journée ─────────────────────────────── */
.quart-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
@media(max-width:600px){ .quart-row { grid-template-columns:1fr; } }

.quart-gauge {
  background:var(--ink2); border:1px solid var(--wire);
  border-radius:var(--r10); padding:18px 20px;
  position:relative; overflow:hidden;
  animation:fadeUp .4s var(--ease) both;
}
.quart-gauge:nth-child(2){ animation-delay:.06s; }
.quart-gauge:nth-child(3){ animation-delay:.12s; }
@keyframes fadeUp{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ligne de couleur gauche */
.quart-gauge::before {
  content:''; position:absolute; left:0; top:12px; bottom:12px;
  width:2px; border-radius:2px;
  background:var(--qc);
  box-shadow:0 0 8px var(--qc);
}
/* fond glow subtil */
.quart-gauge::after {
  content:''; position:absolute; right:-30px; top:-30px;
  width:120px; height:120px; border-radius:50%;
  background:radial-gradient(circle,var(--qc),transparent 70%);
  opacity:.06; pointer-events:none;
}

.qg-head {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.qg-tag {
  font-family:var(--font-mono); font-size:.6rem; font-weight:700;
  letter-spacing:.12em; text-transform:uppercase;
  color:var(--qc); padding:3px 9px;
  border:1px solid var(--qc); border-radius:20px;
  background:var(--qd); opacity:.9;
}
.qg-eff {
  font-family:var(--font-mono); font-size:.68rem; font-weight:700;
  padding:3px 9px; border-radius:20px; border:1px solid;
}
.qg-eff.hi  { color:#30C898; border-color:rgba(48,200,152,.3); background:rgba(48,200,152,.08); }
.qg-eff.mid { color:var(--amber); border-color:rgba(240,160,48,.3); background:var(--amber-); }
.qg-eff.lo  { color:#F07850; border-color:rgba(240,120,80,.3); background:rgba(240,120,80,.08); }
.qg-eff.bad { color:var(--red); border-color:rgba(232,72,72,.3); background:rgba(232,72,72,.08); }
.qg-eff.na  { color:var(--dim); border-color:var(--wire); }

.qg-count {
  font-family:var(--font-mono); font-size:3.2rem; font-weight:700;
  color:var(--qc); line-height:1; margin-bottom:6px;
  text-shadow:0 0 20px var(--qc);
  transition:all .6s var(--ease);
}
.qg-label {
  font-size:.68rem; font-weight:600; color:var(--ghost);
  letter-spacing:.04em;
}
.qg-sub { font-family:var(--font-mono); font-size:.58rem; color:var(--muted); margin-top:3px; }

/* arc de progression */
.qg-arc {
  position:absolute; bottom:12px; right:14px;
  width:52px; height:52px;
}
.qg-arc circle {
  fill:none; stroke-width:3; stroke-linecap:round;
  cx:26; cy:26; r:22;
  transform:rotate(-90deg); transform-origin:50% 50%;
  transition:stroke-dashoffset .9s var(--ease);
}
.arc-bg { stroke:var(--wire2); }
.arc-fg { stroke:var(--qc); filter:drop-shadow(0 0 3px var(--qc)); }
.qg-arc-pct {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:.5rem; font-weight:700; color:var(--qc);
}

/* ── KPI GRID (semaine/mois) ────────────────────────────────── */
.kpi-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
@media(max-width:1100px){ .kpi-grid{grid-template-columns:repeat(3,1fr);} }
@media(max-width:600px){ .kpi-grid{grid-template-columns:1fr 1fr;} }

.kpi {
  background:var(--ink2); border:1px solid var(--wire);
  border-radius:var(--r10); padding:16px 18px;
  position:relative; overflow:hidden;
  animation:fadeUp .35s var(--ease) both;
  transition:border-color var(--fast);
}
.kpi:hover { border-color:var(--wire2); }
.kpi::after {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--ka,var(--amber)),transparent);
  opacity:.5;
}
.kpi-label {
  font-family:var(--font-mono); font-size:.52rem; font-weight:700;
  color:var(--muted); letter-spacing:.16em; text-transform:uppercase;
  margin-bottom:8px;
}
.kpi-val {
  font-family:var(--font-mono); font-size:2rem; font-weight:700;
  color:var(--ka,var(--amber)); line-height:1;
  text-shadow:0 0 16px var(--ka,var(--amber));
  margin-bottom:4px;
}
.kpi-eff {
  font-family:var(--font-mono); font-size:.6rem; font-weight:700;
  display:inline-block; padding:2px 7px; border-radius:12px;
  border:1px solid; margin-top:3px;
}
.kpi-hint { font-family:var(--font-mono); font-size:.55rem; color:var(--muted); margin-top:4px; }

/* ── PANELS ─────────────────────────────────────────────────── */
.panel {
  background:var(--ink2); border:1px solid var(--wire);
  border-radius:var(--r10); overflow:hidden;
  margin-bottom:14px;
  animation:fadeUp .4s var(--ease) both;
}
.panel-h {
  padding:14px 18px 12px;
  border-bottom:1px solid var(--wire);
  display:flex; align-items:center; justify-content:space-between;
  gap:12px;
}
.panel-title {
  font-size:.82rem; font-weight:700; color:var(--snow);
  display:flex; align-items:center; gap:8px;
}
.panel-title::before {
  content:''; width:6px; height:6px; border-radius:50%;
  background:var(--amber); box-shadow:0 0 6px var(--amber);
  flex-shrink:0;
}
.panel-meta {
  font-family:var(--font-mono); font-size:.55rem;
  color:var(--muted); letter-spacing:.08em; text-transform:uppercase;
}
.panel-b { padding:18px; }
.panel-b-sm { padding:12px 18px; }

/* ── GRIDS ───────────────────────────────────────────────────── */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media(max-width:900px){ .g2{grid-template-columns:1fr;} }

/* ── CHART HEIGHTS ──────────────────────────────────────────── */
.ch-160 { height:160px; position:relative; }
.ch-240 { height:240px; position:relative; }
.ch-280 { height:280px; position:relative; }
.ch-320 { height:320px; position:relative; }

/* ── ERR LIST ────────────────────────────────────────────────── */
.err-list { display:flex; flex-direction:column; gap:6px; }
.err-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px;
  background:var(--ink3); border:1px solid var(--wire);
  border-radius:var(--r6);
  border-left:2px solid var(--ec, var(--amber));
  transition:background var(--fast);
}
.err-item:hover { background:var(--ink4); }
.err-h { font-family:var(--font-mono); font-size:.7rem; color:var(--ghost); min-width:42px; }
.err-tag {
  font-family:var(--font-mono); font-size:.6rem; font-weight:700;
  padding:2px 8px; border-radius:12px; border:1px solid;
  letter-spacing:.08em; text-transform:uppercase;
}
.err-tag.q1 { color:var(--amber); border-color:rgba(240,160,48,.3); background:var(--amber-); }
.err-tag.q2 { color:var(--blue);  border-color:rgba(91,142,240,.3);  background:var(--blue-); }
.err-tag.q3 { color:var(--violet);border-color:rgba(168,112,232,.3); background:var(--violet-); }
.err-none {
  text-align:center; padding:32px; color:var(--muted);
  font-family:var(--font-mono); font-size:.68rem; letter-spacing:.08em;
}
.err-none::before { content:'[ '; } .err-none::after { content:' ]'; }

/* ── BAR ROWS ────────────────────────────────────────────────── */
.bar-r { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.bar-r:last-child { margin-bottom:0; }
.bar-lbl { min-width:56px; }
.bar-track { flex:1; height:4px; background:var(--ink3); border-radius:2px; overflow:hidden; }
.bar-fill { height:100%; border-radius:2px; transition:width 1s var(--ease); }
.bar-num { font-family:var(--font-mono); font-size:.62rem; color:var(--ghost); min-width:20px; text-align:right; }

/* ── HEATMAP ─────────────────────────────────────────────────── */
.hm-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.hm-table { border-collapse:separate; border-spacing:3px; }
.hm-th {
  font-family:var(--font-mono); font-size:.5rem; font-weight:700;
  color:var(--dim); letter-spacing:.08em; text-transform:uppercase;
  padding:2px 4px; text-align:center; white-space:nowrap;
}
.hm-th-row {
  font-family:var(--font-mono); font-size:.58rem; color:var(--muted);
  text-align:right; padding-right:10px; white-space:nowrap;
}
.hm-cell {
  width:32px; height:28px; border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:.55rem; font-weight:700;
  cursor:default; transition:transform var(--fast),filter var(--fast);
}
.hm-cell:hover { transform:scale(1.2); filter:brightness(1.3); z-index:2; position:relative; }

/* ── CALENDAR ────────────────────────────────────────────────── */
.cal-hdr { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px; }
.cal-dn { font-family:var(--font-mono); font-size:.5rem; color:var(--dim); text-align:center; letter-spacing:.06em; text-transform:uppercase; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-day {
  aspect-ratio:1; border-radius:4px;
  border:1px solid var(--wire);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; transition:transform var(--fast), border-color var(--fast);
}
.cal-day:hover { transform:scale(1.12); z-index:2; position:relative; }
.cal-n { font-family:var(--font-mono); font-size:.5rem; line-height:1; color:var(--muted); }
.cal-v { font-family:var(--font-mono); font-size:.62rem; font-weight:700; line-height:1.2; }

/* ── SPINNER ─────────────────────────────────────────────────── */
.spin-wrap {
  display:flex; align-items:center; justify-content:center;
  padding:80px; gap:10px;
  font-family:var(--font-mono); font-size:.7rem; color:var(--muted); letter-spacing:.1em;
}
.spin {
  width:18px; height:18px; border-radius:50%;
  border:2px solid var(--wire2); border-top-color:var(--amber);
  animation:sp .7s linear infinite;
}
@keyframes sp { to{transform:rotate(360deg)} }

/* ── TOASTS ─────────────────────────────────────────────────── */
#toasts { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:6px; }
.toast {
  padding:9px 16px; border-radius:var(--r6);
  font-family:var(--font-mono); font-size:.66rem; font-weight:700; letter-spacing:.06em;
  border:1px solid var(--wire); background:var(--ink3); color:var(--pale);
  animation:tin .18s var(--ease);
}
.toast.s { color:var(--green); border-color:rgba(48,200,152,.25); background:rgba(48,200,152,.06); }
.toast.e { color:var(--red); border-color:rgba(232,72,72,.25); background:rgba(232,72,72,.06); }
@keyframes tin { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:translateX(0)} }

/* ── DIVIDER ─────────────────────────────────────────────────── */
.div { height:1px; background:var(--wire); margin:14px 0; }
</style>
</head>
<body>
<div id="toasts"></div>

<!-- TOPBAR -->
<header class="topbar">
  <a href="index.html" class="tb-back">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    RETOUR
  </a>
  <div class="tb-sep"></div>
  <div class="tb-icon">S</div>
  <div>
    <div class="tb-name">Erreurs Papier</div>
    <div class="tb-sub">Statistiques · Quarts de travail</div>
  </div>
  <div class="tb-right">
    <div class="tb-live"><div class="tb-live-dot"></div>EN LIGNE</div>
  </div>
</header>

<!-- DATE NAV -->
<div class="date-zone">
  <button class="date-arr" onclick="changeDay(-1)">&#8592;</button>
  <div class="date-display">
    <span class="date-txt" id="date-lbl">—</span>
    <span class="today-chip" id="today-chip" style="display:none">AUJOURD'HUI</span>
  </div>
  <button class="date-arr" onclick="changeDay(1)">&#8594;</button>
  <button class="btn-today" onclick="goToday()">AUJOURD'HUI</button>
</div>

<!-- TABS -->
<div class="tabs-zone">
  <button class="tab-btn on" onclick="switchTab('jour',this)">JOURNÉE</button>
  <button class="tab-btn" onclick="switchTab('semaine',this)">SEMAINE</button>
  <button class="tab-btn" onclick="switchTab('mois',this)">MOIS</button>
</div>

<!-- MAIN CONTENT -->
<div class="content" id="content">
  <div class="spin-wrap"><div class="spin"></div>CHARGEMENT...</div>
</div>

<script>

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtLong(s){return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function fmtShort(s){return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{day:'2-digit',month:'short'});}
function fmtWD(s){return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'short',day:'numeric'});}
function weekRange(s){const d=new Date(s+'T00:00:00');const dow=d.getDay();const diff=dow===0?-6:1-dow;const m=new Date(d);m.setDate(d.getDate()+diff);const su=new Date(m);su.setDate(m.getDate()+6);return[m,su].map(x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'));}
function monthRange(s){const[y,m]=s.split('-').map(Number);return[`${y}-${String(m).padStart(2,'0')}-01`,`${y}-${String(m).padStart(2,'0')}-${String(new Date(y,m,0).getDate()).padStart(2,'0')}`];}
function daysInRange(a,b){const r=[];let d=a;while(d<=b){r.push(d);d=addDays(d,1);}return r;}

async function fetchRange(a,b){

  return allRows.map(r=>({...r,erreur_q1:r.erreur_q1===true,erreur_q2:r.erreur_q2===true,erreur_q3:r.erreur_q3===true}));
}

}

/* ══════════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════════ */
function arcHTML(pct,color){
  const C=2*Math.PI*22; // circonférence r=22
  const offset=pct===null?C:C-(pct/100)*C;
  return `<svg class="qg-arc" viewBox="0 0 52 52">
    <circle class="arc-bg" cx="26" cy="26" r="22" stroke-dasharray="${C}" stroke-dashoffset="0"/>
    <circle class="arc-fg" cx="26" cy="26" r="22" stroke="${color}"
      stroke-dasharray="${C}" stroke-dashoffset="${offset}"
      style="transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)"/>
  </svg>
  <div class="qg-arc-pct">${pct===null?'—':pct+'%'}</div>`;
}

      ...Q.map(q=>({label:q.l,data:days.map(d=>bd[d]['q'+q.id]),borderColor:q.c,backgroundColor:'transparent',fill:false,tension:.35,pointRadius:2,borderWidth:1.5,borderDash:[4,3],spanGaps:true}))
    ]
  },options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    scales:{
      x:{grid:{color:'rgba(35,45,66,.5)'},ticks:{maxTicksLimit:16,font:{size:9}}},
      y:{grid:{color:'rgba(35,45,66,.5)'},ticks:{stepSize:1,font:{size:9}},beginAtZero:true,min:0}
    },plugins:{legend:{labels:{font:{size:10},usePointStyle:true,pointStyleWidth:7}}}
  }});

  const dCtx=document.getElementById('c-mois-d').getContext('2d');
  ch2=new Chart(dCtx,{type:'doughnut',data:{
    labels:Q.map(q=>q.l),
    datasets:[{data:tq,backgroundColor:Q.map(q=>q.d),borderColor:Q.map(q=>q.c),borderWidth:2}]
  },options:{responsive:true,maintainAspectRatio:true,cutout:'72%',plugins:{
    legend:{display:true,position:'bottom',labels:{font:{size:10},padding:14,usePointStyle:true,pointStyleWidth:7}}
  }}});

  buildCalendar('cal-mois',bd,days,maxD);
  buildHeatmap('hm-mois',data,days);
}

/* ══════════════════════════════════════════════════════════════
   HEATMAP créneau × jour
══════════════════════════════════════════════════════════════ */
function buildHeatmap(id,data,days){
  const el=document.getElementById(id);if(!el)return;
  const get=(h,d)=>data.filter(r=>r.date_jour===d&&(r.heure_planif||SLOTS_H[r.slot_index]||'?')===h)
    .reduce((s,r)=>s+(r.erreur_q1?1:0)+(r.erreur_q2?1:0)+(r.erreur_q3?1:0),0);
  const max=Math.max(1,...UNI_SLOTS.flatMap(h=>days.map(d=>get(h,d))));

  let html='<table class="hm-table"><thead><tr><th class="hm-th-row" style="padding-right:10px">CRÉNEAUX</th>';
  days.forEach(d=>{html+=`<th class="hm-th">${fmtWD(d).toUpperCase()}</th>`;});
  html+='</tr></thead><tbody>';
  UNI_SLOTS.forEach(h=>{
    html+=`<tr><th class="hm-th-row">${h}</th>`;
    days.forEach(d=>{
      const v=get(h,d); const intensity=v/max;
      const alpha=v===0?.04:.15+intensity*.75;
      const r2=v===0?35:Math.round(240+intensity*15);
      const g2=v===0?45:Math.round(160-intensity*112);
      const b2=v===0?65:Math.round(48-intensity*48);
      const bg=`rgba(${r2},${g2},${b2},${alpha})`;
      const tc=v===0?'rgba(90,110,150,.2)':intensity>.5?'#EDF1FA':'#F0A030';
      html+=`<td title="${h} · ${fmtShort(d)}: ${v} erreur${v!==1?'s':''}">
        <div class="hm-cell" style="background:${bg};color:${tc}">${v||''}</div></td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}

/* ══════════════════════════════════════════════════════════════
   CALENDRIER MENSUEL
══════════════════════════════════════════════════════════════ */
function buildCalendar(id,bd,days,maxD){
  const el=document.getElementById(id);if(!el)return;
  const firstDow=new Date(days[0]+'T00:00:00').getDay();
  const off=firstDow===0?6:firstDow-1;
  const dnames=['L','M','M','J','V','S','D'];

  let html='<div class="cal-hdr">'+dnames.map(d=>`<div class="cal-dn">${d}</div>`).join('')+'</div>';
  html+='<div class="cal-grid">';
  for(let i=0;i<off;i++) html+='<div></div>';
  days.forEach(day=>{
    const v=bd[day].tot; const intensity=v/maxD;
    const isToday=day===todayStr(); const isCur=day===curDate;
    const r2=v===0?19:Math.round(240+intensity*15);
    const g2=v===0?25:Math.round(160-intensity*112);
    const b2=v===0?35:Math.round(48-intensity*48);
    const bg=v===0?'var(--ink3)':`rgba(${r2},${g2},${b2},${.25+intensity*.65})`;
    const bord=isToday?'2px solid #F0A030':isCur?'1px solid rgba(240,160,48,.4)':'1px solid var(--wire)';
    const dn=new Date(day+'T00:00:00').getDate();
    html+=`<div class="cal-day" style="background:${bg};border:${bord}"
      title="${fmtShort(day)}: ${v} erreur${v!==1?'s':''}"
      onclick="curDate='${day}';refreshDateUI();goJour()">
      <span class="cal-n" style="color:${v>0?'var(--ghost)':'var(--wire2)'}">${dn}</span>
      ${v>0?`<span class="cal-v" style="color:${intensity>.55?'#EDF1FA':'#F0A030'}">${v}</span>`:''}
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function goJour(){
  curTab='jour';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',i===0));
  render();
}

async function initApp(){
  sb=supabase.createClient(SB_URL,SB_KEY);
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){window.location.href='index.html';return;}
    await sb.from('admins').select('email').eq('email',session.user.email).maybeSingle();
  }catch(e){}
  refreshDateUI();
  render();
}

function waitForSupabaseAndInit(){
  if(typeof supabase!=='undefined'&&supabase.createClient){
    initApp();
  } else {
    setTimeout(waitForSupabaseAndInit,50);
  }
}
window.addEventListener('load',waitForSupabaseAndInit);
</script>
