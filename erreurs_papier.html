<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erreurs Papier — Expédition SOY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg-void:#06070B;--bg-deep:#0B0D13;--bg-base:#0F1118;
  --bg-raised:#15181F;--bg-float:#1A1E2A;--bg-hover:#1F2436;
  --copper:#C8843A;--copper-light:#E0A870;--copper-pale:#EDD4A8;
  --copper-glow:rgba(200,132,58,.22);--copper-dim:rgba(200,132,58,.10);
  --text-primary:#F0EAE0;--text-secondary:#BEC5D6;
  --text-muted:#7A82A0;--text-faint:#2C3350;
  --q1:#E8A43A;--q1-dim:rgba(232,164,58,.10);--q1-glow:rgba(232,164,58,.22);
  --q2:#7B9CF0;--q2-dim:rgba(123,156,240,.10);--q2-glow:rgba(123,156,240,.22);
  --q3:#C87FE8;--q3-dim:rgba(200,127,232,.10);--q3-glow:rgba(200,127,232,.22);
  --ruby:#E05555;--emerald:#2DD4A0;
  --r-sm:4px;--r-md:10px;--r-lg:16px;--r-xl:24px;
  --t-fast:.15s;--ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{font-family:'Outfit',sans-serif;background:var(--bg-void);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.018;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.amb{position:fixed;pointer-events:none;border-radius:50%;z-index:0;}
.amb-1{top:-15%;right:-5%;width:700px;height:700px;background:radial-gradient(circle,rgba(232,164,58,.035),transparent 65%);animation:breathe 9s ease-in-out infinite;}
.amb-2{bottom:-20%;left:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(123,156,240,.025),transparent 65%);animation:breathe 11s ease-in-out infinite reverse;}
.amb-3{top:35%;left:25%;width:500px;height:500px;background:radial-gradient(circle,rgba(200,127,232,.02),transparent 65%);animation:breathe 13s ease-in-out infinite 3s;}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.12);opacity:.7}}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:64px;background:rgba(6,7,11,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--text-faint);padding:0 28px;display:flex;align-items:center;justify-content:space-between;}
.tb-left{display:flex;align-items:center;gap:14px;}
.tb-back{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:var(--r-md);background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-secondary);font-size:.82rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all var(--t-fast);}
.tb-back:hover{border-color:var(--copper);color:var(--copper-light);background:var(--bg-hover);}
.tb-monogram{width:34px;height:34px;border:1px solid rgba(200,132,58,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--copper-light);flex-shrink:0;}
.tb-info .tb-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600;letter-spacing:.02em;}
.tb-info .tb-sub{font-size:.62rem;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-top:1px;}

/* DATE NAV */
.date-zone{display:flex;align-items:center;justify-content:center;gap:10px;padding:22px 28px 0;position:relative;z-index:1;}
.date-arr{width:36px;height:36px;border-radius:var(--r-md);background:var(--bg-float);border:1px solid var(--text-faint);color:var(--text-secondary);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t-fast);flex-shrink:0;}
.date-arr:hover{border-color:var(--copper);color:var(--copper-light);background:var(--bg-hover);}
.date-pill{display:flex;align-items:center;gap:10px;padding:8px 24px;background:var(--bg-float);border:1px solid var(--text-faint);border-radius:var(--r-md);min-width:290px;justify-content:center;}
.date-txt{font-size:.95rem;font-weight:600;color:var(--text-primary);text-transform:capitalize;}
.today-chip{font-size:.58rem;font-weight:700;color:var(--copper);background:var(--copper-dim);border:1px solid rgba(200,132,58,.25);padding:2px 8px;border-radius:20px;letter-spacing:.08em;text-transform:uppercase;}
.btn-today{padding:8px 16px;border-radius:var(--r-md);background:transparent;border:1px solid var(--text-faint);color:var(--text-muted);font-size:.74rem;font-weight:600;cursor:pointer;transition:all var(--t-fast);letter-spacing:.06em;text-transform:uppercase;}
.btn-today:hover{border-color:var(--copper);color:var(--copper);}

/* TABS */
.tabs-zone{display:flex;align-items:center;justify-content:center;gap:5px;padding:18px 28px 0;position:relative;z-index:1;}
.tab-btn{padding:8px 26px;border-radius:var(--r-md);font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--text-faint);color:var(--text-muted);background:transparent;transition:all var(--t-fast);letter-spacing:.08em;text-transform:uppercase;}
.tab-btn:hover{border-color:var(--copper);color:var(--copper-light);background:var(--copper-dim);}
.tab-btn.on{background:var(--copper-dim);border-color:rgba(200,132,58,.45);color:var(--copper-pale);box-shadow:0 0 20px var(--copper-glow);}

/* CONTENT */
.content{position:relative;z-index:1;padding:26px 28px 60px;max-width:1440px;margin:0 auto;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:26px;}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.kpi-row{grid-template-columns:1fr 1fr;}}
.kpi{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);padding:20px 22px;position:relative;overflow:hidden;transition:border-color var(--t-fast),transform var(--t-fast),box-shadow var(--t-fast);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ka,var(--copper));opacity:.7;}
.kpi:hover{border-color:var(--ka,var(--copper));transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,.5);}
.kpi-lbl{font-size:.6rem;font-weight:700;color:var(--text-muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;}
.kpi-n{font-family:'DM Mono',monospace;font-size:2.4rem;font-weight:500;color:var(--ka,var(--copper-light));line-height:1;margin-bottom:5px;}
.kpi-hint{font-size:.68rem;color:var(--text-muted);}
.kpi-glow{position:absolute;bottom:-24px;right:-24px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,var(--ka,var(--copper)),transparent 70%);opacity:.07;}

/* PANELS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px;}
@media(max-width:1000px){.grid2,.grid3{grid-template-columns:1fr;}}
.panel{background:var(--bg-raised);border:1px solid var(--text-faint);border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px;}
.panel-h{padding:18px 22px 16px;border-bottom:1px solid var(--text-faint);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.panel-ttl{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600;color:var(--text-primary);}
.panel-st{font-size:.65rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;}
.panel-b{padding:20px 22px;}
.panel-b-sm{padding:14px 22px;}

/* CHART HEIGHTS */
.ch-240{height:240px;position:relative;}
.ch-300{height:300px;position:relative;}
.ch-160{height:160px;position:relative;}

/* Q BADGES */
.qb{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.66rem;font-weight:600;white-space:nowrap;}
.qb1{background:var(--q1-dim);color:var(--q1);border:1px solid rgba(232,164,58,.22);}
.qb2{background:var(--q2-dim);color:var(--q2);border:1px solid rgba(123,156,240,.22);}
.qb3{background:var(--q3-dim);color:var(--q3);border:1px solid rgba(200,127,232,.22);}

/* BARS */
.bar-r{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-r:last-child{margin-bottom:0;}
.bar-lbl{min-width:64px;}
.bar-track{flex:1;height:5px;background:var(--bg-float);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .9s var(--ease);}
.bar-num{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--text-muted);min-width:22px;text-align:right;}

/* DAY CARDS */
.day-tri{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
@media(max-width:600px){.day-tri{grid-template-columns:1fr;}}
.dc{background:var(--bg-float);border:1px solid var(--text-faint);border-radius:var(--r-lg);padding:18px 20px;position:relative;overflow:hidden;transition:all var(--t-fast);}
.dc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--dca);opacity:.6;}
.dc:hover{border-color:var(--dca);transform:translateY(-1px);}
.dc-n{font-family:'DM Mono',monospace;font-size:2.6rem;font-weight:500;color:var(--dca);line-height:1;margin:8px 0 6px;}
.dc-lbl{font-size:.62rem;font-weight:700;color:var(--text-muted);letter-spacing:.16em;text-transform:uppercase;}

/* ERR LIST */
.err-list{display:flex;flex-direction:column;gap:7px;}
.err-item{display:flex;align-items:center;gap:11px;padding:9px 13px;background:var(--bg-float);border:1px solid var(--text-faint);border-radius:var(--r-md);transition:border-color var(--t-fast);}
.err-item:hover{border-color:var(--text-muted);}
.err-h{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text-muted);min-width:44px;}
.err-none{text-align:center;padding:36px 0;color:var(--text-muted);font-size:.82rem;}

/* HEATMAP */
.hm-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.hm-table{border-collapse:separate;border-spacing:3px;width:100%;}
.hm-th{font-size:.55rem;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;padding:3px 4px;text-align:center;white-space:nowrap;}
.hm-th-row{font-size:.6rem;font-weight:600;color:var(--text-muted);text-align:right;padding-right:10px;white-space:nowrap;font-family:'DM Mono',monospace;}
.hm-td{width:34px;height:30px;border-radius:4px;cursor:default;}
.hm-cell{width:100%;height:100%;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.58rem;font-weight:500;transition:transform .1s;}
.hm-cell:hover{transform:scale(1.18);}

/* CAL */
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px;}
.cal-dname{font-size:.55rem;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-align:center;text-transform:uppercase;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{aspect-ratio:1;border-radius:5px;border:1px solid var(--text-faint);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;}
.cal-day:hover{transform:scale(1.1);z-index:2;position:relative;}
.cal-dn{font-size:.55rem;color:var(--text-muted);line-height:1;}
.cal-dv{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:600;line-height:1.2;}

/* DIVIDER */
.div{height:1px;background:var(--text-faint);margin:16px 0;}

/* SPINNER */
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:70px;gap:12px;color:var(--text-muted);font-size:.88rem;}
.spin{width:20px;height:20px;border:2px solid var(--text-faint);border-top-color:var(--copper);border-radius:50%;animation:sp .75s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
#toasts{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:10px 18px;border-radius:var(--r-md);font-size:.82rem;font-weight:500;border:1px solid var(--text-faint);background:var(--bg-float);color:var(--text-primary);animation:tin .2s var(--ease);}
.toast.s{background:rgba(45,212,160,.07);color:var(--emerald);border-color:rgba(45,212,160,.25);}
.toast.e{background:rgba(224,85,85,.07);color:var(--ruby);border-color:rgba(224,85,85,.25);}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--text-faint);border-radius:4px;}
</style>
</head>
<body>
<div class="amb amb-1"></div>
<div class="amb amb-2"></div>
<div class="amb amb-3"></div>
<div id="toasts"></div>

<header class="topbar">
  <div class="tb-left">
    <a href="index.html" class="tb-back">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
    <div class="tb-monogram">S</div>
    <div class="tb-info">
      <div class="tb-title">Erreurs Papier</div>
      <div class="tb-sub">Statistiques · Quarts de travail</div>
    </div>
  </div>
</header>

<div class="date-zone">
  <button class="date-arr" onclick="changeDay(-1)">&#8592;</button>
  <div class="date-pill">
    <span class="date-txt" id="date-lbl">—</span>
    <span class="today-chip" id="today-chip" style="display:none">Aujourd'hui</span>
  </div>
  <button class="date-arr" onclick="changeDay(1)">&#8594;</button>
  <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
</div>

<div class="tabs-zone">
  <button class="tab-btn on" onclick="switchTab('jour',this)">Journée</button>
  <button class="tab-btn" onclick="switchTab('semaine',this)">Semaine</button>
  <button class="tab-btn" onclick="switchTab('mois',this)">Mois</button>
</div>

<div class="content" id="content">
  <div class="spin-wrap"><div class="spin"></div> Chargement…</div>
</div>

<script>
const SB_URL='https://xppzmdmnuztozgukrcta.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcHptZG1udXp0b3pndWtyY3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDM3MTIsImV4cCI6MjA4NzU3OTcxMn0.9-wMrvuz08TaI8-y2x3JLbLOKDnHpTUqJc66ET-8Kug';
let sb, curTab='jour', curDate=todayStr();
let ch1=null, ch2=null;

// Ligne considérée active si statut_ligne != 'INACTIF' (ou null = ACTIF par défaut)
function isActif(r){ return !r.statut_ligne || r.statut_ligne.toUpperCase()!=='INACTIF'; }
function tauxEff(erreurs, total){
  if(!total) return null;
  return Math.round((1 - erreurs/total)*100);
}
function tauxBadge(pct){
  if(pct===null) return '<span style="font-size:.68rem;color:var(--text-faint)">—</span>';
  const col = pct>=90?'var(--emerald)':pct>=70?'var(--q1)':pct>=50?'var(--copper)':'var(--ruby)';
  return `<span style="font-family:'DM Mono',monospace;font-size:.72rem;font-weight:600;color:${col};background:rgba(0,0,0,.2);padding:2px 7px;border-radius:12px;border:1px solid ${col}33">${pct}%</span>`;
}

const Q=[
  {id:1,s:'Q1',l:'Quart 1',c:'#E8A43A',dim:'rgba(232,164,58,.10)',glow:'rgba(232,164,58,.22)'},
  {id:2,s:'Q2',l:'Quart 2',c:'#7B9CF0',dim:'rgba(123,156,240,.10)',glow:'rgba(123,156,240,.22)'},
  {id:3,s:'Q3',l:'Quart 3',c:'#C87FE8',dim:'rgba(200,127,232,.10)',glow:'rgba(200,127,232,.22)'},
];
const SLOTS_H=['06:00','06:00','07:30','09:00','11:30','14:00','15:30','17:00','18:00','19:00'];
const UNI_SLOTS=[...new Set(SLOTS_H)].sort();

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtLong(s){return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function fmtShort(s){return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{day:'2-digit',month:'short'});}
function fmtWD(s){return new Date(s+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'short',day:'numeric'});}
function weekRange(s){const d=new Date(s+'T00:00:00');const dow=d.getDay();const diff=dow===0?-6:1-dow;const m=new Date(d);m.setDate(d.getDate()+diff);const su=new Date(m);su.setDate(m.getDate()+6);return [m,su].map(x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'));}
function monthRange(s){const[y,m]=s.split('-').map(Number);return[`${y}-${String(m).padStart(2,'0')}-01`,`${y}-${String(m).padStart(2,'0')}-${String(new Date(y,m,0).getDate()).padStart(2,'0')}`];}
function daysInRange(a,b){const r=[];let d=a;while(d<=b){r.push(d);d=addDays(d,1);}return r;}

function toast(msg,t=''){const el=document.createElement('div');el.className='toast'+(t?' '+t:'');el.textContent=msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3500);}

function refreshDateUI(){
  document.getElementById('date-lbl').textContent=fmtLong(curDate);
  document.getElementById('today-chip').style.display=curDate===todayStr()?'inline-flex':'none';
}
function changeDay(d){curDate=addDays(curDate,d);refreshDateUI();render();}
function goToday(){curDate=todayStr();refreshDateUI();render();}
function switchTab(t,btn){
  curTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

async function fetchRange(a,b){
  // Même pattern exact que planning_camions qui fonctionne : select('*')
  // Pour un seul jour on utilise .eq, pour une plage on fetch jour par jour
  const days=daysInRange(a,b);
  let allRows=[];
  for(const day of days){
    const{data,error}=await sb.from('planning_camions')
      .select('*')
      .eq('date_jour',day)
      .order('slot_index');
    if(error){toast('Erreur: '+error.message,'e');continue;}
    allRows=[...allRows,...(data||[])];
  }
  return allRows.map(r=>({
    ...r,
    erreur_q1: r.erreur_q1===true,
    erreur_q2: r.erreur_q2===true,
    erreur_q3: r.erreur_q3===true,
  }));
}

function killCharts(){[ch1,ch2].forEach(c=>{if(c){c.destroy();}});ch1=null;ch2=null;}

async function render(){
  document.getElementById('content').innerHTML='<div class="spin-wrap"><div class="spin"></div> Chargement…</div>';
  killCharts();
  let a=curDate,b=curDate,data=[];
  if(curTab==='semaine')[a,b]=weekRange(curDate);
  else if(curTab==='mois')[a,b]=monthRange(curDate);
  data=await fetchRange(a,b);
  if(curTab==='jour') renderJour(data);
  else if(curTab==='semaine') renderSemaine(data,a,b);
  else renderMois(data,a,b);
}

/* ═══════════════════════════════════════
   JOURNÉE
═══════════════════════════════════════ */
function renderJour(data){
  const rows=data.filter(r=>r.date_jour===curDate);
  const tq=[0,0,0];
  rows.forEach(r=>{if(r.erreur_q1)tq[0]++;if(r.erreur_q2)tq[1]++;if(r.erreur_q3)tq[2]++;});
  const tot=tq[0]+tq[1]+tq[2];

  // Panneau debug temporaire — affiche les vraies valeurs DB
  const _dbg=rows.map(r=>`sl${r.slot_index}: q1=${r.erreur_q1} q2=${r.erreur_q2} q3=${r.erreur_q3} statut=${r.statut_ligne||'null'}`).join(' | ');

  document.getElementById('content').innerHTML=`

/* ═══════════════════════════════════════
   HEATMAP créneau × jour
═══════════════════════════════════════ */
function buildHeatmap(id,data,days){
  const el=document.getElementById(id);if(!el)return;
  const get=(h,d)=>data.filter(r=>r.date_jour===d&&(r.heure_planif||SLOTS_H[r.slot_index]||'?')===h)
    .reduce((s,r)=>s+(r.erreur_q1?1:0)+(r.erreur_q2?1:0)+(r.erreur_q3?1:0),0);
  const max=Math.max(1,...UNI_SLOTS.flatMap(h=>days.map(d=>get(h,d))));

  let html='<table class="hm-table"><thead><tr><th class="hm-th-row">Créneau</th>';
  days.forEach(d=>{html+=`<th class="hm-th">${fmtWD(d)}</th>`;});
  html+='</tr></thead><tbody>';
  UNI_SLOTS.forEach(h=>{
    html+=`<tr><th class="hm-th-row">${h}</th>`;
    days.forEach(d=>{
      const v=get(h,d);const intensity=v/max;
      const alpha=v===0?.04:.18+intensity*.72;
      const rv=v===0?44:Math.round(200+intensity*24);
      const gv=v===0?51:Math.round(132-intensity*77);
      const bv=v===0?80:Math.round(58-intensity*55);
      const bg=`rgba(${rv},${gv},${bv},${alpha})`;
      const tc=v===0?'rgba(120,130,160,.25)':intensity>.45?'#F0EAE0':'#E8A43A';
      html+=`<td class="hm-td" title="${h} · ${fmtShort(d)}: ${v} erreur${v>1?'s':''}">
        <div class="hm-cell" style="background:${bg};color:${tc}">${v||''}</div></td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}

/* ═══════════════════════════════════════
   CALENDRIER HEATMAP mensuel
═══════════════════════════════════════ */
function buildCalendar(id,bd,days,maxD){
  const el=document.getElementById(id);if(!el)return;
  const firstDow=new Date(days[0]+'T00:00:00').getDay();
  const off=firstDow===0?6:firstDow-1;
  const dnames=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  let html='<div class="cal-hdr">'+dnames.map(d=>`<div class="cal-dname">${d}</div>`).join('')+'</div>';
  html+='<div class="cal-grid">';
  for(let i=0;i<off;i++) html+='<div></div>';
  days.forEach(day=>{
    const v=bd[day].tot;const intensity=v/maxD;
    const isToday=day===todayStr();const isCur=day===curDate;
    const rv=v===0?21:Math.round(200+intensity*24);
    const gv=v===0?26:Math.round(132-intensity*77);
    const bv=v===0?47:Math.round(58-intensity*55);
    const bg=v===0?'var(--bg-float)':`rgba(${rv},${gv},${bv},${.3+intensity*.6})`;
    const bord=isToday?'2px solid var(--copper)':isCur?'1px solid var(--copper-light)':'1px solid var(--text-faint)';
    const dn=new Date(day+'T00:00:00').getDate();
    html+=`<div class="cal-day" style="background:${bg};border:${bord}"
      title="${fmtShort(day)}: ${v} erreur${v>1?'s':''}"
      onclick="curDate='${day}';refreshDateUI();goJour()">
      <span class="cal-dn" style="color:${v>0?'var(--text-secondary)':'var(--text-faint)'}">${dn}</span>
      ${v>0?`<span class="cal-dv" style="color:${intensity>.5?'#F0EAE0':'#E8A43A'}">${v}</span>`:''}
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function goJour(){
  curTab='jour';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',i===0));
  render();
}

async function initApp(){
  sb=supabase.createClient(SB_URL,SB_KEY);
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){window.location.href='index.html';return;}
    // Requête admins identique à planning_camions — établit le contexte RLS
    const email=session.user.email;
    await sb.from('admins').select('email').eq('email',email).maybeSingle();
  }catch(e){ /* session invalide mais on continue */ }
  refreshDateUI();
  render();
}

function waitForSupabaseAndInit(){
  if(typeof supabase!=='undefined'&&supabase.createClient){
    initApp();
  } else {
    setTimeout(waitForSupabaseAndInit,50);
  }
}
window.addEventListener('load',waitForSupabaseAndInit);
