<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse Erreurs Papier — SOY Excellence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --void: #0A0B0D;
  --base: #0F1115;
  --elevated: #14161C;
  --surface: #1A1D26;
  --panel: #1F2330;
  
  /* Couleurs Luxury Premium - subtiles et élégantes */
  --gold: #D4AF37;
  --gold-light: #E8C870;
  --gold-dark: #B8973A;
  --platinum: #E5E4E2;
  --champagne: #F7E7CE;
  
  /* Quarts - tons élégants */
  --q1-color: #D4AF37;
  --q1-glow: rgba(212,175,55,.2);
  --q1-bg: rgba(212,175,55,.06);
  --q2-color: #87CEEB;
  --q2-glow: rgba(135,206,235,.2);
  --q2-bg: rgba(135,206,235,.06);
  --q3-color: #DDA0DD;
  --q3-glow: rgba(221,160,221,.2);
  --q3-bg: rgba(221,160,221,.06);
  
  --text-primary: #F5F7FA;
  --text-secondary: #A0A8B8;
  --text-muted: #6B7280;
  --text-faint: #3D4451;
  --border: #252934;
  --border-bright: #3A4050;
  --success: #10B981;
  --warning: #F59E0B;
  --error: #EF4444;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
  --glow-sm: 0 0 12px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 12.8px; /* 80% de 16px = 12.8px */
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--void);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1000;
  opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' /%3E%3C/svg%3E");
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 72px;
  background: rgba(10,11,13,.95);
  backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
}

.topbar::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--q1-color) 0%, var(--q2-color) 50%, var(--q3-color) 100%);
  opacity: .4;
}

.tb-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.tb-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: var(--surface);
  border: 2px solid var(--border-bright);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: .875rem;
  font-weight: 600;
  text-decoration: none;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  letter-spacing: .02em;
}

.tb-back:hover {
  border-color: var(--electric-cyan);
  color: var(--electric-cyan);
  transform: translateX(-4px);
  box-shadow: 0 0 20px rgba(0,240,255,.2);
}

.tb-brand {
  display: flex;
  align-items: center;
  gap: 16px;
}

.tb-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: #0A0B0D;
  box-shadow: 0 4px 16px rgba(212,175,55,.2);
  position: relative;
}

.tb-icon::after {
  content: '';
  position: absolute;
  inset: -2px;
  background: inherit;
  border-radius: inherit;
  z-index: -1;
  opacity: .3;
  filter: blur(8px);
}

.tb-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -.02em;
}

.tb-subtitle {
  font-size: .75rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-top: 2px;
}

.tb-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn-today {
  padding: 10px 20px;
  background: var(--surface);
  border: 2px solid var(--border-bright);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: .875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .02em;
}

.btn-today:hover {
  border-color: var(--q1-color);
  color: var(--q1-color);
  box-shadow: 0 0 20px var(--q1-glow);
}

.date-section {
  padding: 32px 32px 24px;
  position: relative;
}

.view-tabs {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
  padding: 6px;
  background: var(--elevated);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  width: fit-content;
  margin-left: auto;
  margin-right: auto;
}

.view-tab {
  padding: 10px 24px;
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  color: var(--text-muted);
  font-size: .875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .02em;
  text-transform: uppercase;
}

.view-tab:hover {
  color: var(--text-secondary);
}

.view-tab.active {
  background: var(--panel);
  color: var(--text-primary);
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}

.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 24px;
}

.date-arr {
  width: 48px;
  height: 48px;
  background: var(--surface);
  border: 2px solid var(--border-bright);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: 1.25rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  font-weight: 700;
}

.date-arr:hover {
  border-color: var(--gold);
  color: var(--gold);
  transform: scale(1.02);
  box-shadow: 0 0 12px rgba(212,175,55,.15);
}

.date-display {
  background: var(--panel);
  border: 2px solid var(--border-bright);
  border-radius: var(--radius-lg);
  padding: 10px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 360px;
  position: relative;
  overflow: hidden;
}

.date-display::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
  opacity: .6;
}

.date-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -.01em;
}

.date-meta {
  font-size: .75rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .1em;
}

.today-badge {
  padding: 3px 10px;
  background: var(--q1-bg);
  border: 1px solid var(--q1-color);
  border-radius: 16px;
  font-size: .625rem;
  font-weight: 700;
  color: var(--q1-color);
  text-transform: uppercase;
  letter-spacing: .08em;
  white-space: nowrap;
}

.quarts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 24px;
  margin-bottom: 24px;
}

.quart-card {
  background: var(--panel);
  border: 2px solid var(--border-bright);
  border-radius: var(--radius-lg);
  padding: 28px;
  position: relative;
  overflow: hidden;
  transition: all .3s cubic-bezier(.4,0,.2,1);
}

.quart-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--quart-color);
  box-shadow: 0 0 8px var(--quart-glow);
}

.quart-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--quart-color);
}

.quart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.quart-tag {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: var(--quart-bg);
  border: 1px solid var(--quart-color);
  border-radius: var(--radius-md);
  font-family: 'Space Grotesk', sans-serif;
  font-size: .875rem;
  font-weight: 700;
  color: var(--quart-color);
  text-transform: uppercase;
  letter-spacing: .05em;
}

.quart-dot {
  width: 8px;
  height: 8px;
  background: var(--quart-color);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--quart-glow);
}

/* Animation pulse supprimée pour style luxury */

.quart-efficiency {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 80px;
  height: 80px;
  background: var(--elevated);
  border: 3px solid var(--eff-color);
  border-radius: 50%;
  position: relative;
}

.quart-efficiency::before {
  content: '';
  position: absolute;
  inset: -6px;
  background: conic-gradient(
    var(--eff-color) calc(var(--eff-value) * 1%),
    var(--border) calc(var(--eff-value) * 1%)
  );
  border-radius: 50%;
  z-index: -1;
}

/* Animation rotate supprimée pour style luxury */

.eff-value {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--eff-color);
  text-shadow: 0 0 10px var(--eff-glow);
}

.quart-stats {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--elevated);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.stat-label {
  font-size: .875rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .05em;
}

.stat-value {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--text-primary);
}

.stat-sub {
  font-size: .75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.main-content {
  padding: 0 32px 60px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.panel {
  background: var(--panel);
  border: 2px solid var(--border-bright);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all .3s;
}

.panel:hover {
  border-color: var(--border-bright);
  box-shadow: var(--shadow-md);
}

.panel-header {
  padding: 24px 28px;
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--elevated);
}

.panel-title {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.125rem;
  font-weight: 700;
  color: var(--text-primary);
}

.panel-icon {
  width: 32px;
  height: 32px;
  background: var(--panel-accent, var(--gold));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 12px var(--panel-glow, rgba(212,175,55,.2));
}

.panel-meta {
  font-size: .75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .1em;
}

.panel-body {
  padding: 28px;
}

.grid-2 {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
  gap: 24px;
  margin-bottom: 24px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 24px;
  margin-bottom: 24px;
}

.error-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.error-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--elevated);
  border-left: 4px solid var(--item-color);
  border-radius: var(--radius-sm);
  transition: all .2s;
}

.error-item:hover {
  background: var(--surface);
  transform: translateX(4px);
}

.error-time {
  font-family: 'Space Grotesk', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
  min-width: 60px;
}

.error-quart {
  padding: 4px 12px;
  background: var(--item-bg);
  border: 1px solid var(--item-color);
  border-radius: 20px;
  font-size: .75rem;
  font-weight: 700;
  color: var(--item-color);
  text-transform: uppercase;
}

.error-truck {
  font-size: .875rem;
  color: var(--text-secondary);
}

.error-none {
  padding: 40px;
  text-align: center;
  color: var(--text-muted);
  font-size: 1rem;
}

.error-none svg {
  width: 64px;
  height: 64px;
  margin: 0 auto 16px;
  opacity: .3;
}

.chart-container {
  position: relative;
  height: 300px;
}

.chart-container-sm {
  position: relative;
  height: 240px;
}

.heatmap-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.heatmap-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 6px;
  font-size: .75rem;
}

.heatmap-table th {
  padding: 8px;
  text-align: center;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  font-size: .625rem;
}

.heatmap-cell {
  min-width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cell-bg);
  border-radius: var(--radius-sm);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  color: var(--cell-color);
  cursor: default;
  transition: all .2s;
  border: 2px solid var(--cell-border);
  position: relative;
  overflow: hidden;
}

.heatmap-cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,.05));
  opacity: 0;
  transition: opacity .2s;
}

.heatmap-cell:hover::before {
  opacity: 1;
}

.heatmap-cell:hover {
  transform: scale(1.08);
  box-shadow: 0 4px 16px rgba(0,0,0,.5);
  z-index: 10;
}

.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 20px;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--electric-cyan);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .1em;
}

#toasts {
  position: fixed;
  bottom: 32px;
  right: 32px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.toast {
  padding: 16px 24px;
  background: var(--panel);
  border: 2px solid var(--border-bright);
  border-left: 4px solid var(--toast-color);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  color: var(--text-primary);
  font-size: .875rem;
  font-weight: 500;
  max-width: 360px;
  animation: slideIn .3s cubic-bezier(.4,0,.2,1);
}

@keyframes slideIn {
  from { transform: translateX(100px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast.success { --toast-color: var(--success); }
.toast.error { --toast-color: var(--error); }
.toast.warning { --toast-color: var(--warning); }

@media (max-width: 768px) {
  .topbar {
    padding: 0 16px;
    height: 64px;
  }
  
  .tb-title {
    font-size: 1.125rem;
  }
  
  .tb-subtitle {
    display: none;
  }
  
  .date-section {
    padding: 24px 16px;
  }
  
  .date-display {
    min-width: 280px;
    padding: 12px 24px;
  }
  
  .main-content {
    padding: 0 16px 40px;
  }
  
  .quarts-grid {
    grid-template-columns: 1fr;
  }
  
  .grid-2,
  .grid-3 {
    grid-template-columns: 1fr;
  }
  
  .heatmap-cell {
    min-width: 48px;
    height: 48px;
    font-size: .75rem;
  }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="tb-left">
    <a href="index.html" class="tb-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Retour
    </a>
    <div class="tb-brand">
      <div class="tb-icon">E</div>
      <div>
        <div class="tb-title">Analyse Erreurs Papier</div>
        <div class="tb-subtitle">Excellence Opérationnelle</div>
      </div>
    </div>
  </div>
  <div class="tb-right">
    <button class="btn-today" onclick="exportPDF()" style="margin-right: 12px; background: linear-gradient(135deg, var(--gold-dark), var(--gold-light)); color: #0A0B0D;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 6px;">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      Export PDF
    </button>
    <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
  </div>
</header>

<section class="date-section" style="padding-bottom: 16px;">
  <div class="view-tabs">
    <button class="view-tab active" onclick="switchView('jour', this)">Journée</button>
    <button class="view-tab" onclick="switchView('semaine', this)">Semaine</button>
    <button class="view-tab" onclick="switchView('mois', this)">Mois</button>
  </div>

  <div class="date-nav">
    <button class="date-arr" onclick="changeDate(-1)">←</button>
    <div class="date-display">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="date-label" id="date-lbl">—</div>
        <div class="today-badge" id="today-badge" style="display:none">Aujourd'hui</div>
      </div>
      <div class="date-meta" id="date-meta" style="display:none">Chargement...</div>
    </div>
    <button class="date-arr" onclick="changeDate(1)">→</button>
  </div>
</section>

<main class="main-content" id="main-content">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Analyse en cours...</div>
  </div>
</main>

<div id="toasts"></div>

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
  return d.toLocaleDateString('fr-FR', options);
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
  return `${days[d.getDay()]} ${d.getDate()}/${d.getMonth() + 1}`;
}

function getWeekRange(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  
  const monday = new Date(d);
  monday.setDate(d.getDate() + diff);
  
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  
  return {
    start: monday.toISOString().slice(0, 10),
    end: sunday.toISOString().slice(0, 10)
  };
}

function getMonthRange(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const year = d.getFullYear();
  const month = d.getMonth();
  
  const start = new Date(year, month, 1);
  const end = new Date(year, month + 1, 0);
  
  return {
    start: start.toISOString().slice(0, 10),
    end: end.toISOString().slice(0, 10)
  };
}

function getDaysInRange(startStr, endStr) {
  const days = [];
  const start = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    days.push(d.toISOString().slice(0, 10));
  }
  
  return days;
}

function isToday(dateStr) {

}

function changeDate(delta) {

function isComptable(row) {
  const statut = (row.statut_ligne || '').toUpperCase();
  if (statut === 'INACTIF') return false;
  
  const dest = (row.destination || '').trim();
  
  if (dest.toUpperCase().includes('BOBTAIL')) return false;
  
  // Une ligne est comptable si elle a une destination et n'est pas INACTIF
  // Peu importe si num_depart est rempli ou non
  return true;
}

function calculateStats(rows) {
  const comptables = rows.filter(r => isComptable(r));
  
  const stats = QUARTS.map(q => {
    // Pour ce quart, compter SEULEMENT les camions qu'il a vérifiés (OK ou erreur)
    const camionsVerifies = comptables.filter(r => {
      const state = r.etat_verification || '';
      return state === `q${q.id}_ok` || state === `q${q.id}_err`;
    });
    
    const total = camionsVerifies.length;
    
    // Compter les erreurs pour ce quart
    const errors = camionsVerifies.filter(r => {
      const state = r.etat_verification || '';
      return state === `q${q.id}_err`;
    }).length;
    
    const efficiency = total > 0 ? Math.round(((total - errors) / total) * 100) : null;
    
    return {
      ...q,
      errors,
      total,
      efficiency
    };
  });
  
  // Le total global est la somme de tous les camions vérifiés (sans double comptage)
  const totalGlobal = comptables.filter(r => {
    const state = r.etat_verification || '';
    return state && state !== 'none';
  }).length;
  
  return { stats, total: totalGlobal };
}

function getEfficiencyColor(efficiency) {
  if (efficiency === null) return '#6B7280';
  if (efficiency >= 95) return '#10B981';
  if (efficiency >= 85) return '#3B82F6';
  if (efficiency >= 70) return '#F59E0B';
  if (efficiency >= 50) return '#F97316';
  return '#EF4444';
}

function getEfficiencyGlow(efficiency) {
  if (efficiency === null) return 'rgba(107,114,128,.3)';
  if (efficiency >= 95) return 'rgba(16,185,129,.3)';
  if (efficiency >= 85) return 'rgba(59,130,246,.3)';
  if (efficiency >= 70) return 'rgba(245,158,11,.3)';
  if (efficiency >= 50) return 'rgba(249,115,22,.3)';
  return 'rgba(239,68,68,.3)';
}

function renderErrorList(rows) {

          time: row.heure_planif || '—',
          quart: q,
          truck: row.num_depart || row.num_camion || '—',
          dest: row.destination || '—',
          date: row.date_jour
        });
      }
    });
  });
  
  errors.sort((a, b) => {

function renderHeatmap(dataByDay) {
  const days = Object.keys(dataByDay).sort();
  if (days.length === 0) return '';
  
  const maxErrors = Math.max(1, ...days.map(d => dataByDay[d].total));
  
  let html = '<div class="heatmap-scroll"><table class="heatmap-table">';
  html += '<thead><tr><th></th>';
  
  days.forEach(day => {
    html += `<th>${formatDateShort(day)}</th>`;
  });
  
  html += '</tr></thead><tbody>';
  
  QUARTS.forEach(q => {
    html += `<tr><th style="text-align: right; padding-right: 16px; color: ${q.color}">${q.short}</th>`;
    
    days.forEach(day => {
      const dayData = dataByDay[day];
      const qData = dayData[`q${q.id}`] || 0;
      const intensity = qData / maxErrors;
      
      let bgColor, textColor, borderColor;
      
      if (qData === 0) {
        bgColor = 'var(--elevated)';
        textColor = 'var(--text-faint)';
        borderColor = 'var(--border)';
      } else {
        const alpha = 0.1 + (intensity * 0.6);
        bgColor = q.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
        textColor = intensity > 0.5 ? '#FFF' : q.color;
        borderColor = q.color;
      }
      
      html += `<td><div class="heatmap-cell" style="--cell-bg: ${bgColor}; --cell-color: ${textColor}; --cell-border: ${borderColor}" title="${formatDateShort(day)} · ${q.label}: ${qData} erreur${qData !== 1 ? 's' : ''}">${qData || ''}</div></td>`;
    });
    
    html += '</tr>';
  });
  
  html += '</tbody></table></div>';
  return html;
}

async function loadData() {
  try {
    let startDate, endDate;
    
    if (curView === 'jour') {
      startDate = endDate = curDate;
    } else if (curView === 'semaine') {
      const range = getWeekRange(curDate);
      startDate = range.start;
      endDate = range.end;
    } else {
      const range = getMonthRange(curDate);
      startDate = range.start;
      endDate = range.end;
    }
    
    const days = getDaysInRange(startDate, endDate);
    let allRows = [];
    
    for (const day of days) {
      const { data, error } = await sb
        .from('planning_camions')
        .select('*')
        .eq('date_jour', day)
        .order('slot_index');
      
      if (error && error.code !== 'PGRST116') {
        console.error('Error loading day:', day, error);
        continue;
      }
      
      const dayRows = (data || []).map(r => r);
      
      allRows = allRows.concat(dayRows);
    }
    
    const statsData = calculateStats(allRows);
    
    let dataByDay = null;
    if (curView !== 'jour') {
      dataByDay = {};
      days.forEach(day => {
        const dayRows = allRows.filter(r => r.date_jour === day);
        const dayStats = calculateStats(dayRows);
        dataByDay[day] = {
          total: dayStats.stats.reduce((sum, s) => sum + s.errors, 0),
          q1: dayStats.stats[0].errors,
          q2: dayStats.stats[1].errors,
          q3: dayStats.stats[2].errors
        };
      });
    }
    
    renderMainContent(allRows, statsData, dataByDay);
    
  } catch (e) {
    console.error('Error loading data:', e);
    toast('Erreur de chargement des données', 'error');
    
    document.getElementById('quarts-grid').innerHTML = `
      <div class="error-none">
        <div style="color: var(--error)">Erreur de chargement</div>
      </div>
    `;
  }
}

    document.getElementById('date-meta').textContent = formatDateShort(curDate);
  } else if (curView === 'semaine') {
    const range = getWeekRange(curDate);
    const start = new Date(range.start + 'T00:00:00');
    const end = new Date(range.end + 'T00:00:00');
    document.getElementById('date-lbl').textContent = `Semaine du ${start.getDate()} au ${end.getDate()} ${start.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}`;
    document.getElementById('date-meta').textContent = `${formatDateShort(range.start)} - ${formatDateShort(range.end)}`;
  } else {
    const d = new Date(curDate + 'T00:00:00');
    document.getElementById('date-lbl').textContent = d.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
    const range = getMonthRange(curDate);
    document.getElementById('date-meta').textContent = `${formatDateShort(range.start)} - ${formatDateShort(range.end)}`;
  }
  
  document.getElementById('today-badge').style.display = isToday(curDate) ? 'block' : 'none';
  
  loadData();
}

async function init() {
  sb = supabase.createClient(SB_URL, SB_KEY);
  
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = 'index.html';
      return;
    }
  } catch (e) {
    console.warn('Auth check:', e);
  }
  
  refreshUI();
}

function waitForSupabase() {
  if (typeof supabase !== 'undefined' && supabase.createClient) {
    init();
  } else {
    setTimeout(waitForSupabase, 50);
  }
}

async function exportPDF() {
  try {
    toast('Génération du PDF en cours...', 'info');
    
    // Attendre un peu pour que le toast s'affiche
    await new Promise(r => setTimeout(r, 500));
    
    // Créer un conteneur pour le PDF avec fond blanc
    const pdfContainer = document.createElement('div');
    pdfContainer.id = 'pdf-export-container';
    pdfContainer.style.cssText = `
      position: fixed;
      left: 0;
      top: 0;
      width: 210mm;
      background: white;
      padding: 20mm;
      font-family: Inter, sans-serif;
      color: #0A0B0D;
      z-index: 10000;
    `;
    document.body.appendChild(pdfContainer);
    
    // En-tête
    pdfContainer.innerHTML = `
      <div style="margin-bottom: 30px; border-bottom: 3px solid #D4AF37; padding-bottom: 15px;">
        <h1 style="font-size: 32px; font-weight: 800; color: #0A0B0D; margin: 0; font-family: 'Space Grotesk', sans-serif;">
          Analyse Erreurs Papier
        </h1>
        <p style="font-size: 16px; color: #6B7280; margin: 8px 0 0 0;">
          ${document.getElementById('date-lbl').textContent}
        </p>
      </div>
    `;
    
    // Récupérer les données des widgets totaux
    const widgets = document.querySelectorAll('.grid-3 .panel');
    const statsSection = document.createElement('div');
    statsSection.style.cssText = 'display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px;';
    
    widgets.forEach((widget, idx) => {
      const title = widget.querySelector('.panel-title').textContent.trim();
      const value = widget.querySelector('.panel-body > div:first-child').textContent.trim();
      const sub = widget.querySelector('.panel-body > div:nth-child(2)').textContent.trim();
      
      const colors = ['#DC8C7C', '#87CEEB', '#D4AF37'];
      const statCard = document.createElement('div');
      statCard.style.cssText = `
        border: 2px solid ${colors[idx]};
        border-radius: 10px;
        padding: 15px;
        background: #F9FAFB;
      `;
      statCard.innerHTML = `
        <div style="font-size: 12px; color: #6B7280; margin-bottom: 5px; font-weight: 600;">${title}</div>
        <div style="font-size: 28px; font-weight: 800; color: #0A0B0D; margin-bottom: 3px;">${value}</div>
        <div style="font-size: 10px; color: #9CA3AF;">${sub}</div>
      `;
      statsSection.appendChild(statCard);
    });
    pdfContainer.appendChild(statsSection);
    
    // Section par quart
    const quartsTitle = document.createElement('h2');
    quartsTitle.style.cssText = 'font-size: 20px; font-weight: 700; color: #0A0B0D; margin: 20px 0 12px 0; font-family: "Space Grotesk", sans-serif;';
    quartsTitle.textContent = 'Détails par Quart de Travail';
    pdfContainer.appendChild(quartsTitle);
    
    const quartsGrid = document.createElement('div');
    quartsGrid.style.cssText = 'display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px;';
    
    document.querySelectorAll('.quart-card').forEach((card) => {
      const quartClone = card.cloneNode(true);
      quartClone.style.cssText = 'border: 2px solid #E5E7EB; border-radius: 10px; padding: 15px; background: white; page-break-inside: avoid;';
      
      // Nettoyer les styles pour fond blanc
      quartClone.querySelectorAll('*').forEach(el => {
        if (el.style.color && el.style.color.includes('var(')) {
          el.style.color = '#0A0B0D';
        }
        if (el.style.background && el.style.background.includes('var(')) {
          el.style.background = 'white';
        }
      });
      
      quartsGrid.appendChild(quartClone);
    });
    pdfContainer.appendChild(quartsGrid);
    
    // Graphique circulaire
    const chartCanvas = document.getElementById('chart-doughnut');
    if (chartCanvas) {
      const chartTitle = document.createElement('h2');
      chartTitle.style.cssText = 'font-size: 20px; font-weight: 700; color: #0A0B0D; margin: 20px 0 12px 0; font-family: "Space Grotesk", sans-serif;';
      chartTitle.textContent = 'Distribution des Erreurs par Quart';
      pdfContainer.appendChild(chartTitle);
      
      const chartContainer = document.createElement('div');
      chartContainer.style.cssText = 'display: flex; justify-content: center; margin-bottom: 25px; page-break-inside: avoid;';
      
      const chartImg = document.createElement('img');
      chartImg.src = chartCanvas.toDataURL('image/png', 1.0);
      chartImg.style.cssText = 'width: 300px; height: 300px;';
      chartContainer.appendChild(chartImg);
      pdfContainer.appendChild(chartContainer);
    }
    
    // Attendre que les images soient chargées
    await new Promise(resolve => {
      const images = pdfContainer.querySelectorAll('img');
      if (images.length === 0) {
        resolve();
        return;
      }
      
      let loaded = 0;
      images.forEach(img => {
        if (img.complete) {
          loaded++;
          if (loaded === images.length) resolve();
        } else {
          img.onload = () => {
            loaded++;
            if (loaded === images.length) resolve();
          };
        }
      });
    });
    
    // Générer le PDF
    const opt = {
      margin: 0,
      filename: `analyse-erreurs-papier-${new Date().toISOString().slice(0,10)}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { 
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false
      },
      jsPDF: { 
        unit: 'mm',
        format: 'a4',
        orientation: 'portrait'
      }
    };
    
    await html2pdf().set(opt).from(pdfContainer).save();
    
    // Nettoyer
    document.body.removeChild(pdfContainer);
    
    toast('PDF exporté avec succès', 'success');
    
  } catch (error) {
    console.error('Erreur export PDF:', error);
    toast('Erreur lors de l\'export PDF', 'error');
    
    // Nettoyer en cas d'erreur
    const container = document.getElementById('pdf-export-container');
    if (container) document.body.removeChild(container);
  }
}

window.addEventListener('load', waitForSupabase);
</script>
